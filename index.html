    @keyframes heroTourIn {

      .ballot-print-footer { display: block !important; position: fixed; bottom: 0; left: 0; right: 0; text-align: center; font-size: 9px; color: #94a3b8; padding: 6px; border-top: 1px solid #e2e8f0; background: white; }

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // ─────────────────────────────────────────────
    // GOOGLE SHEETS CONFIG
    //
    // You need TWO Google Sheets — both published to web (File → Share → Publish to web → CSV):
    //
    // MASTER SHEET (you own this):
    //   Tab "issues"    — the 10 belief questions
    //   Tab "statewide" — statewide candidates (Governor, Lt Gov, AG, SBOE, etc.)
    //
    // COUNTY SHEET (one per county org):
    //   Tab "candidates" — local-only races for that county
    //
    // Paste each sheet's ID below (the long string in the URL):
    //   https://docs.google.com/spreadsheets/d/YOUR_ID_HERE/edit
    //
    // Leave master empty ('') to use built-in placeholder data.
    // ─────────────────────────────────────────────
    // ── Shared button styles ──────────────────────────────────────────
    const BTN = {
      // Primary filled pill (gradient set inline per-screen) — legacy, used by the split "Candidates ▾" control
      primary: "py-2.5 px-8 rounded-full font-black text-xs uppercase tracking-widest text-white transition-all duration-150 hover:opacity-90 active:scale-[0.97]",
      // Outlined pill — legacy
      outline: "py-2.5 px-8 rounded-full font-black text-xs uppercase tracking-widest transition-all duration-150 hover:opacity-90 active:scale-[0.97]",
      // Wrapper: centers & constrains width
      wrap: "w-72 mx-auto",

    // Encodes answers+ranks into a ~18-char URL-safe string
    // Format: for each of 9 POSITION_KEYS in order → choice (A/B/C/D/X) + rank (1-9, '0'=10, 'X'=unanswered)
    function encodeChallenge(answers, ranks) {
      return POSITION_KEYS.map(key => {
        const choice = answers[key];
        if (!choice) return 'XX';
        const rank = ranks[key] || 5;
        return choice + (rank === 10 ? '0' : String(rank));
      }).join('');
    }

    function decodeChallenge(str) {
      if (!str || str.length !== 18) return null;
      const answers = {}, ranks = {};
      POSITION_KEYS.forEach((key, i) => {
        const choice = str[i * 2];
        const rankChar = str[i * 2 + 1];
        if (choice !== 'X') {
          answers[key] = choice;
          ranks[key] = rankChar === '0' ? 10 : parseInt(rankChar) || 5;
        }
      });
      return { answers, ranks };
    }

    function buildChallengeUrl(answers, ranks) {
      const code = encodeChallenge(answers, ranks);

            counties: (row.counties || '').split(',').map(s => s.trim()).filter(Boolean),
            candidates: []

        const evidence = {};

          positions[k] = row[k] || null;
          evidence[k] = row[k + 'Evidence'] || EVIDENCE_FALLBACK[row.name]?.[k] || null;

          name: row.name,
          party: row.party,
          confirmed: ['true','yes','TRUE','Yes'].includes(row.confirmed),
          uncontested: ['true','yes','TRUE','Yes'].includes(row.uncontested),

          summary: row.hook2 || HOOK2_FALLBACK[row.name] || row.summary || '',
          hook: row.hook1 || HOOK1_FALLBACK[row.name] || null,

        });
      });
      return Object.values(raceMap);
    }

    // Clean per-candidate URLs (voteyourviews.org/JamesTalarico): match a URL slug to a candidate across all counties.
    const candidateSlug = (name) => (name || '').toLowerCase().replace(/[^a-z0-9]/g, '');

    // Next candidate in the race after the current one (cyclic) — the profile's "vs. X →" pill
    // walks through ALL opponents this way, so 3-way races (D/R + independent) cycle cleanly.
    function nextOpponent(race, currentName) {
      const cands = (race?.candidates || []).filter(Boolean);
      if (cands.length < 2) return null;
      const i = cands.findIndex(c => c.name === currentName);
      return cands[(i + 1) % cands.length];
    }
    function findCandidateBySlug(counties, slug) {
      const target = candidateSlug(slug);
      if (!target) return null;
      for (const [countyKey, c] of Object.entries(counties || {})) {
        for (const secKey of ['federal', 'state', 'county']) {
          for (const race of (c[secKey] || [])) {
            for (const cand of (race.candidates || []).filter(Boolean)) {
              if (candidateSlug(cand.name) === target) return { countyKey, candidate: cand, race };
            }
          }
        }
      }
      return null;
    }

    // Courts of Appeals under State, local courts under County.
    // Fallback data (hardcoded COUNTIES) predates the three-level structure — fold its
    // judicial array into state/county by office (local courts are named by county/precinct).
    function normalizeFallbackCounties(counties) {
      const out = {};
      for (const [key, c] of Object.entries(counties)) {
        const { judicial = [], ...rest } = c;
        const isLocalCourt = r => /County|Justice of the Peace|Court at Law|Constable|District Court — /.test(r.office);
        out[key] = {
          ...rest,
          state: [...(c.state || []), ...judicial.filter(r => !isLocalCourt(r))],
          county: [...(c.county || []), ...judicial.filter(isLocalCourt)],

    function RaceGroupSections({ races, collapsedGroups, setCollapsedGroups, renderRace, groupAppendix }) {

        <React.Fragment key={g.label || 'all'}>
          {grouped && g.label && (

                const btn = e.currentTarget;
                setCollapsedGroups(prev => ({ ...prev, [g.label]: !(g.label in prev ? prev[g.label] : true) }));
                if (!isCollapsed) setTimeout(() => btn.scrollIntoView({block:'nearest'}), 0);
              }}
              className="w-full flex items-center justify-between px-4 py-3.5 rounded-2xl font-black uppercase tracking-widest text-[13px] transition-all hover:bg-white/10"
              style={{background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.16)', color:'#cbd5e1', marginTop: gi > 0 ? '16px' : undefined}}>
              <span className="text-left">
                {g.label} <span className="normal-case tracking-normal font-bold" style={{color:'#34d399', marginLeft:'4px'}}>{g.races.length} race{g.races.length !== 1 ? 's' : ''}</span>
                {isCollapsed && (
                  <span className="block normal-case tracking-normal font-medium text-[12px] mt-1" style={{color:'#8494ab'}}>
                    {(() => {
                      // Court groups: name each court once (no Place/seat suffixes) to keep the preview short.
                      // Senate & House group: "State Senate: District N", Senate first.
                      const names = /courts/i.test(g.label)
                        ? [...new Set(g.races.map(r => r.office.split(/\s*[—–]\s*/)[0].trim().replace(/^TX /,'Texas ').replace(/^\d+(?:st|nd|rd|th)\s+(Court of Appeals)/i,'$1')))]
                        : g.label === 'State House & Senate'
                        ? [...g.races].sort(a => a.districtType === 'stateHouse' ? -1 : 1).map(r => r.office.replace(/^TX\s+/,'').replace(/\s*[—–]\s*/, ': '))
                        : g.races.map(r => r.office.replace(/ of Texas$/i,''));
                      const shown = names.length <= 4 ? names.length : 3;
                      const Dot = () => <span style={{fontSize:'2em', lineHeight:0, verticalAlign:'-0.13em', margin:'0 3px'}}>·</span>;
                      return (<>
                        {names.slice(0,shown).map((n, i) => (<React.Fragment key={n}>{i > 0 && <> <Dot/> </>}<span style={{whiteSpace:'nowrap'}}>{n}</span></React.Fragment>))}
                        {names.length > shown && <> <Dot/> <span style={{whiteSpace:'nowrap'}}>+{names.length-shown} more</span></>}
                      </>);
                    })()}
                  </span>
                )}

        <p className="text-center text-[12px] pt-4" style={{color:'#64748b'}}>Tap a section to show or hide its candidates</p>

    // Voice direction: LEFT means agreeing = liberal (A), RIGHT means agreeing = conservative (C)
    const ISSUE_VOICE = {
      reproductiveRights: 'LEFT',
      immigration:        'RIGHT',
      affordability:      'LEFT',
      education:          'LEFT',
      electionIntegrity:    'LEFT',
      healthcare:         'RIGHT',
      socialSecurity:     'LEFT',
      gunPolicy:          'RIGHT',

    };

    // Plain-language position per issue, keyed by lean letter (A = left-leaning stance, C = right-leaning, B = middle).
    // Non-partisan substance — what the candidate actually supports, no "liberal/conservative" labels.
    const POSITION_PHRASE = {
      reproductiveRights: { A: 'Supports abortion access',     B: 'Middle-ground on abortion',     C: 'Supports abortion limits' },
      immigration:        { A: 'Favors legal pathways',        B: 'Mixed on immigration',          C: 'Favors tougher border enforcement' },
      gunPolicy:          { A: 'Backs gun-safety limits',      B: 'Mixed on guns',                 C: 'Defends gun rights' },
      education:          { A: 'Backs public schools',         B: 'Mixed on schools',              C: 'Backs school choice' },
      healthcare:         { A: 'Wants to expand coverage',     B: 'Mixed on healthcare',           C: 'Favors free-market care' },
      climate:            { A: 'Backs clean energy',           B: 'Mixed on energy',               C: 'Backs oil & gas' },
      electionIntegrity:    { A: 'More voting access',           B: 'Mixed on elections',            C: 'Tighter election security' },
      socialSecurity:     { A: 'Protect benefits, no cuts',    B: 'Mixed on benefits',             C: 'Open to benefit reform' },
      affordability:      { A: 'Renter & wage protections',    B: 'Mixed on affordability',        C: 'Free-market on costs' },
    };

    function calcMatch(candidate, answers, checkedStatements, ranks) {
      // New V2 scoring: use reactions if available, fall back to A/B/C
      const answered = Object.keys(answers).filter(id => answers[id] !== 'D');
      if (answered.length === 0) return null;

      let weightedScore = 0;
      let weightedTotal = 0;

      answered.forEach(id => {
        const importance = (ranks && ranks[id]) ? ranks[id] : 5;
        const stmtData = checkedStatements && checkedStatements[id];
        // Normalize new Agree/Disagree/Unknown data to a lean letter via the issue's voice,
        // so match scoring works for both old (A/B/C) and new candidates.
        const voiceForId = ISSUE_VOICE[id] || 'LEFT';
        let candPos = candidate.positions[id];
        if (candPos === 'Agree') candPos = voiceForId === 'RIGHT' ? 'C' : 'A';
        else if (candPos === 'Disagree') candPos = voiceForId === 'RIGHT' ? 'A' : 'C';
        else if (candPos === 'Unknown') candPos = null;

        // Candidate has no position on this issue — exclude it from the match entirely
        // (don't count it against them, and a candidate with no positions scores null, not 0%).
        if (candPos === null || candPos === 'D') return;

        if (stmtData && stmtData.reactions) {
          // V2: reactions-based scoring
          const reactions = stmtData.reactions;
          const total = Object.keys(reactions).length;
          if (total === 0) return;
          const agrees = Object.values(reactions).filter(r => r === 'up').length;
          const disagrees = total - agrees;
          const voice = ISSUE_VOICE[id] || 'LEFT';

          // agreeRate for the A candidate, disagreeRate for the C candidate.
          // Divide by the statements actually voted on (total) — "No Opinion" statements
          // aren't in `reactions`, so they're excluded from the match (not counted against).
          const aRate = voice === 'LEFT' ? agrees / total : disagrees / total;
          const cRate = voice === 'RIGHT' ? agrees / total : disagrees / total;
          const voterRate = candPos === 'A' ? aRate : candPos === 'C' ? cRate : 0;

          weightedScore += voterRate * importance;
        } else {
          // V1 fallback: A/B/C
          const userChoice = answers[id];
          let match = 0;
          if (userChoice === candPos) match = 1;
          weightedScore += match * importance;
        }
        weightedTotal += importance;
      });

      if (weightedTotal === 0) return null;
      return Math.round((weightedScore / weightedTotal) * 100);
    }

    function deriveVoterPos(issueId, answers, checkedStatements) {
      const ans = answers?.[issueId];
      if (!ans || ans === 'D') return ans || null;
      if (ans !== 'S') return ans; // legacy A/B/C
      const stmtData = checkedStatements?.[issueId];
      if (!stmtData?.reactions) return null;
      const reactions = stmtData.reactions;
      const total = Object.keys(reactions).length;
      if (total === 0) return null;
      const agrees = Object.values(reactions).filter(r => r === 'up').length;
      const disagrees = total - agrees;
      const voice = ISSUE_VOICE[issueId] || 'LEFT';
      const aRate = voice === 'LEFT' ? agrees / total : disagrees / total;
      const cRate = voice === 'RIGHT' ? agrees / total : disagrees / total;
      if (aRate >= 0.67) return 'A';
      if (cRate >= 0.67) return 'C';
      return 'B';
    }

    // Office descriptions use **text** to render that phrase in bold caps
    function formatDescription(text) {
      return text.split(/\*\*(.+?)\*\*/g).map((part, i) =>

    function formatOfficeLines(office) {
      const clean = office.replace(/ of Texas$/i, '').replace(/ of the State of Texas$/i, '');
      const lines = [];
      let rest = clean;
      // "X County" goes on its own top line
      const county = rest.match(/^(.+? County)\s+(.+)$/);
      if (county) { lines.push(county[1]); rest = county[2]; }
      // Remaining parts split on the em/en-dash separator (office on its own line, Place/Precinct/seat on the last)
      rest.split(/\s*[—–]\s*/).forEach(p => {
        const t = p.trim().replace(/\bPl\b/gi, 'Place').replace(/\bPct\b/gi, 'Precinct');
        if (!t) return;
        // Pull a trailing "No. N" / "Place N" / "Precinct N" onto its own line so e.g.
        // "Court at Law No. 1" reads as office line + number line (county already split above).
        const tail = t.match(/^(.+?)[,\s]+((?:No\.?|Place|Precinct)\s*\d+)$/i);
        if (tail && tail[1].trim()) {
          lines.push(tail[1].trim());
          lines.push(tail[2].replace(/^No\.?\s*/i, 'No. '));
        } else {
          lines.push(t);
        }
      });
      return lines;
    }

    function withTimeout(promise, ms, fallback) {

        // We swallow it so the screen never freezes — manual entry + the button

        window.gm_authFailure = () => {};
        function initAutocomplete() {
          try {
            if (!inputRef.current || !window.google?.maps?.places?.Autocomplete) return;
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') return;
            const ac = new window.google.maps.places.Autocomplete(inputRef.current, {
              types: ['address'],
              componentRestrictions: { country: 'us' },
              fields: ['formatted_address']

            ac.addListener('place_changed', () => {

              if (place.formatted_address && inputRef.current) {
                inputRef.current.value = place.formatted_address;
              }
            });
          } catch (e) { /* autocomplete unavailable — manual entry still works */ }

        if (!window.google) {
          const script = document.createElement('script');
          script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_API_KEY}&libraries=places`;
          script.async = true;
          script.defer = true;
          script.onload = initAutocomplete;
          script.onerror = () => {};
          document.head.appendChild(script);
        } else {
          initAutocomplete();

      async function handleSearch() {
        const addr = inputRef.current?.value?.trim() || '';
        if (!addr) { setError('Please enter your street address.'); return; }
        if (addr.includes('@')) { setError('That looks like an email. Please enter your street address.'); return; }
        setIsSearching(true);
        setError(null);
        try {
          const GEOCODIO_KEY = '59cc9999fb36698b393c3f1c3861cab815fb35c';
          const res = await fetch(`https://api.geocod.io/v1.9/geocode?q=${encodeURIComponent(addr)}&fields=cd120,stateleg&api_key=${GEOCODIO_KEY}`);
          if (!res.ok) throw new Error('Lookup failed');
          const data = await res.json();
          const result = data.results && data.results[0];
          if (!result) {
            setError('Address not found. Try the full address with city and state (e.g. 123 Main St, San Marcos, TX 78666).');
            setIsSearching(false);
            return;
          }
          const components = result.address_components || {};
          // Geocodio "matches" almost any garbage (e.g. an email) to a random place with no street number.
          // Require a real street number before we ever claim an out-of-area county.
          if (!components.number) {
            setError("That doesn't look like a complete street address. Please include your street number, city, and ZIP.");
            setIsSearching(false);
            return;
          }
          const detectedCounty = (components.county || '').toLowerCase().replace(' county', '').trim();
          const SUPPORTED_COUNTIES = { hays: 'hays', travis: 'travis' };
          const matchedCounty = Object.keys(SUPPORTED_COUNTIES).find(k => detectedCounty.includes(k));
          if (!matchedCounty) {
            setError(`This guide currently covers Hays and Travis counties. We matched your address to ${result.formatted_address || 'an address'} in ${components.county || 'an unsupported county'} — if that's not you, try retyping your full address with city and ZIP.`);
            setIsSearching(false);
            return;
          }
          const fields = result.fields || {};
          const loc = result.location;
          const cd = fields.congressional_districts && fields.congressional_districts[0];
          const stateLeg = fields.state_legislative_districts || {};
          const senate = stateLeg.senate && stateLeg.senate[0];

          let commPrecinct = null, jpPrecinct = null;
          try {

              ]), 6000, [null, null]);
              if (commData?.features?.[0]?.attributes?.CommPrcnt != null) commPrecinct = String(commData.features[0].attributes.CommPrcnt);
              if (jpData?.features?.[0]?.attributes?.PRECINCT != null) jpPrecinct = String(jpData.features[0].attributes.PRECINCT);

              ]), 6000, [null, null]);
              if (commData?.features?.[0]?.attributes?.PRECINCT != null) commPrecinct = String(commData.features[0].attributes.PRECINCT);
              if (jpData?.features?.[0]?.attributes?.PRECINCT != null) jpPrecinct = String(jpData.features[0].attributes.PRECINCT);

          script.async = true; script.defer = true;

          script.onerror = () => {};

      async function handleSearch(overrideAddr) {

        const addr = (typeof overrideAddr === 'string' ? overrideAddr : (exploreAddrRef.current || inputRef.current?.value?.trim())) || '';
        if (!addr) { setError('Please enter your street address.'); return; }
        if (addr.includes('@')) { setError('That looks like an email. Please enter your street address.'); return; }
        setIsSearching(true); setError(null);

        // STEP 1 — Geocode the address (its own try/catch so failures here say so honestly)
        let result;
        try {
          const GEOCODIO_KEY = '59cc9999fb36698b393c3f1c3861cab815fb35c';
          const res = await fetch(`https://api.geocod.io/v1.9/geocode?q=${encodeURIComponent(addr)}&fields=cd120,stateleg&api_key=${GEOCODIO_KEY}`);
          if (!res.ok) {
            let detail = '';
            try { const e = await res.json(); detail = e.error || ''; } catch(_) {}
            console.error('[VYV] Geocodio HTTP', res.status, detail);
            if (res.status === 422) { setError('That address could not be found. Please include street, city, and ZIP.'); }
            else if (res.status === 403) { setError('Address lookup is temporarily over its limit. Please try again shortly.'); }
            else { setError(`Address lookup failed (error ${res.status}). Please try again.`); }
            setIsSearching(false); return;
          }
          const data = await res.json();
          result = data.results && data.results[0];
          if (!result) { setError('Address not found. Try the full address with city and state.'); setIsSearching(false); return; }
        } catch (err) {
          console.error('[VYV] Geocodio fetch threw:', err);
          setError('Could not reach the address lookup service. Check your connection and try again.');
          setIsSearching(false); return;
        }

        // STEP 2 — County match + district extraction (cannot fail the lookup; defaults are safe)
        const components = result.address_components || {};
        // Geocodio fuzzy-matches garbage (e.g. an email) to a random place with no street number — don't claim "not available in <county>" for that.
        if (!components.number) {
          setError("That doesn't look like a complete street address. Please include your street number, city, and ZIP.");
          setIsSearching(false); return;
        }
        const detectedCounty2 = (components.county || '').toLowerCase().replace(' county', '').trim();
        const matchedCounty2 = ['hays', 'travis'].find(k => detectedCounty2.includes(k));
        if ((components.state || 'TX') !== 'TX') {
          setError("This guide covers Texas elections — that address looks like it's outside Texas.");
          setIsSearching(false); return;
        }
        if (!matchedCounty2) {

          const f2 = result.fields || {};
          const cd2 = f2.congressional_districts && f2.congressional_districts[0];
          const sl2 = f2.state_legislative_districts || {};
          if (onCountyDetected) onCountyDetected('texas', components.county || 'Texas', {
            countyName: components.county || 'your county',
            address: result.formatted_address || ''
          });
          onContinue({
            congressionalDistrict: cd2 ? String(cd2.district_number) : null,

            commissionerPrecinct: null,
            jpPrecinct: null
          });
          setIsSearching(false); return;
        }
        const fields = result.fields || {};
        const loc = result.location || {};
        const cd = fields.congressional_districts && fields.congressional_districts[0];
        const stateLeg = fields.state_legislative_districts || {};
        const senate = stateLeg.senate && stateLeg.senate[0];
        const house = stateLeg.house && stateLeg.house[0];

        // STEP 3 — Optional precinct lookup (Hays only). Never blocks the result.

              fetch(`https://services5.arcgis.com/bVphnK8rPe5MHUSr/arcgis/rest/services/HaysCoJusticeOfPeace/FeatureServer/0/query?geometry=${loc.lng},${loc.lat}&geometryType=esriGeometryPoint&inSR=4326&spatialRel=esriSpatialRelIntersects&outFields=PRECINCT&f=json`).then(r=>r.json()).catch(()=>null)
            ]), 6000, [null, null]);
            if (commData?.features?.[0]?.attributes?.CommPrcnt != null) commPrecinct = String(commData.features[0].attributes.CommPrcnt);
            if (jpData?.features?.[0]?.attributes?.PRECINCT != null) jpPrecinct = String(jpData.features[0].attributes.PRECINCT);
          } else if (matchedCounty2 === 'travis' && loc.lng != null && loc.lat != null) {

            ]), 6000, [null, null]);
            if (commData?.features?.[0]?.attributes?.PRECINCT != null) commPrecinct = String(commData.features[0].attributes.PRECINCT);
            if (jpData?.features?.[0]?.attributes?.PRECINCT != null) jpPrecinct = String(jpData.features[0].attributes.PRECINCT);
          }
        } catch(e) { console.warn('[VYV] precinct lookup skipped:', e); }

        // STEP 4 — Hand off to results. Done.
        if (onCountyDetected) onCountyDetected(matchedCounty2);
        onContinue({
          congressionalDistrict: cd ? String(cd.district_number) : null,
          stateSenate: senate ? String(senate.district_number) : null,
          stateHouse: house ? String(house.district_number) : null,

        });
        setIsSearching(false);

    function Landing({ onQuiz, onBrowse, onSummary, onStartOver, onLogo, county, setCounty, counties, dataSource, issues, answers = {}, checkedStatements = {}, picker = false }) {
      const available = true;
      const [confirmReset, setConfirmReset] = useState(false);
      const [hoveredIssue, setHoveredIssue] = useState(null);
      const [showBrowseModal, setShowBrowseModal] = useState(false);
      const answeredCount = Object.keys(answers).length;
      const issueList = issues.length ? issues : ISSUES;

      // Icon-grid entrance cascade: tiles stay hidden until their icon image
      // loads, then pop in staggered. Plays once per page load — returning to
      // the landing screen mid-session skips it (cascadeSkip).
      const cascadeSkip = useRef(window.__gridCascadePlayed === true).current;
      const [iconsReady, setIconsReady] = useState(() => new Set());
      const markIconReady = (id) => setIconsReady(prev => { if (prev.has(id)) return prev; const s = new Set(prev); s.add(id); return s; });
      useEffect(() => {
        if (cascadeSkip) return;
        // Safety net: if an onLoad never fires (cache edge cases, blocked image),
        // force-reveal everything so no tile is stranded invisible.
        const reveal = setTimeout(() => setIconsReady(new Set(issueList.map(i => i.id))), 2500);
        const played = setTimeout(() => { window.__gridCascadePlayed = true; }, 1600);
        return () => { clearTimeout(reveal); clearTimeout(played); };
      }, []);

      // Mobile hero banner: cycle the pitch (tour line shows 4s per pass),
      // loop a couple of times, then rest on the tour line for good.
      const [heroBeat, setHeroBeat] = useState(0);
      const heroLoops = useRef(0);
      useEffect(() => {
        if (picker) return;
        if (heroBeat >= 2) {
          if (heroLoops.current >= 2) return; // done looping — rest on the tour line
          const t = setTimeout(() => { heroLoops.current += 1; setHeroBeat(0); }, 4000);
          return () => clearTimeout(t);
        }
        const t = setTimeout(() => setHeroBeat(heroBeat + 1), 3200);
        return () => clearTimeout(t);
      }, [heroBeat]);

      const openTour = () => { if (window.VYVTutorial) window.VYVTutorial.open(); };

      return (
        <div className="min-h-screen flex flex-col" style={{background:'linear-gradient(160deg,#0f172a 0%,#020617 100%)'}}>

          {/* Header — picker mode: no logo, just the animated no-pressure pitch */}
          {picker ? (
          <header className="relative pt-12 lg:pt-14 pb-1 px-6">

    // ─── QUIZ ───
    function Quiz({ onSave, onBack, onStartOver, onHome, onSavePartial, issue, initialAnswer = null, initialRank = null, initialReactions = null, answers = {}, onSummary }) {
      // reactions[i] = 'up' | 'down' | undefined
      const [reactions, setReactions] = useState(() => initialReactions || {});
      const [rank, setRank] = useState(initialRank ?? 5);
      const [showContext, setShowContext] = useState(false);
      const statements0 = (ISSUE_STATEMENTS[(issue || {}).topic] || []).slice(0, 3);
      const [cardIndex, setCardIndex] = useState(() => (initialReactions && Object.keys(initialReactions).length > 0) ? statements0.length : 0);
      const [flash, setFlash] = useState(null); // 'up' | 'down' | null
      const [skippedSet, setSkippedSet] = useState({});

      useEffect(() => { window.scrollTo(0, 0); }, []);

      if (!issue) return null;

      const statements = (ISSUE_STATEMENTS[issue.topic] || []).slice(0, 3);
      const ACCENT = '#f59e0b';
      const anyReacted = Object.keys(reactions).length > 0;

      const allDone = cardIndex >= statements.length;

      function react(dir) {
        const i = cardIndex;
        // Analytics: the statement-level signal — which statements users agree/disagree with
        vyvTrack('statement_response', { issue: (issue || {}).topic || (issue || {}).id || '', statement: String(i + 1), response: dir === 'up' ? 'agree' : 'disagree' });
        setFlash(dir);
        setTimeout(() => {
          setFlash(null);
          setReactions(prev => ({ ...prev, [i]: dir }));
          setSkippedSet(prev => { const n = {...prev}; delete n[i]; return n; });
          setCardIndex(i + 1);
        }, 320);
      }

      function skipCard() {
        vyvTrack('statement_response', { issue: (issue || {}).topic || (issue || {}).id || '', statement: String(cardIndex + 1), response: 'skip' });
        // Clear any prior Agree/Disagree so changing an answer to "No Opinion" actually sticks
        setReactions(prev => { const n = {...prev}; delete n[cardIndex]; return n; });
        setSkippedSet(prev => ({ ...prev, [cardIndex]: true }));
        if (cardIndex + 1 >= statements.length && !anyReacted) {
          handleSkip();
        } else {
          setCardIndex(cardIndex + 1);
        }
      }

      function handleSkip() {
        onSave('D', 3);
      }

      function handleSave() {
        if (!anyReacted) { onSave(null, null, null); return; }
        const ups = Object.values(reactions).filter(r => r === 'up').length;
        const score = ups / statements.length;
        onSave('S', rank || 5, { reactions, score });
      }

      return (
        <div className="min-h-screen flex flex-col" style={{background:'linear-gradient(160deg,#1e1b4b 0%,#0f172a 60%,#0c1a2e 100%)'}}>

                {/* Build My Ballot shortcut */}

                </div>
                {/* Compact clickable statement rows */}
                <div className="flex flex-col gap-1 mb-1">
                  {statements.map((stmt, i) => {

                        }
                        <span className="text-[13px] font-semibold" style={{color:'rgba(255,255,255,0.5)'}}>Statement {i+1}</span>

                          {skipped
                            ? <><span style={{color:'rgba(255,255,255,0.25)'}}>Skipped</span><span style={{color:'rgba(255,255,255,0.55)'}}> · answer</span></>

                            : <><span style={{color: r === 'up' ? '#22c55e' : '#ef4444'}}>{r === 'up' ? 'Agreed' : 'Disagreed'}</span><span style={{color:'#d97706'}}> · change</span></>
                          }

                </div>

                {/* Slider */}
                <div className="p-4 rounded-2xl" style={{border:`2px solid ${ACCENT}`, background:`linear-gradient(160deg,${ACCENT}0e,${ACCENT}04)`}}>
                  <div className="flex items-center justify-between mb-3">
                    <p className="text-[14px] font-black text-slate-300 uppercase tracking-wider leading-tight">How important is this issue<br/>to your vote?</p>
                    <span className="text-sm font-black shrink-0 ml-2" style={{color: rank ? ACCENT : 'rgba(255,255,255,0.2)', minWidth:'36px', textAlign:'right'}}>{rank ? `${rank}/10` : '–'}</span>
                  </div>
                  <div className="relative py-2">
                    <div className="absolute inset-y-0 flex items-center w-full pointer-events-none">
                      <div className="w-full rounded-full" style={{height:'8px', background: rank ? `linear-gradient(to right,${ACCENT}22 0%,${ACCENT} ${(rank-1)/9*100}%,rgba(255,255,255,0.12) ${(rank-1)/9*100}%,rgba(255,255,255,0.12) 100%)` : 'rgba(255,255,255,0.12)'}}/>
                    </div>
                    <input type="range" min="1" max="10" step="1"
                      value={rank || 5}
                      onChange={e => setRank(Number(e.target.value))}
                      className="relative w-full appearance-none cursor-pointer importance-slider"
                      style={{'--slider-color':ACCENT,'--slider-glow':rank?`0 0 ${4+(rank-1)*3}px ${2+(rank-1)*2}px ${ACCENT}`:'none',outline:'none',border:'none',background:'transparent',zIndex:1}}
                    />
                  </div>
                  <div className="flex justify-between mt-2">
                    <span className="text-[10px] font-bold text-slate-300">Less important</span>
                    <span className="text-[10px] font-bold text-slate-300">Most important</span>
                  </div>
                </div>

                {rank && (
                  <button onClick={handleSave} className={BTN.std} style={BTN_STYLE.amber}>
                    Submit
                  </button>
                )}

                {Object.keys(answers).length > 0 && onSummary && (
                  <button onClick={onSummary} className={BTN.std} style={BTN_STYLE.blue}>
                    Find My Matches ({Object.keys(answers).length}/9) →
                  </button>
                )}
              </div>
            )}
          </div>

    }

    // ─── SUMMARY ───
    function Summary({ issues, answers, ranks, onMatchAll, onMatchMine, onCompareMine, onViewConstellation, onAnswerMore, onHome, onStartOver, onBallot, county }) {
      const [showChallenge, setShowChallenge] = React.useState(false);
      const [showAddressModal, setShowAddressModal] = React.useState(false);
      const [ballotMode, setBallotMode] = React.useState(false);
      const [compareMode, setCompareMode] = React.useState(false);
      const [copied, setCopied] = React.useState(false);
      const [showDrop, setShowDrop] = React.useState(false);

      function handleCopy() {
        const url = buildChallengeUrl(answers, ranks);
        navigator.clipboard.writeText(url).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      }

      function handleEmail() {
        const url = buildChallengeUrl(answers, ranks);
        const subject = encodeURIComponent("I challenged you on VoteYourViews.org");
        const body = encodeURIComponent(`I just ranked my beliefs on VoteYourViews.org.\n\nTake the quiz and see how your views compare to mine:\n${url}\n\nIt only takes a few minutes!`);
        window.open(`mailto:?subject=${subject}&body=${body}`);
      }

      function handleText() {
        const url = buildChallengeUrl(answers, ranks);
        const msg = encodeURIComponent(`I challenged you on VoteYourViews.org — take the quiz and see how your views compare to mine: ${url}`);
        window.open(`sms:?&body=${msg}`);
      }
      const VIEW_LABEL  = { A: 'Liberal', B: 'Moderate', C: 'Conservative', D: 'No Opinion' };
      const VIEW_COLOR  = { A: '#3b82f6', B: '#a855f7', C: '#ef4444', D: '#64748b' };
      const VIEW_BG     = { A: 'rgba(59,130,246,0.22)', B: 'rgba(168,85,247,0.22)', C: 'rgba(239,68,68,0.22)', D: 'rgba(100,116,139,0.15)' };
      const VIEW_BG_TOP = { A: 'rgba(59,130,246,0.38)', B: 'rgba(168,85,247,0.38)', C: 'rgba(239,68,68,0.38)', D: 'rgba(100,116,139,0.22)' };

      const answeredIssues   = issues.filter(i => answers[i.id]);
      const unansweredIssues = issues.filter(i => !answers[i.id]);
      const answeredCount    = answeredIssues.length;
      const canConstellation = answeredCount >= 3;

      // Sort answered by rank descending (most important first), then unanswered at end
      const sortedAnswered = [...answeredIssues].sort((a,b) => (ranks[b.id]||5) - (ranks[a.id]||5));
      const allIssuesOrdered = [...sortedAnswered, ...unansweredIssues];
      // Only show #1 badge if the top issue has a strictly higher rank than the second
      const topRank = sortedAnswered[0] ? (ranks[sortedAnswered[0].id]||5) : 0;
      const secondRank = sortedAnswered[1] ? (ranks[sortedAnswered[1].id]||5) : 0;
      const hasUniqueTop = sortedAnswered.length > 0;
      const topRankValue = sortedAnswered[0] ? (ranks[sortedAnswered[0].id]||5) : 0;
      // Dominant color — most common view among answered issues
      const viewCounts = { A:0, B:0, C:0 };
      answeredIssues.forEach(i => { if(answers[i.id] && answers[i.id] !== 'D') viewCounts[answers[i.id]]++; });
      const dominantChoice = Object.entries(viewCounts).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'A';
      const dominantColor = VIEW_COLOR[dominantChoice] || '#3b82f6';
      const dominantColorDark = dominantChoice === 'C' ? '#991b1b' : dominantChoice === 'B' ? '#7e22ce' : '#1d4ed8';
      const dominantColorMid = dominantChoice === 'C' ? '#dc2626' : dominantChoice === 'B' ? '#9333ea' : '#2563eb';

      return (
        <div className="min-h-screen flex flex-col" style={{background:'linear-gradient(160deg,#0f172a 0%,#020617 100%)'}}>

          {/* Header */}
          <div className="border-b border-slate-800 px-4 py-3">
            <div className="max-w-5xl mx-auto flex items-center justify-between">
              <button onClick={onHome} className="text-sm text-slate-400 hover:text-white font-medium transition-colors">{HOME_LABEL}</button>
              <div className="text-sm font-bold text-white tracking-wide uppercase" style={{fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'0.1em'}}>Your Views</div>
              <button onClick={onStartOver} className="text-xs text-slate-500 hover:text-red-400 font-medium transition-colors">Start Over</button>
            </div>
          </div>

          <div className="flex-1 max-w-5xl mx-auto w-full px-4 lg:px-24 py-4">

            {/* Headline */}
            <div className="mb-3 text-center">
              <h1 className="font-black text-2xl lg:text-4xl leading-tight mb-1">
                <span className="text-slate-400 font-light text-lg lg:text-2xl lowercase mr-1">your</span>
                <span className="text-white uppercase">View of Views</span>
              </h1>
            </div>

            {/* ── Answered issues ── */}
            {sortedAnswered.length > 0 && (
              <>
                <div className="flex flex-col gap-1.5 mb-2 mt-10">
                  <div className="flex items-center gap-2">
                    <div className="flex gap-1">
                      {Array.from({length:9},(_,i) => {
                        const dotIssue = sortedAnswered[i];
                        const dotColor = dotIssue ? VIEW_COLOR[answers[dotIssue.id]] : null;
                        return <div key={i} className="w-5 h-2 rounded-full transition-all" style={{background: dotColor || 'rgba(255,255,255,0.12)'}} />;
                      })}
                    </div>
                    <span className="text-slate-400 text-[10px] font-bold">{answeredCount}/9</span>
                  </div>
                  <span className="text-slate-500 text-[10px] uppercase tracking-widest font-semibold">Your Custom Ranking</span>
                </div>
                <div className="grid grid-cols-3 lg:grid-cols-5 gap-3 lg:gap-4 mb-3">
                  {sortedAnswered.map((issue, idx) => {
                    const choice = answers[issue.id];
                    const rank = ranks[issue.id] || 0;
                    const color = VIEW_COLOR[choice];
                    const isTopIssue = (ranks[issue.id]||5) === topRankValue && hasUniqueTop;
                    return (
                      <button
                        key={issue.id}
                        onClick={() => onAnswerMore(issue.id)}
                        className="group relative flex flex-col items-center rounded-2xl overflow-hidden transition-all hover:scale-105"
                        style={{
                          background: isTopIssue
                            ? `linear-gradient(160deg, ${VIEW_BG_TOP[choice]}, rgba(255,255,255,0.12))`
                            : `linear-gradient(160deg, ${VIEW_BG[choice]}, rgba(255,255,255,0.09))`,
                          border: isTopIssue ? `2px solid ${color}` : `1px solid ${color}aa`,
                          boxShadow: isTopIssue ? `0 0 28px ${color}66, 0 0 10px ${color}44` : `0 0 14px ${color}38`
                        }}
                      >
                        {/* Fixed-size image area */}
                        <div className="w-full px-3 pt-3 flex-shrink-0">
                          <div className="w-full" style={{height:'85px', display:'flex', alignItems:'center', justifyContent:'center'}}>
                            <img
                              src={`/icons/Symbols/${issue.symbol}.png`}
                              alt={issue.topic}
                              style={{maxWidth:'90%', maxHeight:'85px', objectFit:'contain'}}
                              onError={e => { e.target.style.display='none'; }}
                            />
                          </div>
                        </div>
                        {/* Fixed rank bar area */}
                        <div className="w-full px-2 pt-2" style={{height:'36px'}}>
                          {rank > 0 && (
                            <>
                              <div className="flex gap-0.5">
                                {Array.from({length:10},(_,i)=>i+1).map(n => (
                                  <div key={n} className="flex-1 h-2 rounded" style={{background: n <= rank ? color : 'rgba(255,255,255,0.12)'}} />
                                ))}
                              </div>
                              <p className="text-[10px] text-right mt-0.5 font-black" style={{color: 'rgba(255,255,255,0.75)'}}>{rank}/10</p>
                            </>
                          )}
                        </div>
                        {/* Fixed text area — always 2-line topic height */}
                        <div className="w-full px-2 pb-3 text-center">
                          <p className="text-white text-sm font-bold leading-tight mb-0" style={{fontFamily:"'Barlow Condensed',sans-serif", minHeight:'2.5em', display:'flex', alignItems:'center', justifyContent:'center'}}>{issue.topic.replace(' & Border','').replace('Reproductive','Reprod.')}</p>
                          <p className="text-xs font-bold mt-0" style={{color, marginTop:'-2px'}}>{VIEW_LABEL[choice]}</p>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </>
            )}

            {/* ── 3 CTAs ── */}
            <div className={`max-w-xl mx-auto mb-3 px-2 ${answeredCount === 0 ? 'opacity-30 pointer-events-none' : ''}`} style={{marginTop:'70px'}}>
              <div className="flex flex-col gap-2">
                  <div className={`relative ${BTN.wrap}`}>
                    <div className="flex rounded-full overflow-hidden"
                      style={{background:`linear-gradient(90deg,${dominantColorDark},${dominantColorMid})`}}>
                      <button onClick={() => setShowDrop(d => !d)}
                        className={`flex-1 ${BTN.primary}`}
                        style={{letterSpacing:'0.12em'}}>
                        Candidates
                      </button>
                      <button onClick={() => setShowDrop(d => !d)}
                        className="px-4 border-l border-white/20 text-white hover:bg-white/10 transition-colors flex items-center">
                        <svg className={`w-3.5 h-3.5 transition-transform ${showDrop ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}>
                          <path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/>
                        </svg>
                      </button>
                    </div>
                    {showDrop && (
                      <div className="absolute top-full mt-1 left-0 right-0 rounded-2xl overflow-hidden shadow-xl z-20 border border-white/10"
                        style={{background:'#1e293b'}}>
                        <button onClick={() => { setShowDrop(false); setBallotMode(true); setShowAddressModal(true); }}
                          className="w-full px-5 py-3 text-left text-xs font-black uppercase tracking-widest text-white hover:bg-white/10 transition-colors border-b border-white/10"
                          style={{letterSpacing:'0.1em'}}>
                          Build My Ballot
                        </button>
                        <button onClick={() => { setShowDrop(false); setCompareMode(true); setShowAddressModal(true); }}
                          className="w-full px-5 py-3 text-left text-xs font-black uppercase tracking-widest text-white hover:bg-white/10 transition-colors border-b border-white/10"
                          style={{letterSpacing:'0.1em'}}>
                          All Candidates
                        </button>
                        <button onClick={() => { setShowDrop(false); setShowAddressModal(true); }}
                          className="w-full px-5 py-3 text-left text-xs font-black uppercase tracking-widest text-white hover:bg-white/10 transition-colors"
                          style={{letterSpacing:'0.1em'}}>
                          My Candidates
                        </button>
                      </div>
                    )}
                  </div>
                <div className="flex items-center justify-center gap-3 py-2">
                  {[['Save','💾'],['Send','📤'],['Share','🔗']].map(([label], i) => (
                    <React.Fragment key={label}>
                      {i > 0 && <span className="text-slate-400 text-xs">•</span>}
                      <button onClick={() => setShowChallenge(true)}
                        className="text-xs font-black uppercase tracking-widest transition-all duration-150 hover:opacity-100 opacity-90"
                        style={{color: '#ffffff', letterSpacing:'0.14em'}}>
                        {label}
                      </button>
                    </React.Fragment>
                  ))}
                </div>
              </div>
            </div>

            {/* ── Address Modal ── */}
            {showAddressModal && (
              <AddressModal
                county={county || 'hays'}
                accentColor={dominantColorMid}
                accentColorDark={dominantColorDark}
                onClose={() => { setShowAddressModal(false); setBallotMode(false); setCompareMode(false); }}
                onContinue={(districts) => { setShowAddressModal(false); const wasCompare = compareMode, wasBallot = ballotMode; setBallotMode(false); setCompareMode(false); if (wasCompare) { onCompareMine(districts); } else if (wasBallot) { onBallot(districts); } else { onMatchMine(districts); } }}
                onShowAll={ballotMode ? undefined : () => { setShowAddressModal(false); setCompareMode(false); onMatchAll(); }}
              />
            )}

            {/* ── Challenge Modal ── */}
            {showChallenge && (
              <div className="fixed inset-0 z-50 flex items-center justify-center px-4" onClick={() => setShowChallenge(false)}>
                <div className="absolute inset-0 bg-black/60" />
                <div className="relative w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl border border-slate-700"
                     style={{background:'linear-gradient(160deg,#0f172a,#020617)'}}
                     onClick={e => e.stopPropagation()}>
                  <div className="px-6 pt-6 pb-2">
                    <h2 className="text-white font-black text-xl mb-1">Challenge a Friend</h2>
                    <p className="text-slate-400 text-sm leading-relaxed">Share this link. They take the quiz — then see how your views compare.</p>
                  </div>

                  {/* URL preview */}
                  <div className="mx-6 my-4 px-3 py-2 rounded-lg bg-slate-800 border border-slate-700">
                    <p className="text-slate-400 text-xs font-mono truncate">{buildChallengeUrl(answers, ranks)}</p>
                  </div>

                  {/* Options */}
                  <div className="px-6 pb-6 flex flex-col gap-2">
                    <button onClick={handleCopy}
                      className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl text-sm transition-colors flex items-center justify-center gap-2">
                      {copied ? '✓ Copied!' : '📋 Copy Link'}
                    </button>
                    <button onClick={handleEmail}
                      className="w-full py-3 border border-slate-600 text-slate-300 hover:border-slate-400 hover:text-white font-bold rounded-xl text-sm transition-colors flex items-center justify-center gap-2">
                      ✉️ Send Email
                    </button>
                    <button onClick={handleText}
                      className="w-full py-3 border border-slate-600 text-slate-300 hover:border-slate-400 hover:text-white font-bold rounded-xl text-sm transition-colors flex items-center justify-center gap-2">
                      💬 Send Text
                    </button>
                    <button onClick={() => setShowChallenge(false)}
                      className="w-full py-2 text-slate-500 hover:text-slate-300 text-sm font-medium transition-colors mt-1">
                      ✕ Close
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* ── Unanswered issues ── */}
            {unansweredIssues.length > 0 && (
              <>
                <div className="flex items-center gap-3 mb-4">
                  <div className="flex-1 border-t border-slate-500" />
                  <p className="text-white text-sm uppercase tracking-widest font-black whitespace-nowrap">+ Add more views</p>
                  <div className="flex-1 border-t border-slate-500" />
                </div>
                <div className="flex flex-wrap gap-2 mb-10">
                  {unansweredIssues.map((issue) => (
                    <button
                      key={issue.id}
                      onClick={() => onAnswerMore(issue.id)}
                      className="group relative flex flex-col items-center gap-1 transition-opacity duration-200"
                      style={{width: '72px'}}
                    >
                      <div className="relative w-full aspect-square rounded-xl overflow-hidden ring-1 ring-white/10 group-hover:ring-white/30 group-active:scale-95 transition-all duration-150 shadow-lg">
                        <img
                          src={`/icons/${issue.icon || issue.id}.png`}
                          alt={issue.topic}
                          className="w-full h-full object-cover"
                          onError={e => { e.target.style.display='none'; e.target.parentNode.style.background='#1e293b'; }}
                        />
                      </div>
                      <span className="text-slate-300 text-[10px] font-bold text-center leading-tight group-hover:text-white transition-all duration-150 px-0.5" style={{fontFamily:"'Barlow Condensed', sans-serif"}}>
                        {issue.topic.replace('Social Security & Medicare','Social Programs').replace('Housing & Affordability','Affordability')}
                      </span>
                    </button>
                  ))}
                </div>
              </>
            )}



          </div>
        </div>
      );
    }

    // ─── CONSTELLATION ───
    const STAR_COLORS  = { A: '#3b82f6', B: '#a855f7', C: '#ef4444', D: '#64748b' };
    const STAR_BASE_RGB = { A: [59,130,246], B: [168,85,247], C: [239,68,68], D: [100,116,139] };
    const CHOICE_LABEL = { A: 'Progressive', B: 'Moderate', C: 'Conservative', D: 'Independent' };

    // Returns an rgb() color for a star — same white→vivid interpolation as the rank gauge
    function starColor(choice, rank) {
      const [r, g, b] = STAR_BASE_RGB[choice] || STAR_BASE_RGB.D;
      const intensity = 0.18 + ((rank - 1) / 9) * 0.82; // 0.18 at rank 1 → 1.0 at rank 10
      const mix = ch => Math.round(255 - intensity * (255 - ch));
      return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
    }

    // Fixed constellation positions for up to 9 stars (% of SVG 400×300 viewbox)
    const STAR_POSITIONS = [
      { x: 50,  y: 22 }, // #1 — center-top (largest/most important)
      { x: 26,  y: 40 }, // #2
      { x: 73,  y: 35 }, // #3
      { x: 42,  y: 57 }, // #4
      { x: 18,  y: 62 }, // #5
      { x: 67,  y: 60 }, // #6
      { x: 34,  y: 76 }, // #7
      { x: 60,  y: 79 }, // #8
      { x: 80,  y: 50 }, // #9
    ];

    // Which star positions to connect with lines
    const CONNECTIONS = [[0,1],[0,2],[1,3],[2,5],[3,4],[3,5],[5,7],[4,6],[6,7],[2,8],[5,8]];

    function ConstellationScreen({ issues, answers, ranks, onContinue, onRetake }) {
      // Only issues the user answered (any choice including D)
      const answered = issues.filter(i => i.id in answers);
      // Sort descending by rank — highest rank = most important = biggest star
      const sorted = [...answered].sort((a, b) => (ranks[b.id] || 5) - (ranks[a.id] || 5));
      const topIssue = sorted[0];
      const topChoice = topIssue ? answers[topIssue.id] : null;
      const topRank   = topIssue ? (ranks[topIssue.id] || 5) : 10;
      const topColor  = topChoice ? starColor(topChoice, topRank) : '#3b82f6';
      const topColorVivid = topChoice ? STAR_COLORS[topChoice] : '#3b82f6';

      // Star radius: rank 10 → 20px, rank 1 → 5px
      const starR = rank => Math.round(5 + (rank - 1) * 1.67);

      // Figure out the dominant lean
      const choiceCounts = { A: 0, B: 0, C: 0, D: 0 };
      answered.forEach(i => { choiceCounts[answers[i.id]]++; });
      const dominant = Object.entries(choiceCounts).sort((a,b) => b[1]-a[1])[0]?.[0] || 'A';
      const leanLabel = CHOICE_LABEL[dominant];
      const leanColor = STAR_COLORS[dominant];

      return (
        <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center px-4 py-10">

          {/* ── The card ── */}
          <div className="w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl border border-slate-700/60"
               style={{ background: 'linear-gradient(160deg, #0f172a 0%, #020617 100%)' }}>

            {/* Header */}
            <div className="text-center pt-7 pb-1 px-6">
              <p className="text-slate-300 text-[10px] tracking-[0.2em] uppercase font-semibold">VoteYourViews.org</p>
              <h1 className="text-white text-xl font-black mt-1 tracking-tight">My Political Constellation</h1>
              <p className="text-slate-400 text-xs mt-0.5">Hays County, Texas · 2026</p>
            </div>

            {/* #1 issue banner */}
            {topIssue && (
              <div className="mx-5 mt-4 rounded-xl px-4 py-2.5 text-center"
                   style={{ backgroundColor: topColorVivid + '18', border: `1px solid ${topColorVivid}40` }}>
                <p className="text-[10px] uppercase tracking-widest font-semibold" style={{ color: topColorVivid + 'cc' }}>My #1 Issue</p>
                <p className="text-white font-black text-lg leading-tight mt-0.5">{topIssue.topic}</p>
              </div>
            )}

            {/* SVG star field */}
            <svg viewBox="0 0 400 320" className="w-full px-2 mt-1">
              {/* Background twinkle dots */}
              {[[15,20],[85,10],[90,70],[10,80],[50,90],[30,50],[70,85],[5,45]].map(([x,y],i) => (
                <circle key={i} cx={x*4} cy={y*3} r="1" fill="#ffffff" opacity="0.2" />
              ))}
              {/* Connecting lines */}
              {CONNECTIONS.map(([i,j]) => {
                if (!sorted[i] || !sorted[j]) return null;
                const p1 = STAR_POSITIONS[i], p2 = STAR_POSITIONS[j];
                return (
                  <line key={`${i}-${j}`}
                    x1={p1.x*4} y1={p1.y*3}
                    x2={p2.x*4} y2={p2.y*3}
                    stroke="#334155" strokeWidth="1" strokeDasharray="3 3" />
                );
              })}
              {/* Stars */}
              {sorted.map((issue, idx) => {
                const pos = STAR_POSITIONS[idx];
                if (!pos) return null;
                const cx = pos.x * 4, cy = pos.y * 3;
                const rank = ranks[issue.id] || 5;
                const r = starR(rank);
                const choice = answers[issue.id] || 'D';
                const color = starColor(choice, rank);
                const shortLabel = issue.topic.replace(' & ', '/').split(' ').slice(0,3).join(' ');
                return (
                  <g key={issue.id}>
                    {/* Glow — same intensity color, faded */}
                    <circle cx={cx} cy={cy} r={r + 7} fill={color} opacity="0.15" />
                    <circle cx={cx} cy={cy} r={r + 3} fill={color} opacity="0.25" />
                    {/* Star */}
                    <circle cx={cx} cy={cy} r={r} fill={color} />
                    {/* Rank badge for #1 — use vivid color so label is readable */}
                    {idx === 0 && (
                      <text x={cx} y={cy - r - 7} textAnchor="middle" fill={STAR_COLORS[choice] || color} fontSize="9" fontWeight="700">#1</text>
                    )}
                    {/* Label */}
                    <text x={cx} y={cy + r + 13} textAnchor="middle" fill="#94a3b8" fontSize="9">{shortLabel}</text>
                  </g>
                );
              })}
            </svg>

            {/* Legend */}
            <div className="flex justify-center gap-4 px-6 pb-2">
              {[['A','#3b82f6','Progressive'],['B','#a855f7','Moderate'],['C','#ef4444','Conservative']].map(([k,c,label]) => (
                choiceCounts[k] > 0 && (
                  <div key={k} className="flex items-center gap-1.5">
                    <div className="w-2 h-2 rounded-full" style={{ backgroundColor: c }} />
                    <span className="text-slate-400 text-[10px]">{label}</span>
                  </div>
                )
              ))}
            </div>

            {/* Lean summary */}
            <div className="text-center pb-5 px-6">
              <p className="text-[10px] text-slate-400 uppercase tracking-widest">Overall Lean</p>
              <p className="font-black text-sm mt-0.5" style={{ color: leanColor }}>{leanLabel}</p>
              <p className="text-[10px] text-slate-500 mt-3">Find your constellation · VoteYourViews.org</p>
            </div>
          </div>

          {/* CTAs */}
          <button
            onClick={onContinue}
            className="mt-7 w-full max-w-sm py-4 bg-white text-slate-900 font-black rounded-xl hover:bg-slate-100 transition-colors text-base tracking-tight"
          >
            Match My Candidates →
          </button>

          <button
            onClick={() => alert('Sharing coming soon! Your constellation card will be shareable as an image and link.')}
            className="mt-3 w-full max-w-sm py-3.5 border border-slate-600 text-slate-300 font-semibold rounded-xl hover:border-slate-400 hover:text-white transition-colors text-sm flex items-center justify-center gap-2"
          >
            <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
            Share My Constellation
          </button>

          <button
            onClick={onRetake}
            className="mt-3 text-slate-600 text-sm hover:text-slate-400 transition-colors"
          >
            ← Retake the Quiz
          </button>
        </div>
      );
    }

    // ─── HEADER: shared category tabs + county switcher ───
    // Monochrome glyphs (recolor with tab state) — distinct + visible at small size.
    const CATEGORY_ICON = {
      federal: (cls) => (
        <svg className={cls} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
          <path d="M12 3a3.5 3.5 0 013.5 3.5h-7A3.5 3.5 0 0112 3z"/>
          <path d="M6 10.5h12l-2.5-4h-7l-2.5 4z"/>
          <path d="M7 10.5v8m3.5-8v8m3.5-8v8m3-8v8"/>
          <path d="M4.5 21h15"/>
        </svg>
      ),
      state: (cls) => ( // Lone Star
        <svg className={cls} viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <path d="M12 2l2.7 6.1 6.6.6-5 4.4 1.5 6.5L12 16.7 6.2 20.1l1.5-6.5-5-4.4 6.6-.6L12 2z"/>
        </svg>
      ),
      county: (cls) => ( // civic building
        <svg className={cls} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
          <path d="M4 21V8l8-4 8 4v13"/>
          <path d="M3.5 21h17"/>
          <path d="M9.5 21v-4.5h5V21"/>
          <path d="M8 10.5h.01M16 10.5h.01M8 13.5h.01M16 13.5h.01"/>
        </svg>
      ),
      judicial: (cls) => ( // scales of justice
        <svg className={cls} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
          <path d="M12 4v16"/><path d="M7.5 20h9"/><path d="M5 7.5h14"/>
          <path d="M5 7.5l-2.3 4.8a2.7 2.7 0 005.6 0L6 7.5"/>
          <path d="M19 7.5l-2.3 4.8a2.7 2.7 0 005.6 0L20 7.5"/>
          <circle cx="12" cy="5" r="1.4" fill="currentColor" stroke="none"/>
        </svg>
      ),
    };

    // Segmented control — contained group, filled active segment, high-contrast tappable inactives.
    function CategoryTabs({ tabs, activeTab, setActiveTab, size = 'desktop' }) {
      const isMobile = size === 'mobile';
      return (
        <div className={`${isMobile ? 'flex w-full' : 'inline-flex'} gap-1 p-1 rounded-xl`}
          style={{ background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.10)' }}>
          {tabs.map(tab => {
            const isActive = tab.key === activeTab;
            if (tab.comingSoon) return (
              <button key={tab.key} title={`${tab.label} races for your county are coming soon — tap for details`}
                onClick={() => tab.onComingSoon && tab.onComingSoon()}
                className={`flex items-center justify-center rounded-lg font-black uppercase min-w-0 transition-all ${tab.pulse ? 'soon-pulse' : 'hover:bg-white/5'} ${isMobile ? 'flex-1 gap-1 py-2 px-0.5 text-[10px] tracking-tight' : 'gap-1.5 px-2.5 lg:px-5 py-2.5 text-[13px] lg:text-lg tracking-wide lg:tracking-widest'}`}
                style={{ background: 'transparent', color: '#94a3b8' }}>
                {!isMobile && CATEGORY_ICON[tab.key] && CATEGORY_ICON[tab.key]('w-5 h-5 shrink-0 hidden lg:block')}
                <span className="truncate">{tab.label}</span>

    // One-time callout shown ON the ballot page when the voter's county has no local data
    // yet: confirms the matched address (bad-geocode safety net), points at the County "Soon"
    // tab, and takes a waitlist email — the ballot itself is never gated behind it.
    function UncoveredCountyCallout({ notice, onDismiss, onChangeAddress }) {
      const [email, setEmail] = useState('');
      const [status, setStatus] = useState(null); // null|invalid|sending|sent
      async function submit() {
        const v = email.trim();
        if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v)) { setStatus('invalid'); return; }
        setStatus('sending');
        try {
          if (MAILING_LIST_URL) await Promise.race([
            fetch(MAILING_LIST_URL, { method: 'POST', mode: 'no-cors',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ email: v, county: notice.countyName, address: notice.address, source: 'voteyourviews-beta', ts: new Date().toISOString() }) }),
            new Promise(r => setTimeout(r, 4000))
          ]);
        } catch (e) {}
        setStatus('sent');
        setTimeout(onDismiss, 1600);
      }
      return (
        <div className="relative z-30 flex justify-center px-3 mt-3">
          <div className="callout-drop w-full max-w-md rounded-2xl px-7 py-6 relative"
            style={{background:'linear-gradient(160deg,#3b2606 0%,#1e293b 45%,#0f172a 100%)', border:'1.5px solid rgba(251,191,36,0.65)', boxShadow:'0 14px 44px rgba(0,0,0,0.65), 0 0 24px rgba(251,191,36,0.12)'}}>

            <p className="text-[11px] text-slate-400 leading-relaxed mb-3.5 pr-8">

              <button onClick={onChangeAddress} className="underline text-slate-300 hover:text-white">Change address</button>
            </p>
            <p className="text-white text-base font-bold leading-relaxed mb-1.5">
              <span className="inline-block animate-bounce mr-2 text-3xl align-middle">☝</span>
              All candidates are here except your local races.
            </p>
            <p className="text-lg font-black leading-relaxed mb-2.5">
              <span style={{color:'#fbbf24'}}>{(notice.countyName || '').toUpperCase()}</span>
              <span className="text-white"> is coming soon.</span>

            <p className="text-slate-300 text-sm leading-relaxed mb-4">Want an email the day they land?</p>
            <div className="flex gap-2">
              <input type="email" value={email} placeholder="your email"
                onChange={e => { setEmail(e.target.value); if (status === 'invalid') setStatus(null); }}
                onKeyDown={e => e.key === 'Enter' && submit()}
                className="flex-1 min-w-0 px-3 py-2 rounded-lg text-sm focus:outline-none border-2"
                style={{background:'#f8fafc', color:'#0f172a', borderColor: status === 'invalid' ? '#f87171' : 'transparent'}} />
              <button onClick={submit} disabled={status === 'sending' || status === 'sent'}
                className="shrink-0 px-3.5 py-2 font-black rounded-lg text-xs uppercase tracking-wider transition-all hover:brightness-110 active:scale-95"
                style={status === 'sent'
                  ? {background:'linear-gradient(90deg,#059669,#10b981)', color:'#fff'}

                {status === 'sent' ? "✓ On the list!" : status === 'sending' ? '…' : 'Keep me posted'}
              </button>
            </div>
            {status === 'invalid' && <p className="text-[11px] text-red-400 mt-1">Please enter a valid email address.</p>}

    // ─── RESULTS ───
    const RACE_SECTIONS = [

    function filterRacesByDistrict(races, userDistricts) {
      if (!userDistricts) return races;
      return races.filter(race => {
        if (!race.districtType) return true;
        const num = String(race.districtNumber);
        if (race.districtType === 'congressional') return !userDistricts.congressionalDistrict || userDistricts.congressionalDistrict === num;
        if (race.districtType === 'stateSenate') return !userDistricts.stateSenate || userDistricts.stateSenate === num;
        if (race.districtType === 'stateHouse') return !userDistricts.stateHouse || userDistricts.stateHouse === num;
        if (race.districtType === 'jpPrecinct') return !userDistricts.jpPrecinct || userDistricts.jpPrecinct === num;
        if (race.districtType === 'commissioner') return !userDistricts.commissionerPrecinct || userDistricts.commissionerPrecinct === num;
        if (race.districtType === 'constable') return !userDistricts.jpPrecinct || userDistricts.jpPrecinct === num; // Travis: constable precincts share JP boundaries
        // Courts of Appeals regions are keyed by COUNTY (Gov't Code ch.22), not by a geocoded
        // district — show only when the region is known; hidden (not over-shown) when unknown.
        if (race.districtType === 'coa') return Array.isArray(userDistricts.coa) && userDistricts.coa.includes(num);
        return true;
      });
    }



    // Shown in place of the State Senate race when the voter's district isn't up this cycle —

      );
      return (
        <div className="rounded-2xl overflow-hidden" style={{background:'rgba(255,255,255,0.11)', border:'1px solid rgba(255,255,255,0.14)'}}>

          {/* ── MOBILE layout (phones only, <768px) ── */}

              <div className="flex items-center flex-wrap gap-1.5 mb-1.5">{partyPill}</div>

            {/* Col 1: Race name */}

                  {nextUpLine}

          </div>

      );
    }

    function Results({ county, counties, setCounty, onCountyDetected, uncoveredNotice, onDismissNotice, onReopenNotice, issues, answers, ranks, checkedStatements, selected, setSelected, userDistricts, setUserDistricts, onBallot, onBack, onBrowse, onAddress, onRateIssue, initialProfile, clearInitialProfile, focusIssueId, clearFocusIssue }) {
      const countyData = counties[county];
      const [profileData, setProfileData] = React.useState(null); // { candidate, race }
      // Reopen the candidate profile after returning from a single-issue "rate this" quiz.
      React.useEffect(() => {
        if (initialProfile) { setProfileData(initialProfile); clearInitialProfile?.(); }
      }, [initialProfile]);
      const [showFilterModal, setShowFilterModal] = React.useState(false);
      const [activeTab, setActiveTab] = React.useState('federal');
      const [showAddr, setShowAddr] = React.useState(false);
      const [pendingBallot, setPendingBallot] = React.useState(false);
      const [collapsedGroups, setCollapsedGroups] = React.useState({});

      const answeredCount = Object.keys(answers).filter(id => answers[id] !== 'D').length;

      // Color the Save/Print CTA by the voter's own overall lean (same scheme as the
      // constellation + landing checkmarks): blue = progressive, red = conservative,
      // purple = mixed. Neutral slate when nothing is answered — never assume a side.
      const leanCounts = { A: 0, B: 0, C: 0 };
      issues.forEach(i => { const p = deriveVoterPos(i.id, answers, checkedStatements); if (leanCounts[p] !== undefined) leanCounts[p]++; });
      const ctaColors = leanCounts.A === 0 && leanCounts.B === 0 && leanCounts.C === 0
        ? { grad: 'linear-gradient(90deg,#334155,#475569)', border: '#94a3b8', glow: 'rgba(100,116,139,0.45)' }
        : leanCounts.A > leanCounts.C
          ? { grad: 'linear-gradient(90deg,#1d4ed8,#2563eb)', border: '#60a5fa', glow: 'rgba(37,99,235,0.45)' }
          : leanCounts.C > leanCounts.A
            ? { grad: 'linear-gradient(90deg,#b91c1c,#dc2626)', border: '#f87171', glow: 'rgba(220,38,38,0.45)' }
            : { grad: 'linear-gradient(90deg,#7e22ce,#9333ea)', border: '#c084fc', glow: 'rgba(147,51,234,0.45)' };

      const TABS = [
        { key: 'federal',  label: 'Federal' },
        { key: 'state',    label: 'State' },
        { key: 'county',   label: 'County' },
      ].map(t => ({ ...t, count: filterRacesByDistrict(countyData[t.key] || [], userDistricts).length, comingSoon: county === 'texas' && t.key === 'county',
        pulse: county === 'texas' && t.key === 'county' && uncoveredNotice && !uncoveredNotice.dismissed,
        onComingSoon: onReopenNotice }));

      return (
        <React.Fragment>
        <div className="min-h-screen flex flex-col" style={{background:'linear-gradient(160deg,#1e1b4b 0%,#0f172a 60%,#0c1a2e 100%)'}}>

          {/* Header — matches Compare Page */}
          <header className="sticky top-0 z-50" style={{background:'#0f172a', borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
            {/* Mobile */}
            <div className="lg:hidden px-4 py-3">
              <div className="flex items-center justify-between gap-2">
                <button onClick={onBack} className="text-sm font-medium flex items-center gap-1 shrink-0" style={{color:'#94a3b8'}}>← Back</button>
                <CountyBanner county={county} counties={counties} onMyCandidates={() => setShowAddr(true)} />
                <BetaChip />
              </div>
              <div className="mt-3">
                <CategoryTabs tabs={TABS} activeTab={activeTab} setActiveTab={setActiveTab} size="mobile" />
              </div>
            </div>
            {/* Desktop */}
            <div className="hidden lg:flex items-center h-16 px-8 relative max-w-6xl mx-auto">
              <div className="absolute left-8 flex items-center gap-2.5">
                <button onClick={onBack} className="text-sm font-semibold flex items-center gap-1.5 transition-colors" style={{color:'#94a3b8'}}>← Back</button>
                <BetaChip />
              </div>
              <div className="mx-auto">
                <CategoryTabs tabs={TABS} activeTab={activeTab} setActiveTab={setActiveTab} size="desktop" />
              </div>
              <div className="absolute right-8">
                <CountyBanner county={county} counties={counties} onMyCandidates={() => setShowAddr(true)} />
              </div>
            </div>
          </header>
          {county === 'texas' && uncoveredNotice && !uncoveredNotice.dismissed && !showAddr && (
            <UncoveredCountyCallout notice={uncoveredNotice} onDismiss={onDismissNotice}
              onChangeAddress={() => setShowAddr(true)} />
          )}
          {showAddr && (
            <AddressModal county={county} accentColor="#3b82f6" accentColorDark="#1d4ed8"
              onCountyDetected={onCountyDetected}
              onClose={() => { setShowAddr(false); setPendingBallot(false); }}
              onContinue={(districts) => { setUserDistricts(districts); setShowAddr(false); if (pendingBallot) { setPendingBallot(false); onBallot(); } }}
              onShowAll={pendingBallot ? undefined : () => setShowAddr(false)} />
          )}


          {showFilterModal && (
            <AddressModal
              county={county || 'hays'}
              accentColor="#2563eb"
              onClose={() => setShowFilterModal(false)}
              onContinue={(districts) => { if (setUserDistricts) setUserDistricts(districts); setShowFilterModal(false); }}
              onShowAll={() => { if (setUserDistricts) setUserDistricts(null); setShowFilterModal(false); }}
            />

          {/* Section header — solid banner naming the active section. Opaque + above the
              sticky race-row headers so they don't bleed through while scrolling under it. */}
          <div className="relative z-30" style={{background:'#1b2136', borderBottom:'1px solid rgba(255,255,255,0.08)'}}>

                <p className="text-white font-black uppercase tracking-wide text-[17px] leading-none" style={{fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:'0.06em'}}>
                  Your {TABS.find(t => t.key === activeTab)?.label} Candidates
                </p>
                <span className="text-[11px] font-bold" style={{color:'#34d399'}}>
                  {TABS.find(t => t.key === activeTab)?.count || 0} races
                </span>
              </div>
              <p className="text-[12px] mt-1" style={{color:'#a7b2c5'}}>
                We checked your answers against every candidate and pre-checked your closest match — tap a candidate to learn more, or change any pick.
                {answeredCount > 0 && <span style={{color:'#8494ab'}}> % = how closely they match your views, based on your {answeredCount} answered issue{answeredCount !== 1 ? 's' : ''}.</span>}
              </p>
            </div>
          </div>

          <div className="flex-1 max-w-5xl mx-auto w-full px-4 py-4 space-y-2">

            {(() => {
              const sectionRaces = filterRacesByDistrict(countyData[activeTab] || [], userDistricts);
              const senNotUp = activeTab === 'state' && userDistricts?.stateSenate
                && !sectionRaces.some(r => r.districtType === 'stateSenate')
                && SENATORS_NOT_UP[userDistricts.stateSenate];
              return <React.Fragment>
                <RaceGroupSections races={sectionRaces} collapsedGroups={collapsedGroups} setCollapsedGroups={setCollapsedGroups}
                groupAppendix={senNotUp ? { 'State House & Senate': <SenateNotUpCard district={userDistricts.stateSenate} senator={senNotUp} /> } : undefined}
                renderRace={race => {
                const onOpen = race => {
                    const cands = race.candidates.filter(Boolean);
                    const scores = cands.map(c => ({ c, s: calcMatch(c, answers, checkedStatements, ranks) }));
                    const best = scores.reduce((a, b) => (b.s !== null && (a.s === null || b.s > a.s)) ? b : a, scores[0]);
                    const match = best ? best.s : null;
                    const cand = best ? best.c : null;
                    if (!cand) return null;
                    const isOverridden = selected[race.office] && selected[race.office] !== cand.name;
                    const displayCand = isOverridden ? cands.find(c => c.name === selected[race.office]) : cand;
                    const displayScore = displayCand ? calcMatch(displayCand, answers, checkedStatements, ranks) : match;
                    const partyColor = displayCand?.party === 'R' ? '#ef4444' : displayCand?.party === 'D' ? '#3b82f6' : displayCand?.party === 'G' ? '#22c55e' : '#94a3b8';
                    const ISSUE_KEYS = ['reproductiveRights','immigration','gunPolicy','education','healthcare','climate','electionIntegrity','socialSecurity','affordability'];
                    const isJudicialRace = race.category === 'judicial' || (displayCand && !ISSUE_KEYS.some(k => displayCand.positions?.[k] && displayCand.positions[k] !== 'D'));

                    const isOnBallot = selected[race.office] === displayCand?.name || (!selected[race.office] && !isOverridden && !!cand);
                    const scoreColor = displayScore >= 70 ? '#22c55e' : displayScore >= 40 ? '#f59e0b' : '#ef4444';
                    // Best-scoring opponent, so the card shows a choice exists.
                    const rival = cands.filter(c => c !== displayCand)
                      .map(c => ({ c, s: calcMatch(c, answers, checkedStatements, ranks) }))
                      .sort((a, b) => (b.s ?? -1) - (a.s ?? -1))[0] || null;

                    return (
                      <div key={race.office} className="rounded-2xl overflow-hidden" style={{background:'rgba(255,255,255,0.11)', border:'1px solid rgba(255,255,255,0.14)'}}>

                        {/* ── MOBILE layout (phones only, <768px) ── */}
                        <div className="md:hidden p-3 flex items-center gap-3">
                          {/* Photo (circle) + match badge */}
                          <div className="relative shrink-0" style={{paddingBottom:'4px'}}>
                            <div className="relative w-[72px] h-[72px] rounded-full overflow-hidden" style={{border:`2.5px solid ${partyColor}`, background: partyColor + '33'}}>
                              {displayCand?.photo &&

    function CandidateProfile({ candidate, opponent, opponents, onCompareTo, issues, answers, checkedStatements, ranks, onClose, onSelect, isSelected, raceName, raceCategory, onCompare, isOpponent, onRateIssue, focusIssueId, clearFocusIssue }) {
      const _cs = checkedStatements || {};
      const hasAnswers = answers && Object.keys(answers).length > 0;
      // Analytics: profile opens are the "candidate popularity" signal
      useEffect(() => {
        if (candidate?.name) vyvTrack('candidate_profile_view', { candidate: candidate.name, party: candidate.party || '', office: raceName || '' });
      }, [candidate?.name]);
      // Per-issue active tab: undefined = collapsed, else 'their' | 'opp' | 'facts'
      // When returning from a "Do you match?" quiz, open the rated issue straight to the candidate's view (where the ✓/✗ verdict lives).
      const [issueTab, setIssueTab] = useState(() => focusIssueId ? { [focusIssueId]: 'their' } : {});
      const focusRef = useRef(null);
      const [pulseId, setPulseId] = useState(focusIssueId || null);
