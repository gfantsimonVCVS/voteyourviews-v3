      const [celebrateId, setCelebrateId] = useState(focusIssueId || null);
      useEffect(() => {
        if (!focusIssueId) return;
        setIssueTab(o => ({ ...o, [focusIssueId]: 'their' }));
        setPulseId(focusIssueId);
        setCelebrateId(focusIssueId);
        const tScroll = setTimeout(() => { focusRef.current?.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 120);
        const tPulse = setTimeout(() => setPulseId(null), 2200);
        clearFocusIssue?.();
        return () => { clearTimeout(tScroll); clearTimeout(tPulse); };
      }, [focusIssueId]);
      useEffect(() => {
        if (!celebrateId) return;
        const t = setTimeout(() => setCelebrateId(null), 2600);

      }, [celebrateId]);
      const [shareCopied, setShareCopied] = useState(false);
      const [showBadgeTip, setShowBadgeTip] = useState(false); // photo add/remove tooltip — React-controlled so it can't stick after a click
      const setTab = (id, tab) => setIssueTab(o => ({ ...o, [id]: o[id] === tab ? undefined : tab }));
      const [showSources, setShowSources] = useState(false);
      const [hookCollapsed, setHookCollapsed] = useState(() => !!focusIssueId && window.matchMedia('(max-width: 767px)').matches); // mobile only: returning from a quiz keeps bio collapsed for room (desktop has a separate column)
      const border = candidate.party === 'D' ? 'border-blue-500' : candidate.party === 'R' ? 'border-red-500' : candidate.party === 'G' ? 'border-green-500' : 'border-slate-300';
      const accentBg = candidate.party === 'D' ? 'bg-blue-800' : candidate.party === 'R' ? 'bg-red-800' : candidate.party === 'G' ? 'bg-green-900' : 'bg-slate-800';
      // Identity panel shares the app's dark-indigo gradient; party shows as ACCENTS
      // (photo ring, party label, match pill) instead of a full-color slab, so the
      // profile reads as one cohesive surface with the issue list below it.
      const accentGrad = 'linear-gradient(165deg,#1e1b4b 0%,#0f172a 100%)';
      const partyTint = candidate.party === 'D' ? '#60a5fa' : candidate.party === 'R' ? '#f87171' : candidate.party === 'G' ? '#4ade80' : '#94a3b8';
      const partyPillBg = candidate.party === 'D' ? '#2563eb' : candidate.party === 'R' ? '#dc2626' : candidate.party === 'G' ? '#16a34a' : '#475569';
      const matchScore = hasAnswers ? calcMatch(candidate, answers, _cs, ranks || {}) : null;
      const _ISSUE_KEYS = ['reproductiveRights','immigration','gunPolicy','education','healthcare','climate','electionIntegrity','socialSecurity','affordability'];
      // Judicial = the race's category only. (Don't infer it from having no positions — county
      // clerks and new candidates like independents have no positions but aren't judges, and the
      // "judicial ethics" explanation would be false for them; their per-issue evidence explains itself.)
      const isJudicialCandidate = raceCategory === 'judicial';
      // Lock the page behind the modal while it's open — kills the double scrollbar and

      useEffect(() => {
        const prev = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        return () => { document.body.style.overflow = prev; };
      }, []);
      // Standardized "thin profile" state: empty bio OR an internal review placeholder leaking through ([Info limited…], "no public biography", "please review").
      const editHref = `/${candidateSlug(candidate.name)}/edit`;
      const lowInfoSummary = !candidate.summary || /\[\s*info limited|no public (bio|information)|please review/i.test(candidate.summary);
      function getVoterLean(issueId) {
        const stmtData = _cs[issueId];
        if (stmtData && stmtData.reactions && Object.keys(stmtData.reactions).length > 0) {
          const voice = ISSUE_VOICE[issueId] || 'LEFT';
          const reacts = stmtData.reactions;
          const ups = Object.values(reacts).filter(r => r === 'up').length;
          const downs = Object.values(reacts).length - ups;
          if (ups === downs) return 'split';
          if (voice === 'LEFT') return ups > downs ? 'A' : 'C';
          else return ups > downs ? 'C' : 'A';
        }
        const v = answers?.[issueId];
        return (v === 'A' || v === 'B' || v === 'C') ? v : null;
      }
      // Match-meter: one dot per issue the candidate has a stance on; fills as the voter tests each one
      const meter = (issues || []).map(issue => {
        const rawPos = candidate.positions?.[issue.id];

        else if (rawPos === 'Disagree') pos = voice === 'RIGHT' ? 'A' : 'C';

        const hasStance = pos === 'A' || pos === 'B' || pos === 'C';
        const voterLean = hasAnswers ? getVoterLean(issue.id) : null;
        const state = !hasStance ? 'none'
          : !voterLean ? 'untested'
          : voterLean === 'split' ? 'split'
          : voterLean === pos ? 'match' : 'differ';
        return { id: issue.id, topic: issue.topic, state };
      });

      const celebrateMatch = !!celebrateId && meter.find(m => m.id === celebrateId)?.state === 'match';
      const testedCount = meterDots.filter(m => m.state !== 'untested').length;

      // Escape always closes the sheet — without this, mobile users can get trapped.

            {celebrateMatch && (() => {

                <React.Fragment>
                  <div className="match-rain" aria-hidden="true">

                      <i key={i} style={{left: `${(i * 97) % 100}%`, '--delay': `${(i % 9) * 0.09}s`, '--dur': `${1.5 + (i % 5) * 0.22}s`, '--rot': `${120 + i * 49}deg`, background: colors[i % colors.length]}} />
                    ))}

                </React.Fragment>

                const isFactsTab = tab === 'facts';

                return (

                </>
              );
            })()}
            {/* Bottom CTA — mobile only (desktop has Add button in left panel) */}

              {onSelect && (

                    className="ml-auto whitespace-nowrap flex items-center gap-2 px-5 py-2.5 rounded-xl font-black text-sm uppercase tracking-wide transition-all active:scale-95 bg-white text-slate-900 hover:bg-slate-100"

          </div>
          </div>
          {/* Full-width footer bar — candidates entry under the identity column, sources centered under the issues */}

              {!lowInfoSummary && (

              )}

            <div className="flex-1 flex justify-center">
              <button onClick={() => setShowSources(true)} className="text-xs text-slate-400 hover:text-white transition-colors flex items-center gap-1.5">
                <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
                Sources &amp; methodology
              </button>
            </div>
          </div>
          </div>
        </div>
        {showSources && <SourcesModal onClose={() => setShowSources(false)} />}
        </React.Fragment>
      );
    }

    function Browse({ county, counties, setCounty, onCountyDetected, uncoveredNotice, onDismissNotice, onReopenNotice, issues, answers, ranks, checkedStatements, selected, setSelected, userDistricts, setUserDistricts, onBallot, onHome, onBack = onHome, backLabel = 'home', onQuiz, onRateIssue, initialProfile, clearInitialProfile, focusIssueId, clearFocusIssue }) {

      const selectedCount = Object.keys(selected).length;
      // Same lean-coded CTA colors as the Pre-Ballot page (blue/red/purple by the

      const leanCounts = { A: 0, B: 0, C: 0 };
      issues.forEach(i => { const p = deriveVoterPos(i.id, answers, checkedStatements); if (leanCounts[p] !== undefined) leanCounts[p]++; });
      const ctaColors = leanCounts.A === 0 && leanCounts.B === 0 && leanCounts.C === 0

            {/* Desktop: single dark row */}
            <div className="hidden md:flex items-center h-16 px-4 lg:px-8 gap-3 max-w-6xl mx-auto">

              {answers && Object.keys(answers).length > 0

                : <button onClick={onQuiz} className="ml-auto text-[11px] font-black uppercase tracking-wide px-2.5 py-1.5 rounded-lg whitespace-nowrap transition-all hover:brightness-125"
                    style={{background:'rgba(245,158,11,0.16)', color:'#f59e0b', border:'1px solid rgba(245,158,11,0.45)', letterSpacing:'0.04em'}}>

          {/* Race list */}
          <main className="max-w-5xl mx-auto px-4 py-4 space-y-2">
            {races.length === 0 && (

            <RaceGroupSections races={races} collapsedGroups={collapsedGroups} setCollapsedGroups={setCollapsedGroups}
              renderRace={race => {
              const isSelected = !!selected[race.office];
              const score = answers && Object.keys(answers).length > 0
                ? Math.max(...race.candidates.filter(Boolean).map(c => calcMatch(c, answers, checkedStatements, ranks) || 0))
                : null;
              return (
                <div key={race.office} id={'race-'+race.office.replace(/\s+/g,'-')} className="rounded-2xl shadow-sm border border-slate-800 overflow-hidden">
                  {/* Dark header */}
                  <div className="sticky top-0 z-20 w-full flex flex-col md:flex-row"
                    style={{background:'linear-gradient(135deg,#0f172a 0%,#1e293b 100%)'}}>

                    {/* Mobile: full-width title row / Desktop: left 50% (title + description) */}
                    <div className="w-full md:w-1/2 flex text-left border-b border-white/10 md:border-b-0 md:border-r md:border-white/20">

                        {isSelected && <span className="text-sm text-emerald-400 font-bold mr-2 md:mr-0 md:mb-2">✓</span>}
                        <h2 className="text-white font-black uppercase leading-tight text-center"

                            if (/^.+? County\s/.test(o))

                            // Break only at the bullets, never inside a segment ("Chief Justice" stays whole).
                            return o.split(/\s*[—–]\s*/).map((seg, i) => (
                              <React.Fragment key={i}>{i > 0 && ' • '}<span style={{whiteSpace:'nowrap'}}>{seg}</span></React.Fragment>
                            ));
                          })()}
                        </h2>
                      </div>
                      {/* Description col — desktop only */}
                      <div className="hidden md:flex w-1/2 px-5 py-5 flex-col justify-center">
                        {race.description && <p className="text-slate-400 text-xs leading-relaxed">{formatDescription(race.description)}</p>}
                        {isSelected && <div className="text-xs text-emerald-400 font-bold mt-2">✓ {selected[race.office]}</div>}
                      </div>
                    </div>

                    {/* Candidate columns — 50/50 on mobile, 25/25 on desktop */}
                    <div className="w-full md:w-1/2 flex relative">
                      {/* Compare button removed */}
                      {race.candidates.filter(Boolean).map(c => {
                        const accent = c.party==='D'?'#3b82f6':c.party==='R'?'#ef4444':c.party==='G'?'#22c55e':'#94a3b8';
                        const partyLabel = partyName(c.party);
                        const partyColor = c.party==='D'?'text-blue-400':c.party==='R'?'text-red-400':c.party==='G'?'text-green-400':'text-slate-400';
                        const candMatch = answers && Object.keys(answers).length > 0 ? calcMatch(c, answers, checkedStatements, ranks) : null;
                        const ringSize = 72;
                        const border = 4;
                        // 3+ candidates: break every name onto two lines (first / last) so the
                        // narrower cards align — a one-line name next to a wrapped one looks ragged.
                        const crowded = race.candidates.filter(Boolean).length > 2;
                        const sp = c.name.lastIndexOf(' ');
                        return (
                          <div key={c.name}
                            onClick={() => setBrowseProfile({candidate: c, race})}
                            className="flex-1 flex flex-col items-center justify-center py-4 md:py-5 gap-2 border-r border-white/10 cursor-pointer active:bg-white/10 transition-colors"

                            <p className="text-[12px] font-black text-slate-200 uppercase tracking-widest text-center leading-tight">

                              <div className="absolute rounded-full overflow-hidden bg-slate-700" style={{inset: border}}>
                                <img src={c.photo||'/icons/candidate-undefined.png'} alt={c.name} className="w-full h-full object-cover object-top"

                                  style={{background:'#0f172a', color: accent, border:`1px solid ${accent}`, whiteSpace:'nowrap'}}>
                                  {candMatch}%

                            </div>
                            <span className={`text-[10px] font-bold uppercase tracking-wide ${partyColor}`}>{partyLabel}</span>
                            <button onClick={e => { e.stopPropagation(); setBrowseProfile({candidate: c, race}); }}

                            {(() => {

                      })}
                      {/* Placeholder opponent for uncontested races */}
                      {(() => {

                        if (reals.length !== 1 || !reals[0].uncontested) return null;

                        return (
                          <div className="flex-1 flex flex-col items-center justify-center py-4 md:py-5 gap-2"
                            style={{margin:'8px', borderRadius:'14px', border:'1.5px dashed rgba(255,255,255,0.18)', background:'rgba(255,255,255,0.02)'}}>

                            <img src={missing === 'Democratic' ? '/images/candidates/No_Dem.png' : '/images/candidates/No_Rep.png'}
                              alt={`No ${missing} candidate`} style={{width:75, height:75}} />

                            <span className="text-[9px] font-bold uppercase tracking-wide text-slate-400 border border-slate-600 rounded px-1.5 py-0.5">Uncontested</span>
                          </div>
                        );
                      })()}
                    </div>
                  </div>

                </div>
              );
            }} />

            {/* Spacer so the last race card can scroll clear of the fixed bar */}
            <div style={{height:'84px'}} />
          </main>

          {/* Fixed finish line — Build My Ballot always on screen */}
          <div className="fixed bottom-0 left-0 right-0 z-40 px-4 pt-3 pb-4" style={{background:'linear-gradient(to top, #0c1a2e 65%, rgba(12,26,46,0))'}}>
            <button onClick={() => { if (userDistricts) { onBallot(); } else { setPendingBallot(true); setShowAddr(true); } }}
              className="ballot-cta-pulse w-full sm:w-auto sm:min-w-[340px] sm:px-10 max-w-md mx-auto flex items-center justify-center gap-2 py-3.5 rounded-full font-black text-sm uppercase tracking-widest text-white transition-all hover:brightness-110 active:scale-[0.99]"
              style={{background: ctaColors.grad, border: `1px solid ${ctaColors.border}`, letterSpacing:'0.12em', boxShadow: `0 8px 24px ${ctaColors.glow}`}}>

          {showFilterModal && (

          {browseProfile && (() => {

              candidate={browseProfile.candidate}

              opponent={nextOpponent(browseProfile.race, browseProfile.candidate.name)}

              onCompareTo={(opp) => setBrowseProfile({ candidate: opp, race: browseProfile.race })}

              answers={answers}
              checkedStatements={checkedStatements}
              ranks={ranks}
              onClose={() => setBrowseProfile(null)}
              onRateIssue={onRateIssue ? (id) => onRateIssue(id, browseProfile) : undefined}
              focusIssueId={focusIssueId}
              clearFocusIssue={clearFocusIssue}
              isSelected={(() => {
                // Mirror the printable ballot's getBestCandidate: chosen → else best match → else first candidate.
                // So a 100% match that's implicitly on the ballot reads "✓ On Ballot" here too (not "+ Add to Ballot").
                const office = browseProfile.race.office;
                if (selected[office]) return selected[office] === browseProfile.candidate.name;
                const cands = browseProfile.race.candidates.filter(Boolean);
                let ballotCand = null;
                if (answers && Object.keys(answers).length > 0) {
                  const scored = cands.map(c => ({ c, s: calcMatch(c, answers, checkedStatements, ranks) })).filter(x => x.s !== null).sort((a, b) => b.s - a.s);
                  if (scored.length) ballotCand = scored[0].c;
                }
                if (!ballotCand) ballotCand = cands[0];
                return !!ballotCand && ballotCand.name === browseProfile.candidate.name;
              })()}
              onSelect={() => setSelected(prev => {
                const isChosen = prev[browseProfile.race.office] === browseProfile.candidate.name;
                return isChosen
                  ? Object.fromEntries(Object.entries(prev).filter(([k]) => k !== browseProfile.race.office))
                  : {...prev, [browseProfile.race.office]: browseProfile.candidate.name};
              })}
              onCompare={opponent ? () => setBrowseProfile({candidate: opponent, race: browseProfile.race}) : null}
              isOpponent={false}
            />
            );
          })()}
        </div>
      );

    // ─── BALLOT ───
    function Ballot({ county, counties, selected, answers, ranks, checkedStatements, issues, userDistricts, onBack, onHome, onEdit }) {
      const countyData = counties[county];
      const hasAnswers = answers && Object.keys(answers).length > 0;
      const [downloading, setDownloading] = React.useState(false);
      const [showEmailTBA, setShowEmailTBA] = React.useState(false);

      // Share the guide — native share sheet when available, else copy-link, else a manual-copy prompt (never silently fails).
      async function handleShareGuide() {
        const url = 'https://voteyourviews.org';
        const data = { title: 'VoteYourViews — My 2026 Texas Ballot', text: 'Rank your beliefs, see which candidates match, and build your ballot:', url };
        if (navigator.share) {
          try { await navigator.share(data); return; }
          catch (e) { if (e && e.name === 'AbortError') return; }   // user dismissed; on a real error, fall through
        }
        try { await navigator.clipboard.writeText(url); alert('Link copied! Share it anywhere:\n' + url); return; }
        catch (e) { /* clipboard blocked — fall through to manual copy */ }
        window.prompt('Copy this link to share the guide:', url);
      }

      async function handleDownloadPDF() {
        setDownloading(true);
        const page = document.querySelector('.ballot-page');
        const noprint = page ? [...page.querySelectorAll('.no-print')] : [];
        const npSaved = noprint.map(n => n.style.display);
        const saved = page ? { width: page.style.width, maxWidth: page.style.maxWidth, padding: page.style.padding, boxShadow: page.style.boxShadow } : null;
        try {
          if (!page || typeof html2canvas === 'undefined') throw new Error('ballot page or html2canvas unavailable');
          const LAYOUT_W = 816;
          // Force desktop letter dimensions + hide screen-only controls so the capture (and measurements) are device-independent.
          page.style.width = LAYOUT_W + 'px'; page.style.maxWidth = LAYOUT_W + 'px'; page.style.padding = '52px 60px 40px'; page.style.boxShadow = 'none';
          noprint.forEach(n => { n.style.display = 'none'; });
          await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

          // ALL geometry (links, band/badge repaints, the judicial page-break) is measured inside
          // html2canvas's CLONE, not the live page: on narrow viewports the live page lays out in
          // the mobile arrangement (much taller) even with the width forced, while the clone renders
          // at windowWidth 900 in the desktop arrangement — live rects land in the wrong place.
          const links = [];
          const repaints = [];
          let judicialCloneY = null;

          const canvas = await html2canvas(page, { scale: 2, useCORS: true, backgroundColor: '#ffffff', windowWidth: 900,
            onclone: (doc) => {
              // html2canvas re-runs CSS animations on its clone — disable them so we don't capture a mid-fade (grayed-out) frame.
              doc.querySelectorAll('.fade-in, .slide-in, .issue-enter, [class*="fade"], [class*="slide"]').forEach(n => { n.style.animation = 'none'; n.style.opacity = '1'; n.style.transform = 'none'; });

              const cp = doc.querySelector('.ballot-page');
              if (!cp) return;
              const cpr = cp.getBoundingClientRect();
              const crel = (el) => { const r = el.getBoundingClientRect(); return { x: r.left - cpr.left, y: r.top - cpr.top, w: r.width, h: r.height }; };
              const cs = (el) => { try { return (doc.defaultView || window).getComputedStyle(el); } catch (e) { return window.getComputedStyle(el); } };

              // Links to keep clickable in the PDF (logo → site; registration → vote.org; polling → maps).
              const bannerA = cp.querySelector('a[href*="voteyourviews.org"]'); if (bannerA) links.push({ r: crel(bannerA), url: 'https://voteyourviews.org' });
              cp.querySelectorAll('a[href*="vote.org"], a[href*="google.com/maps"], a[href*="maps.apple"]').forEach(a => links.push({ r: crel(a), url: a.href }));

              // html2canvas misplaces text inside tight colored boxes (draws it ~5px low), so pill
              // badges and section bands get repainted directly onto the captured canvas afterwards.
              // (Never swap them for data-URL images in the clone: mobile Safari snapshots before
              // those decode — blank bands/badges.)
              cp.querySelectorAll('.ballot-badge, .ballot-band').forEach(el => {
                const r = crel(el); if (!r.w || !r.h) return;
                const st = cs(el);
                repaints.push({ r, text: el.textContent.trim().toUpperCase(),
                  bg: st.backgroundColor, color: st.color, fontWeight: st.fontWeight,
                  fontSize: parseFloat(st.fontSize), fontFamily: st.fontFamily,
                  letterSpacing: parseFloat(st.letterSpacing) || 0,
                  radius: Math.min(parseFloat(st.borderRadius) || 0, r.h / 2) });
                // Hide the original in the clone (visibility keeps its layout space): on narrow
                // viewports html2canvas paints these boxes at ~2x scale in the wrong place — the
                // repaint below is the only rendering we trust.
                el.style.visibility = 'hidden';
              });

              const jud = cp.querySelector('[data-sec="county"]');   // page 2 starts at the County band
              if (jud) judicialCloneY = crel(jud).y;
            }
          });

          {
            const k = canvas.width / LAYOUT_W;   // layout px → canvas px
            const ctx = canvas.getContext('2d');
            repaints.forEach(p => {
              const x0 = p.r.x * k, y0 = p.r.y * k, w = p.r.w * k, h = p.r.h * k;
              ctx.save();
              // html2canvas leaves its internal transform (scale + scroll translate) on the context —
              // reset to identity or every repaint lands scaled and offset (the giant-bands bug).
              ctx.setTransform(1, 0, 0, 1, 0, 0);
              ctx.beginPath();
              if (ctx.roundRect) ctx.roundRect(x0, y0, w, h, p.radius * k); else ctx.rect(x0, y0, w, h);
              ctx.clip();
              ctx.fillStyle = p.bg;
              ctx.fillRect(x0, y0, w, h);
              ctx.fillStyle = p.color;
              ctx.font = `${p.fontWeight} ${p.fontSize * k}px ${p.fontFamily}`;
              if ('letterSpacing' in ctx) ctx.letterSpacing = (p.letterSpacing * k) + 'px';
              ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
              ctx.fillText(p.text, x0 + w / 2, y0 + h / 2 + k);
              ctx.restore();
            });
          }

          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF('p', 'pt', 'letter');
          const pageWpt = pdf.internal.pageSize.getWidth();   // 612
          const S = pageWpt / LAYOUT_W;                       // layout px → pt (0.75)
          const cScale = canvas.width / LAYOUT_W;             // canvas px per layout px (~2)
          // Exactly TWO letter pages: page 1 ends with the county races, page 2 starts at the
          // Judicial band. Each page is scaled down (slightly, centered) if its content runs long.
          const pageHpt = pdf.internal.pageSize.getHeight();                 // 792
          const slices = [];
          if (judicialCloneY !== null) {
            // Belt & suspenders: the clone measurement is authoritative, but confirm against the
            // canvas pixels — find the Judicial band (solid dark bar) near the estimate.
            const approxY = Math.round(judicialCloneY * cScale);
            let breakY = approxY;
            try {
              const cx = canvas.getContext('2d');
              const x0 = Math.round(canvas.width * 0.15), x1 = Math.round(canvas.width * 0.85);
              const win = Math.round(120 * cScale);
              const yStart = Math.max(0, approxY - win), yEnd = Math.min(canvas.height, approxY + win);
              const img = cx.getImageData(0, yStart, canvas.width, yEnd - yStart).data;
              for (let y = yStart; y < yEnd; y++) {
                let dark = 0, tot = 0;
                for (let x = x0; x < x1; x += 8) {
                  const i = ((y - yStart) * canvas.width + x) * 4;
                  tot++;
                  if (img[i] < 60 && img[i + 1] < 70 && img[i + 2] < 90) dark++;
                }
                if (dark / tot > 0.9) { breakY = y; break; }   // first row of the dark band
              }
            } catch (e) { /* tainted canvas etc. — fall back to the live estimate */ }
            breakY = Math.max(0, breakY - Math.round(6 * cScale));  // small white margin above the band on page 2
            slices.push([0, breakY], [breakY, canvas.height]);
          } else {
            slices.push([0, canvas.height]); // no judicial races (rare) — single page
          }

          slices.forEach(([y0, y1], i) => {
            if (i > 0) pdf.addPage();
            const sh = y1 - y0;
            const sc = document.createElement('canvas'); sc.width = canvas.width; sc.height = sh;
            sc.getContext('2d').drawImage(canvas, 0, y0, canvas.width, sh, 0, 0, canvas.width, sh);
            const imgHpt = sh * (pageWpt / canvas.width);
            const fit = Math.min(1, pageHpt / imgHpt);       // shrink-to-fit if the slice runs past one page
            const drawW = pageWpt * fit, drawX = (pageWpt - drawW) / 2;
            pdf.addImage(sc.toDataURL('image/jpeg', 0.92), 'JPEG', drawX, 0, drawW, imgHpt * fit);
            const sliceTop = y0 / cScale, sliceBot = y1 / cScale;
            links.forEach(L => {
              if (L.r.y + L.r.h > sliceTop && L.r.y < sliceBot) {
                pdf.link(drawX + L.r.x * S * fit, (L.r.y - sliceTop) * S * fit, L.r.w * S * fit, L.r.h * S * fit, { url: L.url });
              }
            });
          });
          console.log('[VYV] PDF pages:', pdf.internal.getNumberOfPages(), '| links:', links.length, '| slices:', slices.length);
          const today = new Date();
          pdf.save(`VoteYourViews Ballot ${today.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}.pdf`);
        } catch(e) {
          console.error(e);
          alert('Could not generate PDF. Please try the Print button instead.');
        } finally {
          if (page && saved) { page.style.width = saved.width; page.style.maxWidth = saved.maxWidth; page.style.padding = saved.padding; page.style.boxShadow = saved.boxShadow; }
          noprint.forEach((n, i) => { n.style.display = npSaved[i]; });
          setDownloading(false);
        }
      }

      // Set document title for PDF filename when printing
      useEffect(() => {
        const today = new Date();
        const month = today.toLocaleString('default', { month: 'long' });
        const day = today.getDate();
        const year = today.getFullYear();
        document.title = `My Midterm Ballot - ${month} ${day} ${year}`;
        return () => { document.title = 'Vote Your Views — Stop voting Parties. Start voting your views.'; };
      }, []);

      // A checkmark means the voter chose it or their views matched it — never anything else.
      // Race → row kind: 'pick' (explicit choice or view-match, checked) ·
      // 'unopposed' (sole candidate — information, never checked) ·
      // 'open' (contested but unresearched — the voter's call, both names listed).
      function ballotRow(race) {
        const reals = race.candidates.filter(Boolean).filter(c => !/^TBD/i.test(c.name || ''));
        if (!reals.length) return null;
        const chosen = reals.find(c => c.name === selected[race.office]);
        if (chosen) return { kind: 'pick', race, candidate: chosen };
        if (reals.length === 1) return { kind: 'unopposed', race, candidate: reals[0] };
        if (hasAnswers) {
          const scored = reals.map(c => ({ candidate: c, score: calcMatch(c, answers, checkedStatements, ranks) })).filter(s => s.score !== null).sort((a,b) => b.score - a.score);
          if (scored.length > 0) return { kind: 'pick', race, candidate: scored[0].candidate };
        }
        // Two honest reasons for an open race: the voter hasn't answered anything yet,
        // or we have answers but no candidate research to match against.
        return { kind: 'open', race, candidates: reals, reason: hasAnswers ? 'unresearched' : 'noAnswers' };
      }

      return (
        <div className="min-h-screen" style={{background:'#e2e8f0'}}>
          {/* Screen-only nav bar — fixed so Save/Print/Back stay on screen while scrolling */}
          <div className="no-print" style={{height:'64px'}} />
          <header className="no-print fixed top-0 left-0 right-0 z-40 px-3 py-3"
            style={{background:'#0f172a', borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
            <div className="flex items-center gap-2 mx-auto w-full" style={{maxWidth:'816px'}}>
            <button onClick={onBack}
              className="shrink-0 flex items-center gap-1 text-white text-sm font-black uppercase tracking-wide px-2.5 py-2.5 rounded-xl active:scale-95 transition-transform"
              style={{background:'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.25)'}}>
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
              <span className="hidden md:inline">Back</span>
            </button>
            {/* Centered action buttons — rounded-rectangle, prominent */}
            <div className="flex-1 flex items-center justify-center gap-2 sm:gap-2.5 min-w-0">
              <button onClick={handleDownloadPDF} disabled={downloading}
                className="flex items-center gap-1.5 text-[13px] sm:text-sm font-black uppercase tracking-wide px-3 sm:px-4 py-2.5 rounded-xl text-white whitespace-nowrap active:scale-95 transition-transform"
                style={{background:'#16a34a', letterSpacing:'0.04em', boxShadow:'0 2px 8px rgba(0,0,0,0.35)', opacity: downloading ? 0.6 : 1}}>
                <svg className="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                {downloading ? 'Saving…' : 'Save PDF'}
              </button>
              <button onClick={() => { vyvTrack('ballot_print'); window.print(); }} className="flex items-center gap-1.5 text-[13px] sm:text-sm font-black uppercase tracking-wide px-3 sm:px-4 py-2.5 rounded-xl text-white whitespace-nowrap active:scale-95 transition-transform"
                style={{background:'#2563eb', letterSpacing:'0.04em', boxShadow:'0 2px 8px rgba(0,0,0,0.35)'}}>
                <svg className="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                Print
              </button>
              <button onClick={handleShareGuide} className="flex items-center gap-1.5 text-[13px] sm:text-sm font-black uppercase tracking-wide px-3 sm:px-4 py-2.5 rounded-xl text-white whitespace-nowrap active:scale-95 transition-transform"
                style={{background:'#7c3aed', letterSpacing:'0.04em', boxShadow:'0 2px 8px rgba(0,0,0,0.35)'}}>
                <svg className="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M8.7 10.7l6.6-3.4M8.7 13.3l6.6 3.4M18 8a3 3 0 10-3-3 3 3 0 003 3zM6 15a3 3 0 10-3-3 3 3 0 003 3zm12 7a3 3 0 10-3-3 3 3 0 003 3z"/></svg>
                Share
              </button>
            </div>
            </div>
          </header>

          {/* Printable letter page — the on-screen sheet that the PDF mirrors */}
          <div className="ballot-page">
            {/* Colored brand banner header — links to the site (same logo as mobile) */}
            <a href="https://voteyourviews.org" target="_blank" rel="noopener noreferrer" style={{display:'block', textDecoration:'none'}}>
              <img src="/icons/VoteYourViews_ThinHeader1.png" alt="VoteYourViews.org" className="ballot-banner" onError={e=>{e.currentTarget.style.display='none';}} />
            </a>
            <div style={{textAlign:'center', marginTop:'10px'}}>
              <div className="ballot-title font-black uppercase" style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'26px', color:'#0f172a', letterSpacing:'0.02em', lineHeight:1.04}}>
                Everything You Need for the <span style={{color:'#1d3a8a'}}>2026 Texas Midterm</span>
              </div>
              <div style={{display:'flex', alignItems:'center', justifyContent:'center', gap:'12px', marginTop:'5px'}}>
                <span style={{color:'#dc2626', fontSize:'14px', lineHeight:1}}>★</span>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'13px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.14em', color:'#1d3a8a'}}>
                  My Ballot: {countyData.name}
                  {userDistricts?.congressionalDistrict ? ` • US House ${userDistricts.congressionalDistrict}` : ''}
                  {userDistricts?.stateHouse ? ` • TX House ${userDistricts.stateHouse}` : ''}
                  {userDistricts?.stateSenate ? ` • TX Senate ${userDistricts.stateSenate}` : ''}
                </div>
                <span style={{color:'#1d3a8a', fontSize:'14px', lineHeight:1}}>★</span>
              </div>
            </div>
            <div style={{height:'2px', background:'#0f172a', marginTop:'10px', marginBottom:'4px'}} />

          <main id="ballot-content" className="fade-in" style={{padding:'8px 0 0'}}>

            {/* Your Picks — section badge */}
            <div style={{display:'flex', alignItems:'center', gap:'10px', marginTop:'6px', marginBottom:'8px'}}>
              <img src="/icons/illustrations/Candidates.png" alt="" style={{height:'50px', width:'auto', flexShrink:0}} onError={e=>{e.currentTarget.style.display='none';}} />
              <div style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'26px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.05em', color:'#0f172a', lineHeight:1}}>
                Your <span style={{color:'#2563eb'}}>Picks</span>
              </div>
            </div>

            {RACE_SECTIONS.map(sec => {
              const sectionRaces = filterRacesByDistrict(countyData[sec.key] || [], userDistricts);
              const sectionRows = sectionRaces.map(ballotRow).filter(Boolean);
              if (!sectionRows.length) return null;
              const pColor = (p) => p === 'D' ? '#2563eb' : p === 'R' ? '#dc2626' : p === 'G' ? '#16a34a' : '#64748b';
              return (
                <div key={sec.key} data-sec={sec.key} className="mb-4" style={{}}>
                  <div className="ballot-band" style={{background:'#0f172a', borderRadius:'8px', textAlign:'center', padding:'7px 12px 8px', marginBottom:'8px', fontFamily:"'Barlow Condensed',sans-serif", fontSize:'16px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.12em', color:'#fff', lineHeight:1.1}}>
                    {sec.label}
                  </div>
                  <div className={sec.key === 'county' ? 'ballot-picks ballot-picks-3' : 'ballot-picks'}>
                    {sectionRows.map((row) => {
                      const { race } = row;
                      if (row.kind === 'unopposed') {
                        const missing = row.candidate.party === 'D' ? 'Republican' : row.candidate.party === 'R' ? 'Democrat' : 'opposing';
                        return (
                          <div key={race.office} className="ballot-pick-row" style={{padding:'4px 0 10px'}}>
                            <div style={{fontSize:'10px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.05em', color:'#94a3b8', lineHeight:1.2}}>{race.office}</div>
                            <div style={{fontSize:'13px', fontWeight:800, color:'#64748b', lineHeight:1.3, marginTop:'1px'}}>
                              {row.candidate.name}
                              <span style={{color:pColor(row.candidate.party), opacity:0.65, fontWeight:900, fontSize:'10px', marginLeft:'6px'}}>· {partyName(row.candidate.party)}</span>
                            </div>
                            <div style={{fontSize:'9px', fontWeight:700, color:'#94a3b8', lineHeight:1.3}}>Unopposed — no {missing} filed in this race</div>
                          </div>
                        );
                      }
                      if (row.kind === 'open') {
                        return (
                          <div key={race.office} className="ballot-pick-row" style={{padding:'4px 0 10px'}}>
                            <div style={{fontSize:'10px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.05em', color:'#64748b', lineHeight:1.2}}>{race.office}</div>
                            <div style={{fontSize:'12px', fontWeight:800, color:'#0f172a', lineHeight:1.35, marginTop:'1px'}}>
                              {row.candidates.map((c, i) => (
                                <React.Fragment key={c.name}>
                                  {i > 0 && <span style={{color:'#94a3b8', fontWeight:700}}> or </span>}
                                  {c.name}<span style={{color:pColor(c.party), fontWeight:900, fontSize:'10px'}}> ({c.party || 'I'})</span>
                                </React.Fragment>
                              ))}
                            </div>
                            <div style={{fontSize:'9px', fontWeight:700, color:'#94a3b8', lineHeight:1.3}}>{row.race.category === 'judicial' ? 'Your choice • judicial races are neutral regarding policy' : row.reason === 'unresearched' ? 'Your choice • no stated positions to match yet' : 'Your choice • Vote Your Views to match or choose from All Candidates'}</div>
                          </div>
                        );
                      }
                      const { candidate } = row;
                      return (
                        <div key={race.office} className="ballot-pick-row" style={{padding:'4px 0 10px'}}>
                          <div style={{fontSize:'10px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.05em', color:'#64748b', lineHeight:1.2}}>{race.office}</div>
                          <div style={{fontSize:'13px', fontWeight:900, color:'#0f172a', lineHeight:1.3, marginTop:'1px'}}>
                            <span style={{color:'#16a34a', fontWeight:900, marginRight:'4px'}}>✓</span>
                            {candidate.name}
                            <span style={{color:pColor(candidate.party), fontWeight:900, fontSize:'10px', marginLeft:'6px'}}>· {partyName(candidate.party)}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}

            {/* Key Dates & Times */}
            <div data-sec="dates" style={{marginTop:'14px', borderTop:'2px solid #0f172a', paddingTop:'12px'}}>
              <div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'8px'}}>
                <img src="/icons/illustrations/Time_to_Vote.png" alt="" style={{height:'38px', width:'auto', flexShrink:0}} onError={e=>{e.currentTarget.style.display='none';}} />
                <div style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'22px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.06em', lineHeight:1, color:'#0f172a'}}>
                  Key <span style={{color:'#2563eb'}}>Dates &amp; Times</span>
                </div>
              </div>
              {/* 4 calendar tiles — big, readable at arm's length */}
              <div className="ballot-date-tiles">
                {[
                  {label:'Register by', value:'Oct 5', sub:'2026', color:'#d97706'},
                  {label:'Early voting', value:'Oct 19–30', sub:'2026', color:'#16a34a'},
                  {label:'Election Day', value:'Nov 4', sub:'2026', color:'#dc2626'},
                  {label:'Poll hours', value:'7 AM – 7 PM', sub:'every voting day', color:'#2563eb'},
                ].map((d, i) => (
                  <div key={i} style={{border:'1.5px solid #e2e8f0', borderTop:`4px solid ${d.color}`, borderRadius:'10px', padding:'7px 8px 6px', textAlign:'center', background:'#f8fafc'}}>
                    <div style={{fontSize:'9.5px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.08em', color:'#64748b'}}>{d.label}</div>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'19px', fontWeight:900, color:'#0f172a', lineHeight:1.05, marginTop:'2px', whiteSpace:'nowrap'}}>{d.value}</div>
                    <div style={{fontSize:'9.5px', fontWeight:700, color:'#94a3b8', marginTop:'2px'}}>{d.sub}</div>
                  </div>
                ))}
              </div>
              {/* Registration helpers — two separate clickable boxes (distinct vote.org URLs, kept clickable in the PDF) */}
              <div className="ballot-locs" style={{marginTop:'10px', display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap:'10px'}}>
                <a href="https://www.vote.org/am-i-registered-to-vote/" target="_blank" rel="noopener noreferrer"
                   style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:'10px', background:'#eff6ff', border:'1px solid #bfdbfe', borderRadius:'10px', padding:'8px 12px', textDecoration:'none'}}>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:'12.5px', fontWeight:900, color:'#0f172a', lineHeight:1.2}}>Not sure you're registered?</div>
                    <div style={{fontSize:'11.5px', color:'#2563eb', fontWeight:900, marginTop:'2px', lineHeight:1.3}}>Check your status →</div>
                  </div>
                  <span className="voteorg-svg" role="img" aria-label="vote.org" style={{flexShrink:0}} dangerouslySetInnerHTML={{__html: VOTEORG_SVG}} />
                </a>
                <a href="https://www.vote.org/register-to-vote/" target="_blank" rel="noopener noreferrer"
                   style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:'10px', background:'#f0fdf4', border:'1px solid #bbf7d0', borderRadius:'10px', padding:'8px 12px', textDecoration:'none'}}>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:'12.5px', fontWeight:900, color:'#0f172a', lineHeight:1.2}}>Not registered yet?</div>
                    <div style={{fontSize:'11.5px', color:'#16a34a', fontWeight:900, marginTop:'2px', lineHeight:1.3}}>Register to vote →</div>
                  </div>
                  <span className="voteorg-svg" role="img" aria-label="vote.org" style={{flexShrink:0}} dangerouslySetInnerHTML={{__html: VOTEORG_SVG}} />
                </a>
              </div>

            {/* What to bring — Texas voter ID checklist (turns the printout into a complete voting kit) */}

                  <div style={{fontSize:'11px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.06em', color:'#0f172a', marginBottom:'7px'}}>Any ONE of these photo IDs:</div>
                  {['Texas driver license', 'Texas personal ID card', 'Texas handgun license (LTC)', 'Texas Election ID certificate', 'U.S. passport (book or card)', 'U.S. military ID with photo', 'U.S. citizenship certificate with photo'].map((id, i) => (
                    <div key={i} style={{display:'flex', alignItems:'center', gap:'8px', padding:'1.5px 0'}}>

                  <div style={{fontSize:'10px', color:'#64748b', marginTop:'7px', lineHeight:1.35, fontStyle:'italic'}}>Expired up to 4 years is still OK. Age 70+? Any expiration works.</div>
                </div>
                <div style={{background:'#fffbeb', border:'1px solid #fde68a', borderRadius:'10px', padding:'10px 14px'}}>
                  <div style={{fontSize:'11px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.06em', color:'#0f172a', marginBottom:'7px'}}>Good to know:</div>
                  {[
                    'Bring this printed ballot — it\'s legal to use it in the booth',
                    'Any line at closing time? Stay in it — you can still vote',

            {/* Email-my-ballot reminder card — screen only */}

                 style={{background:'linear-gradient(135deg,#1e1b4b 0%,#0f172a 70%)', border:'1.5px solid rgba(251,191,36,0.5)', boxShadow:'0 12px 32px rgba(0,0,0,0.35)'}}>
              <div className="flex items-center gap-4 p-5">
                <img src="/icons/illustrations/Email%20Me%202.png" alt="Email my ballot"
                  className="shrink-0 w-[116px] h-[116px] sm:w-[134px] sm:h-[134px] object-contain"
                  onError={e => { e.currentTarget.style.display='none'; }} />
                <div className="flex-1 min-w-0">
                  <p className="text-[12px] font-black uppercase tracking-[0.2em] mb-1" style={{color:'#f59e0b'}}>Need a reminder?</p>
                  <p className="text-white font-black uppercase leading-tight text-[19px] sm:text-[22px]" style={{fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:'0.03em'}}>
                    Get your ballot &amp; everything you need to vote
                  </p>
                  <p className="text-slate-300 text-xs sm:text-sm leading-snug mt-1">Emailed to your inbox <strong className="text-white uppercase">one week before early voting starts</strong>.</p>
                </div>
              </div>
              <div className="px-5 pb-5 flex sm:justify-center">
                <button onClick={() => setShowEmailTBA(true)}
                  className="w-full sm:w-auto flex items-center justify-center gap-2 px-6 sm:px-10 py-3.5 rounded-full font-black text-xs sm:text-sm uppercase whitespace-nowrap transition-all hover:brightness-110 active:scale-95"
                  style={{letterSpacing:'0.1em', color:'#0f172a', background:'linear-gradient(135deg,#fbbf24,#d97706)', boxShadow:'0 6px 18px rgba(217,119,6,0.45)'}}>
                  <svg className="w-4 h-4 sm:w-5 sm:h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.4}>
                    <rect x="3" y="5" width="18" height="14" rx="2"/>
                    <path d="M3 7l9 6 9-6"/>
                  </svg>
                  Email My Ballot →
                </button>
              </div>
            </div>

            {/* Print footer — fixed to bottom of every printed page */}
            <div className="ballot-print-footer" style={{display:'none'}}>
              {counties[county].name} · VoteYourViews.org · A State Over Party Initiative · voteyourviews.org
            </div>
          </main>
          </div>

          {/* Email-my-ballot TBA modal */}
          {showEmailTBA && (
            <div className="no-print fixed inset-0 z-50 flex items-center justify-center px-4" style={{background:'rgba(0,0,0,0.8)'}} onClick={() => setShowEmailTBA(false)}>
              <div className="w-full max-w-sm rounded-2xl p-6 text-center" onClick={e => e.stopPropagation()}
                   style={{background:'linear-gradient(160deg,#1e1b4b,#0f172a)', border:'1.5px solid rgba(251,191,36,0.5)', boxShadow:'0 24px 60px rgba(0,0,0,0.6)'}}>
                <img src="/icons/illustrations/Email%20Me%202.png" alt="" className="mx-auto w-24 h-24 object-contain mb-3" onError={e => { e.currentTarget.style.display='none'; }} />
                <p className="text-[10px] font-black uppercase tracking-[0.2em] mb-1.5" style={{color:'#f59e0b'}}>Coming soon</p>
                <p className="text-white font-black uppercase leading-tight text-[20px] mb-2" style={{fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:'0.03em'}}>Ballot email reminders</p>
                <p className="text-slate-300 text-sm leading-relaxed mb-5">We're building this now! Soon you'll be able to get your ballot emailed to you one week before early voting starts. For now, save the PDF or print your ballot above.</p>
                <button onClick={() => setShowEmailTBA(false)}
                  className="w-full py-3 rounded-full font-black text-xs uppercase tracking-widest transition-all hover:brightness-110 active:scale-[0.98]"
                  style={{letterSpacing:'0.14em', color:'#0f172a', background:'linear-gradient(135deg,#fbbf24,#d97706)'}}>
                  Got it
                </button>

            </div>
          )}

      );
    }

    // ─────────────────────────────────────────────
    // LOADING / ERROR SCREENS
    // ─────────────────────────────────────────────
    function LoadingScreen() {
      return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 fade-in">
          <div className="w-8 h-8 border-2 border-slate-300 border-t-slate-800 rounded-full animate-spin mb-4" />
          <div className="text-sm font-semibold text-slate-600">Loading candidate data…</div>
          <div className="text-xs text-slate-400 mt-1">Fetching from Google Sheets</div>
        </div>
      );
    }

    function ErrorScreen({ message, onRetry }) {
      return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 px-6 fade-in">
          <div className="max-w-md text-center">
            <div className="text-3xl mb-4">⚠️</div>
            <h2 className="text-lg font-bold text-slate-900 mb-2">Couldn't load candidate data</h2>
            <p className="text-sm text-slate-500 mb-2">{message}</p>
            <p className="text-xs text-slate-400 mb-6">
              Make sure your Google Sheets are published to the web (File → Share → Publish to web) and that the Sheet IDs are set correctly in the SHEETS config in the code.
            </p>
            <button
              onClick={onRetry}
              className="px-6 py-3 bg-slate-900 text-white font-bold rounded-xl text-sm hover:bg-slate-700 transition-colors"
            >
              Try Again
            </button>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // CANDIDATE EDIT PAGE — /<slug>/edit submission form
    // Candidate edits their OWN words + hooks + photo; the researched record + the
    // Agree/Disagree lean stay ours (record is read-only, flag-for-correction only).
    // Backend (Netlify Function → pending tab + magic-link auth) comes later; Save
    // assembles the submission payload so the flow is verifiable now.
    // ─────────────────────────────────────────────
    const HOOK1_MAX = 140, HOOK2_MAX = 320, OWNWORDS_MAX = 400;
    function CandidateEditPage({ candidate, race, issues, onBack }) {
      const _ISSUE_KEYS = ['reproductiveRights','immigration','gunPolicy','education','healthcare','climate','electionIntegrity','socialSecurity','affordability'];
      const editIssues = (issues || []).filter(i => _ISSUE_KEYS.includes(i.id));
      // Save draft: work-in-progress lives in THIS browser only (localStorage, keyed by
      // candidate) — lets a staffer save and get campaign sign-off before submitting.
      // Nothing is transmitted until Submit.
      const draftKey = `vyv-edit-draft-${candidateSlug(candidate.name)}`;
      const draft = useMemo(() => {
        try { return JSON.parse(localStorage.getItem(draftKey)) || null; } catch { return null; }
      }, [draftKey]);
      const [hook1, setHook1] = useState(draft?.hook1 ?? (candidate.hook || ''));
      const [hook2, setHook2] = useState(draft?.hook2 ?? (candidate.summary || ''));
      const [website, setWebsite] = useState(draft?.website ?? (candidate.website || ''));
      const [editWebsite, setEditWebsite] = useState(false);
      // The candidate takes the same quiz voters take: react to each issue's statements
      // (the exact statements voters see), answer "Where do you stand…" in their own
      // words, plus an optional per-issue notes field for corrections/context.
      const [reactions, setReactions] = useState(draft?.reactions || {});   // { issueId: { stmtIdx: 'up'|'down'|'skip' } }
      const [ownWords, setOwnWords] = useState(() => ({ ...Object.fromEntries(editIssues.map(i => [i.id, ''])), ...(draft?.ownWords || {}) }));
      const [notes, setNotes] = useState(draft?.notes || {});               // { issueId: string }
      // Derive the issue-level stance from the statement reactions (majority rule),
      // same Agree/Disagree/No opinion vocabulary the match scoring already understands.
      const stanceFor = (issueId) => {
        const r = Object.values(reactions[issueId] || {});
        const ups = r.filter(v => v === 'up').length, downs = r.filter(v => v === 'down').length;
        return ups > downs ? 'Agree' : downs > ups ? 'Disagree' : 'No opinion';
      };
      const [photoPreview, setPhotoPreview] = useState(draft?.photoPreview || candidate.photo || null);
      const [photoName, setPhotoName] = useState(draft?.photoName || '');
      const [submitterName, setSubmitterName] = useState(draft?.submitterName || '');
      const [submitterRole, setSubmitterRole] = useState(draft?.submitterRole || '');
      const [submitterEmail, setSubmitterEmail] = useState(draft?.submitterEmail || '');
      const submitterOk = submitterName.trim().length > 1 && submitterRole && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(submitterEmail);
      const [showSubmitModal, setShowSubmitModal] = useState(false);
      const [blockMsg, setBlockMsg] = useState(null);
      const [submitted, setSubmitted] = useState(null);
      // Submission gates: must have actually changed/answered something, and no profanity.
      const PROFANITY_RE = /\b\w*(fuck|shit|bitch|nigger|faggot)\w*\b|\b(cunt\w*|asshole\w*|goddamn\w*|whore\w*|slut\w*)\b/i;
      function submissionBlockReason() {
        const touchedQuiz = Object.values(reactions).some(r => Object.keys(r).length > 0)
          || Object.values(ownWords).some(v => v && v.trim());
        const touchedInfo = hook1 !== (candidate.hook || '') || hook2 !== (candidate.summary || '')
          || website !== (candidate.website || '') || !!photoName
          || Object.values(notes).some(v => v && v.trim());
        if (!touchedQuiz && !touchedInfo) return "Nothing to submit yet — answer at least one issue or update your info first.";
        const texts = [hook1, hook2, ...Object.values(ownWords), ...Object.values(notes)];
        if (texts.some(t => t && PROFANITY_RE.test(t))) return "Please remove the strong language before submitting — this appears on a public voter guide.";
        return null;
      }
      function openSubmitModal() {
        const reason = submissionBlockReason();
        setBlockMsg(reason);
        if (!reason) setShowSubmitModal(true);
      }
      const [submitState, setSubmitState] = useState(null); // null | 'sending' | 'error'
      const [draftSavedAt, setDraftSavedAt] = useState(draft?.savedAt || null);

      function saveDraft() {
        const data = {
          hook1, hook2, website, reactions, ownWords, notes,
          submitterName, submitterRole, submitterEmail,
          photoPreview: photoName ? photoPreview : null, photoName,
          savedAt: new Date().toISOString(),
        };
        try {
          localStorage.setItem(draftKey, JSON.stringify(data));
          setDraftSavedAt(data.savedAt);
        } catch { /* storage full/blocked — the button just won't confirm */ }
      }

      const counterStyle = (len, max) => len >= max ? 'text-rose-600' : len >= max * 0.85 ? 'text-amber-600' : 'text-slate-400';

      function onPhoto(e) {
        const f = e.target.files && e.target.files[0];
        if (!f) return;
        setPhotoName(f.name);
        // Downscale to a review-sized JPEG that fits in one sheet cell (~45k chars);
        // the full-quality photo gets sourced during approval, this is just for review.
        const reader = new FileReader();
        reader.onload = ev => {
          const img = new Image();
          img.onload = () => {
            for (const size of [480, 360, 280, 200]) {
              const scale = Math.min(1, size / Math.max(img.width, img.height));
              const cnv = document.createElement('canvas');
              cnv.width = Math.round(img.width * scale);
              cnv.height = Math.round(img.height * scale);
              cnv.getContext('2d').drawImage(img, 0, 0, cnv.width, cnv.height);
              const url = cnv.toDataURL('image/jpeg', 0.78);
              if (url.length < 45000 || size === 200) { setPhotoPreview(url); return; }
            }
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(f);
      }

      async function submit() {
        // Only transmit what actually changed — untouched prefills stay blank in the
        // review sheet, so a filled cell always means "the candidate edited this".
        const hook1Changed = hook1 !== (candidate.hook || '');
        const hook2Changed = hook2 !== (candidate.summary || '');
        const websiteChanged = website !== (candidate.website || '');
        const answeredIssues = editIssues.filter(i => Object.keys(reactions[i.id] || {}).length > 0 || (ownWords[i.id] || '').trim());
        const whatChanged = [
          photoName && 'photo',
          websiteChanged && 'website',
          hook1Changed && 'Hook 1',
          hook2Changed && 'Hook 2',
          answeredIssues.length && `${answeredIssues.length} issue${answeredIssues.length > 1 ? 's' : ''}: ${answeredIssues.map(i => i.topic).join(', ')}`,
          Object.values(notes).some(v => v && v.trim()) && 'notes',
        ].filter(Boolean).join(' · ');
        const payload = {
          candidate: candidate.name,
          slug: candidateSlug(candidate.name),
          office: race?.office || null,
          party: candidate.party,
          website: websiteChanged ? website : '',
          hook1: hook1Changed ? hook1 : '',
          hook2: hook2Changed ? hook2 : '',
          whatChanged,
          photoChanged: !!photoName,
          photoDataUrl: photoName ? photoPreview : null,
          // Sparse on purpose: only issues the candidate actually answered appear in the review sheet.
          positions: Object.fromEntries(editIssues.filter(i => Object.keys(reactions[i.id] || {}).length > 0).map(i => [i.id, stanceFor(i.id)])),
          statementReactions: reactions, // per-statement Agree/Disagree/Skip — the same quiz voters take
          ownWords: Object.fromEntries(Object.entries(ownWords).filter(([, v]) => v && v.trim())),
          notes: Object.fromEntries(Object.entries(notes).filter(([,v]) => v && v.trim())),
          submitterName: submitterName.trim(),
          submitterRole,
          submitterEmail: submitterEmail.trim(),
          consent: true, // asserted by the declaration in the submit modal
        };
        setSubmitState('sending');
        try {
          const res = await fetch('/.netlify/functions/submit-candidate-edit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok || !data.ok) throw new Error(data.error || 'Submission failed');
          setSubmitted(data);
          setShowSubmitModal(false);
          try { localStorage.removeItem(draftKey); } catch {}
          window.scrollTo(0, 0);
        } catch (err) {
          setSubmitState('error');
          return;
        }
        setSubmitState(null);
      }

      const partyLabel = candidate.party === 'D' ? 'Democrat' : candidate.party === 'R' ? 'Republican' : 'Candidate';
      const partyBar = candidate.party === 'D' ? '#2563eb' : candidate.party === 'R' ? '#dc2626' : candidate.party === 'G' ? '#16a34a' : '#475569';
      const profileUrl = (window.location.pathname.replace(/\/edit\/?$/i, '') || '/');
      // Display/copy the pretty PascalCase form (JamesTalarico) — routing is case-insensitive.
      const fullProfileUrl = `${window.location.origin}/${(candidate.name || '').replace(/[^a-zA-Z0-9]/g, '')}`;
      const [urlCopied, setUrlCopied] = useState(false);
      function copyProfileUrl() {
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(fullProfileUrl);
          } else {
            // Older browsers / non-secure contexts: hidden-textarea fallback
            const ta = document.createElement('textarea');
            ta.value = fullProfileUrl;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
          }
          setUrlCopied(true);
          setTimeout(() => setUrlCopied(false), 2000);
        } catch {}
      }

      if (submitted) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center px-6 py-16 text-center fade-in">
            <div className="w-16 h-16 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600 text-3xl mb-5">✓</div>
            <h1 className="text-2xl font-black text-slate-900 mb-2">Thanks, {candidate.name.split(' ')[0]} — submitted for review.</h1>
            <p className="text-slate-600 max-w-md mb-6">Nothing goes live until the VoteYourViews team reviews it. We'll verify your identity and check the details, then your updates appear on your public profile.</p>
            <button onClick={onBack} className="px-6 py-3 rounded-xl bg-slate-900 text-white font-bold hover:bg-slate-800">← Back to profile</button>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50">
          {/* Identity header — VoteYourViews-branded, same design language as /statements */}
          <div className="text-white px-5 pt-5 pb-7 lg:px-10" style={{ background: 'radial-gradient(900px 420px at 50% -140px, #46538c 0%, #2e3a63 55%, #273254 100%) #273254', boxShadow: '0 14px 34px rgba(0,0,0,0.35)' }}>
            <div className="max-w-3xl mx-auto">
              <div className="flex items-center justify-between gap-3 pb-4 mb-5" style={{ borderBottom: '1px solid rgba(255,255,255,0.14)' }}>
                <a href="/" title="VoteYourViews home"><img src="/icons/VoteYourViews_Logo_White.png" alt="VoteYourViews" className="h-14 sm:h-16 w-auto transition-opacity hover:opacity-80" /></a>
                <div className="flex items-center gap-4 sm:gap-5">
                  <button onClick={onBack} className="text-[12px] sm:text-sm text-slate-300 hover:text-white transition-colors">← Back to profile</button>
                  <a href={profileUrl} target="_blank" rel="noopener" className="text-[12px] sm:text-sm font-bold transition-colors hover:brightness-125" style={{ color: '#f59e0b' }}>Live profile ↗</a>
                </div>
              </div>
              <p className="text-[13px] sm:text-[15px] font-black uppercase tracking-[0.3em] mb-3" style={{ color: '#f59e0b' }}>★ Candidate Editor</p>
              <div className="flex items-center gap-4 sm:gap-5">
                {photoPreview
                  ? <img src={photoPreview} alt="" className="w-16 h-16 sm:w-20 sm:h-20 rounded-full object-cover shrink-0" style={{ objectPosition: 'center top', border: '2.5px solid rgba(245,158,11,0.75)', boxShadow: '0 8px 24px rgba(0,0,0,0.5)' }} />

                                <button key={val} type="button" onClick={() => setRx(i, val)}
