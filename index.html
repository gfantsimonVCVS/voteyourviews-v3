                                        <div key={d} className={`w-1.5 h-1.5 rounded-full ${d<=Math.round(issueRank/2)?'bg-slate-600':'bg-slate-200'}`} />
                                      ))}
                                    </div>
                                  )}
                                </button>
                              ) : (
                                <button onClick={() => onQuiz?.(issue.id)} className="flex flex-col items-center gap-1 group">
                                  <div className="w-12 h-12 rounded-full border-2 border-dashed border-slate-400 flex items-center justify-center group-hover:border-blue-400 transition-colors">
                                    <svg className="w-6 h-6 text-slate-400 group-hover:text-blue-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                                      <path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" />
                                    </svg>
                                  </div>
                                  <span className="text-[8px] font-bold text-slate-400 group-hover:text-blue-500 transition-colors uppercase tracking-wide">Add View</span>
                                </button>
                              )}
                            </div> {/* end ME panel */}
                            {/* Candidate panels */}
                            {colCands.map(c => {
                              const cPos = c.positions?.[issue.id];
                              const isMatch = voterAnswered && cPos === voterPos;
                              const isMismatch = voterAnswered && voterPos && cPos && cPos !== voterPos;
                              return (
                                <div key={c.name} style={{width:P}} className="flex items-center justify-center py-2 border-r border-slate-200">
                                  {cPos && cPos !== 'D' ? (
                                    <button onClick={() => setSourceModal({candidate:c, issue})} className="relative group active:scale-95 hover:scale-105 transition-transform">
                                      <div className="relative px-2 py-1.5 rounded-xl flex items-center justify-center transition-all duration-150"
                                        style={{border:`2px solid ${candAccent(c)}`, boxShadow:`0 2px 8px ${candAccent(c)}33`, background:'white'}}
                                        onMouseEnter={e=>{e.currentTarget.style.background=candAccent(c); e.currentTarget.querySelector('span').style.color='white';}}
                                        onMouseLeave={e=>{e.currentTarget.style.background='white'; e.currentTarget.querySelector('span').style.color=candAccent(c);}}>
                                        <span className="text-[9px] font-black uppercase tracking-widest transition-colors" style={{color: candAccent(c)}}>My View</span>
                                        <span className="absolute -bottom-[7px] left-1/2 -translate-x-1/2 w-0 h-0"
                                          style={{borderLeft:'6px solid transparent', borderRight:'6px solid transparent', borderTop:`6px solid ${candAccent(c)}`}}/>
                                        <span className="absolute -bottom-[4px] left-1/2 -translate-x-1/2 w-0 h-0"
                                          style={{borderLeft:'5px solid transparent', borderRight:'5px solid transparent', borderTop:'5px solid white'}}/>
                                      </div>
                                      {isMatch && <span className="absolute -top-1 -right-1 text-[8px] bg-emerald-500 text-white rounded-full w-3.5 h-3.5 flex items-center justify-center font-black">✓</span>}
                                      {isMismatch && <span className="absolute -top-1 -right-1 text-[8px] bg-rose-400 text-white rounded-full w-3.5 h-3.5 flex items-center justify-center font-black">✗</span>}
                                    </button>
                                  ) : (
                                    <span className="text-slate-300 text-lg">—</span>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* ── Sticky bottom ── */}
                <div className="sticky bottom-0 bg-white border-t border-slate-200 shadow-lg">
                {/* Nav row: Prev + Next */}
                <div className="flex px-3 py-2 gap-2">
                  {onPrevRace ? (
                    <button onClick={onPrevRace}
                      className="flex-1 py-2 rounded-lg bg-slate-800 text-white flex items-center justify-center gap-1.5 hover:bg-slate-700 transition-colors"
                      style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'15px', fontWeight:700}}>
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
                      Prev Race
                    </button>
                  ) : (
                    <button onClick={onBack}
                      className="flex-1 py-2 rounded-lg bg-slate-800 text-white flex items-center justify-center gap-1.5 hover:bg-slate-700 transition-colors"
                      style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'15px', fontWeight:700}}>
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
                      All Races
                    </button>
                  )}
                  {onNextRace && (
                    <button onClick={onNextRace}
                      className="flex-1 py-2 rounded-lg bg-slate-800 text-white flex items-center justify-center gap-1.5 hover:bg-slate-700 transition-colors"
                      style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'15px', fontWeight:700}}>
                      Next Race
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7"/></svg>
                    </button>
                  )}
                </div>
                <div className="flex items-center justify-center py-1.5 border-t border-slate-100">
                  <button onClick={onBack} className="text-[11px] font-bold text-slate-400 hover:text-slate-700 transition-colors flex items-center gap-1">
                    <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
                    Back to All Races
                  </button>
                </div>
                <div className="flex">
                  <div style={{width:'33.333%'}} />
                  <div style={{width:'66.666%',overflow:'hidden'}} {...touchHandlers}>
                    <div className="flex" data-slide style={SLIDE}>
                      {/* ME spacer */}
                      <div style={{width:P}} />
                      {/* Candidate buttons */}
                      {colCands.map(c => {
                        const isChosen = currentSelected === c.name;
                        const btnColor = isChosen?'bg-emerald-500 hover:bg-emerald-600':c.party==='D'?'bg-blue-600 hover:bg-blue-700':'bg-red-600 hover:bg-red-700';
                        return (
                          <div key={c.name} style={{width:P}} className="px-2 pt-1 pb-2 space-y-1">
                            {/* Candidate name label so buttons are clearly attributed */}
                            <div className="text-center text-[10px] font-black text-slate-500 uppercase tracking-wide truncate">
                              {c.name.split(' ').slice(-1)[0]}
                            </div>
                            <button onClick={() => setProfileCandidate(c)}
                              className={`w-full py-1.5 rounded-lg border transition-colors ${c.party==='D'?'bg-blue-50 border-blue-200 text-blue-700 hover:bg-blue-100':'bg-red-50 border-red-200 text-red-700 hover:bg-red-100'}`}
                              style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'13px', fontWeight:700, letterSpacing:'0.03em'}}>
                              All Issues
                            </button>
                            <button onClick={() => onSelect(race.office, isChosen ? null : c.name)}
                              className={`w-full py-1.5 rounded-lg text-white transition-colors ${btnColor}`}
                              style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'13px', fontWeight:900, letterSpacing:'0.03em'}}>
                              {isChosen ? '✓ On Ballot' : 'Add to Ballot'}
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
                </div>
              </>
            );
          })()}
        </div>
        </div>
      );
    }

    function Browse({ county, counties, setCounty, issues, answers, ranks, checkedStatements, selected, setSelected, userDistricts, setUserDistricts, onBallot, onHome, onBack = onHome, backLabel = '← Home', onQuiz, onRateIssue, initialRace, clearInitialRace, initialProfile, clearInitialProfile, focusIssueId, clearFocusIssue }) {
      const countyData = counties[county];
      const [activeTab, setActiveTab] = useState('federal');
      const [expandedRaces, setExpandedRaces] = useState(new Set());
      const [showFilterModal, setShowFilterModal] = useState(false);
      const [browseProfile, setBrowseProfile] = useState(null); // {candidate, race}
      const [showAddr, setShowAddr] = useState(false);

      const TABS = [
        { key: 'federal',  label: 'Federal' },
        { key: 'state',    label: 'State' },
        { key: 'county',   label: 'County' },
        { key: 'judicial', label: 'Judicial' },
      ];

      // Auto-open a race when returning from quiz
      useEffect(() => {
        if (initialRace && countyData) {
          const sec = RACE_SECTIONS.find(s => (countyData[s.key]||[]).some(r => r.office === initialRace.office));
          if (sec) {
            setActiveTab(sec.key);
            setExpandedRaces(prev => new Set([...prev, initialRace.office]));
          }
          clearInitialRace?.();
        }
      }, [initialRace]);

      // Reopen the candidate profile after returning from a single-issue "rate this" quiz.
      useEffect(() => {
        if (initialProfile) { setBrowseProfile(initialProfile); clearInitialProfile?.(); }
      }, [initialProfile]);

      function toggleRace(office) {
        setExpandedRaces(prev => {
          const next = new Set(prev);
          next.has(office) ? next.delete(office) : next.add(office);
          return next;
        });
      }

      const races = filterRacesByDistrict(countyData[activeTab] || [], userDistricts);
      const selectedCount = Object.keys(selected).length;
      // Same lean-coded CTA colors as the Pre-Ballot page (blue/red/purple by the
      // voter's own views; neutral slate when nothing answered).
      const leanCounts = { A: 0, B: 0, C: 0 };
      issues.forEach(i => { const p = deriveVoterPos(i.id, answers, checkedStatements); if (leanCounts[p] !== undefined) leanCounts[p]++; });
      const ctaColors = leanCounts.A === 0 && leanCounts.B === 0 && leanCounts.C === 0
        ? { grad: 'linear-gradient(90deg,#334155,#475569)', border: '#94a3b8', glow: 'rgba(100,116,139,0.45)' }
        : leanCounts.A > leanCounts.C
          ? { grad: 'linear-gradient(90deg,#1d4ed8,#2563eb)', border: '#60a5fa', glow: 'rgba(37,99,235,0.45)' }
          : leanCounts.C > leanCounts.A
            ? { grad: 'linear-gradient(90deg,#b91c1c,#dc2626)', border: '#f87171', glow: 'rgba(220,38,38,0.45)' }
            : { grad: 'linear-gradient(90deg,#7e22ce,#9333ea)', border: '#c084fc', glow: 'rgba(147,51,234,0.45)' };
      const tabsWithCounts = TABS.map(tab => {
        const tabRaces = filterRacesByDistrict(countyData[tab.key] || [], userDistricts);
        return { ...tab, count: tabRaces.filter(r => selected[r.office]).length };
      });
      const [showHeaderDrop, setShowHeaderDrop] = useState(false);

      return (
        <div className="min-h-screen" style={{background:'linear-gradient(160deg,#1e1b4b 0%,#0f172a 60%,#0c1a2e 100%)'}}>
          {/* Header */}
          <header className="sticky top-0 z-50" style={{background:'#0f172a', borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
            {/* Mobile: stacked layout */}
            <div className="lg:hidden px-4 py-3">
              <div className="flex items-center justify-between gap-2">
                <button onClick={onBack} className="text-sm text-slate-400 hover:text-white font-medium flex items-center gap-1 transition-colors shrink-0">{backLabel}</button>
                <CountyBanner compact county={county} counties={counties} setCounty={setCounty} userDistricts={userDistricts} setUserDistricts={setUserDistricts} onMyCandidates={() => setShowAddr(true)} />
                <BetaChip />
              </div>
              <div className="mt-3">
                <CategoryTabs tabs={tabsWithCounts} activeTab={activeTab} setActiveTab={setActiveTab} size="mobile" />
              </div>
            </div>

            {/* Desktop: single dark row */}
            <div className="hidden lg:flex items-center h-16 px-8 relative">
              <div className="absolute left-8 flex items-center gap-2.5">
                <button onClick={onBack} className="text-sm text-slate-400 hover:text-white font-semibold flex items-center gap-1.5 transition-colors">{backLabel}</button>
                <BetaChip />
              </div>
              <div className="mx-auto">
                <CategoryTabs tabs={tabsWithCounts} activeTab={activeTab} setActiveTab={setActiveTab} size="desktop" />
              </div>
              <div className="absolute right-8">
                <CountyBanner compact county={county} counties={counties} setCounty={setCounty} userDistricts={userDistricts} setUserDistricts={setUserDistricts} onMyCandidates={() => setShowAddr(true)} />
              </div>
            </div>
          </header>
          {showAddr && (
            <AddressModal county={county} accentColor="#3b82f6" accentColorDark="#1d4ed8"
              onCountyDetected={setCounty}
              onClose={() => setShowAddr(false)}
              onContinue={(districts) => { setUserDistricts(districts); setShowAddr(false); }}
              onShowAll={() => setShowAddr(false)} />
          )}

          {/* Section header — solid banner naming the active section */}
          <div style={{background:'rgba(255,255,255,0.06)', borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
            <div className="max-w-5xl mx-auto w-full px-4 py-2.5 flex items-center gap-2">
              <p className="text-white font-black uppercase tracking-wide text-[17px] leading-none" style={{fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:'0.06em'}}>
                Compare {TABS.find(t => t.key === activeTab)?.label} Candidates
              </p>
              <span className="text-[11px] font-bold" style={{color:'#34d399'}}>{races.length} races</span>
            </div>
          </div>

          {/* Race list */}
          <main className="max-w-5xl mx-auto px-4 py-4 space-y-2">
            {races.length === 0 && (
              <div className="text-center py-16 text-slate-400 text-sm">No races in this category for your district.</div>
            )}
            {races.map(race => {
              const isExpanded = expandedRaces.has(race.office);
              const isSelected = !!selected[race.office];
              const score = answers && Object.keys(answers).length > 0
                ? Math.max(...race.candidates.filter(Boolean).map(c => calcMatch(c, answers, checkedStatements, ranks) || 0))
                : null;
              return (
                <div key={race.office} id={'race-'+race.office.replace(/\s+/g,'-')} className="rounded-2xl shadow-sm border border-slate-800" style={{overflow: isExpanded ? 'visible' : 'hidden'}}>
                  {/* Dark header */}
                  <div className="sticky top-0 z-20 w-full flex flex-col lg:flex-row"
                    style={{background:'linear-gradient(135deg,#0f172a 0%,#1e293b 100%)'}}>

                    {/* Mobile: full-width title row / Desktop: left 50% (title + description) */}
                    <button onClick={() => toggleRace(race.office)}
                      className="w-full lg:w-1/2 flex text-left hover:brightness-110 transition-all cursor-pointer border-b border-white/10 lg:border-b-0 lg:border-r lg:border-white/20">
                      {/* Title col */}
                      <div className="flex-1 lg:w-1/2 px-4 py-2.5 lg:py-4 flex items-center justify-center lg:flex-col lg:items-center lg:justify-center border-r border-white/20">
                        {isSelected && <span className="text-sm text-emerald-400 font-bold mr-2 lg:mr-0 lg:mb-2">✓</span>}
                        <h2 className="text-white font-black uppercase leading-tight text-center"
                          style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'20px', letterSpacing:'0.04em'}}>
                          {(() => {
                            const o = race.office.replace(/ of Texas$/i,'').replace(/ of the State of Texas$/i,'');
                            return /^.+? County\s/.test(o)
                              ? formatOfficeLines(race.office).map((line, i) => <span key={i} className="block">{line}</span>)
                              : o.replace(/\s*[—–]\s*/g,' • ');
                          })()}
                        </h2>
                      </div>
                      {/* Description col — desktop only */}
                      <div className="hidden lg:flex w-1/2 px-5 py-5 flex-col justify-center">
                        {(() => {
                          const info = getOfficeInfo(race.office);
                          const txt = info || race.description;
                          return txt ? <p className="text-slate-400 text-xs leading-relaxed">{txt}</p> : null;
                        })()}
                        {isSelected && <div className="text-xs text-emerald-400 font-bold mt-2">✓ {selected[race.office]}</div>}
                      </div>
                    </button>

                    {/* Candidate columns — 50/50 on mobile, 25/25 on desktop */}
                    <div className="w-full lg:w-1/2 flex relative">
                      {/* Compare button removed */}
                      {race.candidates.filter(Boolean).slice(0,2).map(c => {
                        const accent = c.party==='D'?'#3b82f6':c.party==='R'?'#ef4444':'#94a3b8';
                        const partyLabel = c.party==='D'?'Democrat':c.party==='R'?'Republican':'Independent';
                        const partyColor = c.party==='D'?'text-blue-400':c.party==='R'?'text-red-400':'text-slate-400';
                        const candMatch = answers && Object.keys(answers).length > 0 ? calcMatch(c, answers, checkedStatements, ranks) : null;
                        const ringSize = 72;
                        const border = 4;
                        return (
                          <button key={c.name}
                            onClick={() => setBrowseProfile({candidate: c, race})}
                            className="flex-1 flex flex-col items-center justify-center py-4 lg:py-5 gap-2 border-r border-white/10 cursor-pointer active:bg-white/10 transition-colors"
                            style={{background:'rgba(255,255,255,0.05)', margin:'8px', borderRadius:'14px', border:`1.5px solid #d97706`}}>
                            <p className="text-[12px] font-black text-slate-200 uppercase tracking-widest text-center leading-tight">{c.name}</p>
                            <div className="relative" style={{width: Math.round(ringSize*1.04), height: Math.round(ringSize*1.04)}}>
                              <div className="absolute inset-0 rounded-full" style={{background: accent}} />
                              <div className="absolute rounded-full overflow-hidden bg-slate-700" style={{inset: border}}>
                                <img src={c.photo||'/icons/candidate-undefined.png'} alt={c.name} className="w-full h-full object-cover object-top"
                                  onError={e=>{e.target.src='/icons/candidate-undefined.png';}} />
                              </div>
                              {candMatch !== null && (
                                <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 text-[10px] font-black rounded-full px-1.5 py-0.5 leading-none"
                                  style={{background:'#0f172a', color: accent, border:`1px solid ${accent}`, whiteSpace:'nowrap'}}>
                                  {candMatch}%
                                </div>
                              )}
                            </div>
                            <span className={`text-[10px] font-bold uppercase tracking-wide ${partyColor}`}>{partyLabel}</span>
                            <span className="inline-flex items-center gap-1 text-[9px] font-black uppercase tracking-widest px-2.5 py-0.5 rounded-full" style={{background:'rgba(217,119,6,0.2)', color:'#f59e0b', border:'1px solid rgba(217,119,6,0.5)'}}><svg viewBox="0 0 24 24" fill="currentColor" style={{width:'11px',height:'11px'}}><path d="M12 12a4 4 0 100-8 4 4 0 000 8zm0 2c-4.4 0-8 2.7-8 6v1h16v-1c0-3.3-3.6-6-8-6z"/></svg>About {c.name.split(' ')[0]}</span>
                            {(() => {
                              const isCandSelected = selected[race.office] === c.name;
                              return (
                                <button
                                  onClick={e => {
                                    e.stopPropagation();
                                    setSelected(prev => isCandSelected
                                      ? Object.fromEntries(Object.entries(prev).filter(([k]) => k !== race.office))
                                      : {...prev, [race.office]: c.name});
                                  }}
                                  className="mt-1 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest transition-all active:scale-95"
                                  style={isCandSelected
                                    ? {background:'#10b981', color:'#fff'}
                                    : {background:'rgba(255,255,255,0.1)', color:'rgba(255,255,255,0.6)', border:'1px solid rgba(255,255,255,0.2)'}}>
                                  {isCandSelected ? '✓ On Ballot' : '+ Add to Ballot'}
                                </button>
                              );
                            })()}
                          </button>
                        );
                      })}
                      {/* Placeholder opponent for uncontested races */}
                      {(() => {
                        const reals = race.candidates.filter(Boolean);
                        if (reals.length !== 1 || !reals[0].uncontested) return null;
                        const missing = reals[0].party === 'D' ? 'Republican' : 'Democratic';
                        return (
                          <div className="flex-1 flex flex-col items-center justify-center py-4 lg:py-5 gap-2"
                            style={{margin:'8px', borderRadius:'14px', border:'1.5px dashed rgba(255,255,255,0.18)', background:'rgba(255,255,255,0.02)'}}>
                            <p className="text-[12px] font-black uppercase tracking-widest text-center leading-tight" style={{color:'rgba(255,255,255,0.45)'}}>No {missing}<br/>Candidate</p>
                            <div className="relative" style={{width:75, height:75}}>
                              <div className="absolute rounded-full overflow-hidden" style={{inset:0, background:'#1e293b', border:'4px solid #334155'}}>
                                <img src="/icons/candidate-undefined.png" alt="" className="w-full h-full object-cover object-top" style={{opacity:0.3}} />
                              </div>
                              <svg className="absolute inset-0 w-full h-full" viewBox="0 0 100 100" aria-hidden="true">
                                <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(148,163,184,0.6)" strokeWidth="5"/>
                                <line x1="22" y1="78" x2="78" y2="22" stroke="rgba(148,163,184,0.6)" strokeWidth="5"/>
                              </svg>
                            </div>
                            <span className="text-[9px] font-bold uppercase tracking-wide text-slate-400 border border-slate-600 rounded px-1.5 py-0.5">Uncontested</span>
                          </div>
                        );
                      })()}
                    </div>
                  </div>

                  {/* Expanded inline grid */}
                  {isExpanded && (
                    <div>
                      <RaceDetail
                        race={race}
                        issues={issues}
                        answers={answers}
                        ranks={ranks}
                        checkedStatements={checkedStatements}
                        selected={selected}
                        onSelect={(office, name) => setSelected(prev => name ? {...prev, [office]: name} : Object.fromEntries(Object.entries(prev).filter(([k]) => k !== office)))}
                        onBack={() => toggleRace(race.office)}
                        onNextRace={null}
                        onPrevRace={null}
                        onQuiz={(id) => onQuiz(id, race)}
                        onHome={onHome}
                        inline={true}
                      />
                    </div>
                  )}
                </div>
              );
            })}

            {/* Spacer so the last race card can scroll clear of the fixed bar */}
            <div style={{height:'84px'}} />
          </main>

          {/* Fixed finish line — Build My Ballot always on screen */}
          <div className="fixed bottom-0 left-0 right-0 z-40 px-4 pt-3 pb-4" style={{background:'linear-gradient(to top, #0c1a2e 65%, rgba(12,26,46,0))'}}>
            <button onClick={onBallot}
              className="w-full max-w-5xl mx-auto flex items-center justify-center gap-2 py-3.5 rounded-full font-black text-sm uppercase tracking-widest text-white transition-all hover:brightness-110 active:scale-[0.99]"
              style={{background: ctaColors.grad, border: `1px solid ${ctaColors.border}`, letterSpacing:'0.12em', boxShadow: `0 8px 24px ${ctaColors.glow}`}}>
              <svg className="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.2}><path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
              {selectedCount > 0 ? `Build My Ballot · ${selectedCount} race${selectedCount !== 1 ? 's' : ''} →` : 'Build My Ballot →'}
            </button>
          </div>

          {showFilterModal && (
            <AddressModal
              county={county || 'hays'}
              accentColor="#2563eb"
              onClose={() => setShowFilterModal(false)}
              onContinue={(districts) => { if (setUserDistricts) setUserDistricts(districts); setShowFilterModal(false); }}
              onShowAll={() => { if (setUserDistricts) setUserDistricts(null); setShowFilterModal(false); }}
            />
          )}

          {browseProfile && (() => {
            const opponent = browseProfile.race.candidates.filter(Boolean).find(c => c.name !== browseProfile.candidate.name);
            return (
            <CandidateProfile
              candidate={browseProfile.candidate}
              opponent={browseProfile.race.candidates.find(c => c && c.name !== browseProfile.candidate.name) || null}
              issues={issues}
              answers={answers}
              checkedStatements={checkedStatements}
              ranks={ranks}
              onClose={() => setBrowseProfile(null)}
              onRateIssue={onRateIssue ? (id) => onRateIssue(id, browseProfile) : undefined}
              focusIssueId={focusIssueId}
              clearFocusIssue={clearFocusIssue}
              isSelected={(() => {
                // Mirror the printable ballot's getBestCandidate: chosen → else best match → else first candidate.
                // So a 100% match that's implicitly on the ballot reads "✓ On Ballot" here too (not "+ Add to Ballot").
                const office = browseProfile.race.office;
                if (selected[office]) return selected[office] === browseProfile.candidate.name;
                const cands = browseProfile.race.candidates.filter(Boolean);
                let ballotCand = null;
                if (answers && Object.keys(answers).length > 0) {
                  const scored = cands.map(c => ({ c, s: calcMatch(c, answers, checkedStatements, ranks) })).filter(x => x.s !== null).sort((a, b) => b.s - a.s);
                  if (scored.length) ballotCand = scored[0].c;
                }
                if (!ballotCand) ballotCand = cands[0];
                return !!ballotCand && ballotCand.name === browseProfile.candidate.name;
              })()}
              onSelect={() => setSelected(prev => {
                const isChosen = prev[browseProfile.race.office] === browseProfile.candidate.name;
                return isChosen
                  ? Object.fromEntries(Object.entries(prev).filter(([k]) => k !== browseProfile.race.office))
                  : {...prev, [browseProfile.race.office]: browseProfile.candidate.name};
              })}
              onCompare={opponent ? () => setBrowseProfile({candidate: opponent, race: browseProfile.race}) : null}
              isOpponent={false}
            />
            );
          })()}
        </div>
      );
    }

    function BrowseRaceCard({ race, answers, ranks, checkedStatements, selected, onToggle }) {
      const candidates = race.candidates.filter(Boolean);
      const hasAnswers = answers && Object.keys(answers).length > 0;
      const currentSelected = selected[race.office];

      // Best-match hint when quiz taken
      let matchHint = null;
      if (hasAnswers && candidates.length >= 2) {
        const scores = candidates.map(c => ({ name: c.name, score: calcMatch(c, answers, checkedStatements, ranks) })).filter(s => s.score !== null);
        if (scores.length > 0) {
          scores.sort((a, b) => b.score - a.score);
          matchHint = `${scores[0].score}% match`;
        }
      }

      return (
        <button
          onClick={onToggle}
          className={`w-full px-4 py-4 flex items-center justify-between hover:bg-slate-50 active:bg-slate-100 transition-colors text-left bg-white ${currentSelected ? 'bg-emerald-50/50' : ''}`}
        >
          <div className="flex-1 min-w-0 mr-4">
            <div className="font-black text-slate-900 text-[17px] leading-tight" style={{fontFamily:"'Barlow Condensed', sans-serif", letterSpacing:'0.01em'}}>{race.office.replace(/ of Texas$/i,'').replace(/ of the State of Texas$/i,'')}</div>
            {currentSelected
              ? <div className="text-xs text-emerald-600 font-semibold mt-1">✓ {currentSelected}</div>
              : matchHint && <div className="text-xs text-slate-400 mt-1">{matchHint}</div>
            }
          </div>
          <div className="flex items-center gap-3 shrink-0">
            <div className="flex -space-x-3">
              {candidates.slice(0, 2).map(c => (
                <div key={c.name}
                  className={`w-11 h-11 rounded-full border-[3px] overflow-hidden bg-slate-200 ${c.party === 'D' ? 'border-blue-400' : c.party === 'R' ? 'border-red-400' : 'border-slate-300'}`}
                  style={{flexShrink:0}}
                >
                  <img
                    src={c.photo || '/icons/candidate-undefined.png'}
                    alt={c.name}
                    className="w-full h-full object-cover object-top"
                    onError={e => { e.target.src='/icons/candidate-undefined.png'; e.target.className='w-full h-full object-contain object-bottom'; e.target.style.opacity='0.5'; }}
                  />
                </div>
              ))}
            </div>
            <svg className="w-4 h-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M9 5l7 7-7 7" />
            </svg>
          </div>
        </button>
      );
    }

    // ─── BALLOT ───
    function Ballot({ county, counties, selected, answers, ranks, checkedStatements, issues, userDistricts, onBack, onHome, onEdit }) {
      const countyData = counties[county];
      const hasAnswers = answers && Object.keys(answers).length > 0;
      const [downloading, setDownloading] = React.useState(false);
      const [showEmailTBA, setShowEmailTBA] = React.useState(false);

      // Share the guide — native share sheet when available, else copy-link, else a manual-copy prompt (never silently fails).
      async function handleShareGuide() {
        const url = 'https://voteyourviews.org';
        const data = { title: 'VoteYourViews — My 2026 Texas Ballot', text: 'Rank your beliefs, see which candidates match, and build your ballot:', url };
        if (navigator.share) {
          try { await navigator.share(data); return; }
          catch (e) { if (e && e.name === 'AbortError') return; }   // user dismissed; on a real error, fall through
        }
        try { await navigator.clipboard.writeText(url); alert('Link copied! Share it anywhere:\n' + url); return; }
        catch (e) { /* clipboard blocked — fall through to manual copy */ }
        window.prompt('Copy this link to share the guide:', url);
      }

      async function handleDownloadPDF() {
        setDownloading(true);
        const page = document.querySelector('.ballot-page');
        const noprint = page ? [...page.querySelectorAll('.no-print')] : [];
        const npSaved = noprint.map(n => n.style.display);
        const saved = page ? { width: page.style.width, maxWidth: page.style.maxWidth, padding: page.style.padding, boxShadow: page.style.boxShadow } : null;
        try {
          if (!page || typeof html2canvas === 'undefined') throw new Error('ballot page or html2canvas unavailable');
          const LAYOUT_W = 816;
          // Force desktop letter dimensions + hide screen-only controls so the capture (and measurements) are device-independent.
          page.style.width = LAYOUT_W + 'px'; page.style.maxWidth = LAYOUT_W + 'px'; page.style.padding = '52px 60px 40px'; page.style.boxShadow = 'none';
          noprint.forEach(n => { n.style.display = 'none'; });
          await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

          const pageRect = page.getBoundingClientRect();
          const rel = (el) => { const r = el.getBoundingClientRect(); return { x: r.left - pageRect.left, y: r.top - pageRect.top, w: r.width, h: r.height }; };
          // Links to keep clickable in the PDF (logo → site; registration → vote.org; polling → maps).
          const links = [];
          const bannerA = page.querySelector('a[href*="voteyourviews.org"]'); if (bannerA) links.push({ r: rel(bannerA), url: 'https://voteyourviews.org' });
          page.querySelectorAll('a[href*="vote.org"], a[href*="google.com/maps"], a[href*="maps.apple"]').forEach(a => links.push({ r: rel(a), url: a.href }));

          const canvas = await html2canvas(page, { scale: 2, useCORS: true, backgroundColor: '#ffffff', windowWidth: 900,
            onclone: (doc) => {
              // html2canvas re-runs CSS animations on its clone — disable them so we don't capture a mid-fade (grayed-out) frame.
              doc.querySelectorAll('.fade-in, .slide-in, .issue-enter, [class*="fade"], [class*="slide"]').forEach(n => { n.style.animation = 'none'; n.style.opacity = '1'; n.style.transform = 'none'; });
            }
          });

          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF('p', 'pt', 'letter');
          const pageWpt = pdf.internal.pageSize.getWidth();   // 612
          const S = pageWpt / LAYOUT_W;                       // layout px → pt (0.75)
          const cScale = canvas.width / LAYOUT_W;             // canvas px per layout px (~2)
          // Paginate into as many letter pages as the ballot needs (long county ballots overflow 2 pages).
          // Snap each page break to the nearest safe row/section boundary so a candidate row is never cut in half.
          const pageHpt = pdf.internal.pageSize.getHeight();                 // 792
          const pageHpx = Math.floor((pageHpt / pageWpt) * canvas.width);    // canvas px that fill one printed page
          const breakYs = [];
          page.querySelectorAll('.ballot-pick-row, [data-sec]').forEach(el => {
            const y = Math.round((el.getBoundingClientRect().top - pageRect.top) * cScale);
            if (y > 4) breakYs.push(y);
          });
          breakYs.sort((a, b) => a - b);
          const slices = [];
          let sy = 0;
          while (sy < canvas.height) {
            let target = sy + pageHpx;
            if (target >= canvas.height) { slices.push([sy, canvas.height]); break; }
            let snap = -1;
            for (const b of breakYs) { if (b > sy + 60 && b <= target) snap = b; else if (b > target) break; }
            const end = snap > 0 ? snap : target;
            slices.push([sy, end]); sy = end;
          }

          slices.forEach(([y0, y1], i) => {
            if (i > 0) pdf.addPage();
            const sh = y1 - y0;
            const sc = document.createElement('canvas'); sc.width = canvas.width; sc.height = sh;
            sc.getContext('2d').drawImage(canvas, 0, y0, canvas.width, sh, 0, 0, canvas.width, sh);
            pdf.addImage(sc.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, pageWpt, sh * (pageWpt / canvas.width));
            const sliceTop = y0 / cScale, sliceBot = y1 / cScale;
            links.forEach(L => {
              if (L.r.y + L.r.h > sliceTop && L.r.y < sliceBot) {
                pdf.link(L.r.x * S, (L.r.y - sliceTop) * S, L.r.w * S, L.r.h * S, { url: L.url });
              }
            });
          });
          console.log('[VYV] PDF pages:', pdf.internal.getNumberOfPages(), '| links:', links.length, '| slices:', slices.length);
          const today = new Date();
          pdf.save(`VoteYourViews Ballot ${today.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}.pdf`);
        } catch(e) {
          console.error(e);
          alert('Could not generate PDF. Please try the Print button instead.');
        } finally {
          if (page && saved) { page.style.width = saved.width; page.style.maxWidth = saved.maxWidth; page.style.padding = saved.padding; page.style.boxShadow = saved.boxShadow; }
          noprint.forEach((n, i) => { n.style.display = npSaved[i]; });
          setDownloading(false);
        }
      }

      // Set document title for PDF filename when printing
      useEffect(() => {
        const today = new Date();
        const month = today.toLocaleString('default', { month: 'long' });
        const day = today.getDate();
        const year = today.getFullYear();
        document.title = `My Midterm Ballot - ${month} ${day} ${year}`;
        return () => { document.title = 'Vote Your Views — Stop voting Parties. Start voting your views.'; };
      }, []);

      // For each race: get chosen candidate OR best match OR first candidate
      function getBestCandidate(race) {
        const chosen = race.candidates.find(c => c.name === selected[race.office]);
        if (chosen) return { candidate: chosen, isChosen: true };
        if (hasAnswers) {
          const scored = race.candidates.filter(Boolean).map(c => ({ candidate: c, score: calcMatch(c, answers, checkedStatements, ranks) })).filter(s => s.score !== null).sort((a,b) => b.score - a.score);
          if (scored.length > 0) return { candidate: scored[0].candidate, isChosen: false };
        }
        return { candidate: race.candidates.filter(Boolean)[0], isChosen: false };
      }

      const allRaces = RACE_SECTIONS.flatMap(sec => filterRacesByDistrict(countyData[sec.key] || [], userDistricts));
      const ballotCandidates = allRaces.map(race => {
        const { candidate } = getBestCandidate(race);
        if (!candidate) return null;
        return { race, candidate };
      }).filter(Boolean);

      return (
        <div className="min-h-screen" style={{background:'#e2e8f0'}}>

          <div className="no-print" style={{height:'64px'}} />
          <header className="no-print fixed top-0 left-0 right-0 z-40 px-3 py-3 flex items-center gap-2"
            style={{background:'#0f172a', borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
            <button onClick={onBack}
              className="shrink-0 flex items-center gap-1 text-white text-sm font-black uppercase tracking-wide px-2.5 py-2.5 rounded-xl active:scale-95 transition-transform"
              style={{background:'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.25)'}}>
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
              <span className="hidden md:inline">Back</span>
            </button>
            {/* Centered action buttons — rounded-rectangle, prominent */}
            <div className="flex-1 flex items-center justify-center gap-2 sm:gap-2.5 min-w-0">
              <button onClick={handleDownloadPDF} disabled={downloading}
                className="flex items-center gap-1.5 text-[13px] sm:text-sm font-black uppercase tracking-wide px-3 sm:px-4 py-2.5 rounded-xl text-white whitespace-nowrap active:scale-95 transition-transform"
                style={{background:'#16a34a', letterSpacing:'0.04em', boxShadow:'0 2px 8px rgba(0,0,0,0.35)', opacity: downloading ? 0.6 : 1}}>
                <svg className="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                {downloading ? 'Saving…' : 'Save PDF'}
              </button>
              <button onClick={() => window.print()} className="flex items-center gap-1.5 text-[13px] sm:text-sm font-black uppercase tracking-wide px-3 sm:px-4 py-2.5 rounded-xl text-white whitespace-nowrap active:scale-95 transition-transform"
                style={{background:'#2563eb', letterSpacing:'0.04em', boxShadow:'0 2px 8px rgba(0,0,0,0.35)'}}>
                <svg className="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                Print
              </button>
              <button onClick={handleShareGuide} className="flex items-center gap-1.5 text-[13px] sm:text-sm font-black uppercase tracking-wide px-3 sm:px-4 py-2.5 rounded-xl text-white whitespace-nowrap active:scale-95 transition-transform"
                style={{background:'#7c3aed', letterSpacing:'0.04em', boxShadow:'0 2px 8px rgba(0,0,0,0.35)'}}>
                <svg className="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M8.7 10.7l6.6-3.4M8.7 13.3l6.6 3.4M18 8a3 3 0 10-3-3 3 3 0 003 3zM6 15a3 3 0 10-3-3 3 3 0 003 3zm12 7a3 3 0 10-3-3 3 3 0 003 3z"/></svg>
                Share
              </button>
            </div>
          </header>

          {/* Printable letter page — the on-screen sheet that the PDF mirrors */}
          <div className="ballot-page">
            {/* Colored brand banner header — links to the site (same logo as mobile) */}
            <a href="https://voteyourviews.org" target="_blank" rel="noopener noreferrer" style={{display:'block', textDecoration:'none'}}>
              <img src="/icons/VoteYourViews_ThinHeader1.png" alt="VoteYourViews.org" className="ballot-banner" onError={e=>{e.currentTarget.style.display='none';}} />
            </a>
            <div style={{textAlign:'center', marginTop:'10px'}}>
              <div className="ballot-title font-black uppercase" style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'26px', color:'#0f172a', letterSpacing:'0.02em', lineHeight:1.04}}>
                Everything You Need to Vote in <span style={{color:'#1d3a8a'}}>2026 Texas Midterm</span>
              </div>
              <div style={{display:'flex', alignItems:'center', justifyContent:'center', gap:'12px', marginTop:'5px'}}>
                <span style={{color:'#dc2626', fontSize:'14px', lineHeight:1}}>★</span>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'13px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.2em', color:'#1d3a8a'}}>My Personal Ballot</div>
                <span style={{color:'#1d3a8a', fontSize:'14px', lineHeight:1}}>★</span>
              </div>
            </div>
            <div style={{height:'2px', background:'#0f172a', marginTop:'10px', marginBottom:'4px'}} />

          <main id="ballot-content" className="fade-in" style={{padding:'8px 0 0'}}>

            {/* Your Picks — section badge */}
            <div style={{display:'flex', alignItems:'center', gap:'10px', marginTop:'6px', marginBottom:'8px'}}>
              <img src="/icons/illustrations/Candidates.png" alt="" style={{height:'50px', width:'auto', flexShrink:0}} onError={e=>{e.currentTarget.style.display='none';}} />
              <div style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'26px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.05em', color:'#0f172a', lineHeight:1}}>
                Your <span style={{color:'#2563eb'}}>Picks</span>
              </div>
            </div>

            {RACE_SECTIONS.map(sec => {
              const sectionRaces = filterRacesByDistrict(countyData[sec.key] || [], userDistricts);
              const sectionCandidates = sectionRaces.map(race => {
                const { candidate } = getBestCandidate(race);
                return candidate ? { race, candidate } : null;
              }).filter(Boolean);
              if (!sectionCandidates.length) return null;
              return (
                <div key={sec.key} data-sec={sec.key} className="mb-4" style={{}}>

                    <div className="font-black uppercase tracking-widest" style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'15px', color:'#0f172a', letterSpacing:'0.1em'}}>{sec.label}</div>

                  <div className="ballot-picks">
                    {sectionCandidates.map(({ race, candidate }) => {
                      const partyColor = candidate.party === 'D' ? '#2563eb' : candidate.party === 'R' ? '#dc2626' : '#64748b';
                      const partyLabel = candidate.party === 'D' ? 'Democrat' : candidate.party === 'R' ? 'Republican' : candidate.party || 'Independent';
                      return (

                            {candidate.name}
                            <span style={{color:partyColor, fontWeight:900, fontSize:'10px', marginLeft:'6px'}}>· {partyLabel}</span>
                            {candidate.uncontested && <span style={{color:'#94a3b8', fontWeight:700, fontSize:'9px', marginLeft:'5px', textTransform:'uppercase', letterSpacing:'0.04em'}}>· Uncontested</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}

            {/* Key Dates & Times */}
            <div style={{marginTop:'28px', borderTop:'2px solid #0f172a', paddingTop:'18px'}}>
              <div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'12px'}}>
                <img src="/icons/illustrations/Time_to_Vote.png" alt="" style={{height:'48px', width:'auto', flexShrink:0}} onError={e=>{e.currentTarget.style.display='none';}} />
                <div style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'26px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.06em', lineHeight:1, color:'#0f172a'}}>
                  Key <span style={{color:'#2563eb'}}>Dates &amp; Times</span>
                </div>
              </div>
              {/* 4 calendar tiles — big, readable at arm's length */}
              <div className="ballot-date-tiles">
                {[
                  {label:'Register by', value:'Oct 5', sub:'2026', color:'#d97706'},
                  {label:'Early voting', value:'Oct 19–30', sub:'2026', color:'#16a34a'},
                  {label:'Election Day', value:'Nov 4', sub:'2026', color:'#dc2626'},
                  {label:'Poll hours', value:'7 AM – 7 PM', sub:'every voting day', color:'#2563eb'},
                ].map((d, i) => (
                  <div key={i} style={{border:'1.5px solid #e2e8f0', borderTop:`4px solid ${d.color}`, borderRadius:'10px', padding:'10px 8px 9px', textAlign:'center', background:'#f8fafc'}}>
                    <div style={{fontSize:'9.5px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.08em', color:'#64748b'}}>{d.label}</div>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'21px', fontWeight:900, color:'#0f172a', lineHeight:1.05, marginTop:'3px', whiteSpace:'nowrap'}}>{d.value}</div>
                    <div style={{fontSize:'9.5px', fontWeight:700, color:'#94a3b8', marginTop:'2px'}}>{d.sub}</div>
                  </div>
                ))}
              </div>
              {/* Registration helpers — two separate clickable boxes (distinct vote.org URLs, kept clickable in the PDF) */}
              <div className="ballot-locs" style={{marginTop:'10px', display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap:'10px'}}>
                <a href="https://www.vote.org/am-i-registered-to-vote/" target="_blank" rel="noopener noreferrer"
                   style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:'10px', background:'#eff6ff', border:'1px solid #bfdbfe', borderRadius:'10px', padding:'10px 14px', textDecoration:'none'}}>

                   style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:'10px', background:'#f0fdf4', border:'1px solid #bbf7d0', borderRadius:'10px', padding:'10px 14px', textDecoration:'none'}}>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:'12.5px', fontWeight:900, color:'#0f172a', lineHeight:1.2}}>Not registered yet?</div>
                    <div style={{fontSize:'11.5px', color:'#16a34a', fontWeight:900, marginTop:'2px', lineHeight:1.3}}>Register to vote →</div>
                  </div>
                  <span className="voteorg-svg" role="img" aria-label="vote.org" style={{flexShrink:0}} dangerouslySetInnerHTML={{__html: VOTEORG_SVG}} />
                </a>
