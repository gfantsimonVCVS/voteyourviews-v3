            </div>

            {/* Polling locations — after candidates */}
            <div style={{marginTop:'24px', borderTop:'2px solid #0f172a', paddingTop:'18px'}}>
              {/* Header row: title (left) + QR (right) */}
              <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:'16px', marginBottom:'14px'}}>
                <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
                  <img src="/icons/illustrations/Vote_Sign.png" alt="" style={{height:'46px', width:'auto', flexShrink:0}} onError={e=>{e.currentTarget.style.display='none';}} />
                  <div>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'11px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.28em', color:'#94a3b8', marginBottom:'1px'}}>Your Closest</div>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'26px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.06em', lineHeight:1, color:'#0f172a'}}>
                      <span style={{color:'#2563eb'}}>Polling</span> Locations
                    </div>
                  </div>
                </div>
              </div>
              {/* Locations — 2-column grid */}
              <div className="ballot-locs" style={{display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap:'12px'}}>
                {[
                  {name:'Closest Polling Location #1', addr:'Address TBA', when:'both'},
                  {name:'Closest Polling Location #2', addr:'Address TBA', when:'both'},
                  {name:'Closest Polling Location #3', addr:'Address TBA', when:'early'},
                  {name:'Closest Polling Location #4', addr:'Address TBA', when:'early'},
                ].map((loc, i) => (
                  <div key={i} className="ballot-loc-box" style={{display:'flex', alignItems:'center', gap:'12px', background:'#f8fafc', border:'1px solid #e2e8f0', borderRadius:'10px', padding:'12px 16px'}}>
                    <div style={{flexShrink:0, width:'30px', height:'30px', borderRadius:'50%', background:'#2563eb', display:'flex', alignItems:'center', justifyContent:'center'}}>
                      <svg style={{width:'16px', height:'16px', color:'#fff'}} fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/></svg>
                    </div>
                    <div style={{minWidth:0, flex:1}}>
                      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:'8px'}}>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'15px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.04em', color:'#0f172a', lineHeight:1.1}}>{loc.name}</div>
                        <span style={{flexShrink:0, display:'inline-flex', alignItems:'center', justifyContent:'center', height:'18px', fontSize:'9px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.05em', padding:'0 9px', borderRadius:'9px', background: loc.when === 'both' ? '#16a34a' : '#d97706', color:'#fff', whiteSpace:'nowrap', lineHeight:'18px'}}>
                          {loc.when === 'both' ? 'Early + Election Day' : 'Early Voting Only'}
                        </span>
                      </div>
                      <div style={{fontSize:'11.5px', color:'#64748b', marginTop:'3px', lineHeight:1.25}}>{loc.addr}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* What to bring — Texas voter ID checklist (turns the printout into a complete voting kit) */}
            <div data-sec="bring" style={{marginTop:'24px', borderTop:'2px solid #0f172a', paddingTop:'18px'}}>
              <div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'12px'}}>
                <div style={{flexShrink:0, width:'40px', height:'40px', borderRadius:'10px', background:'#eff6ff', border:'1px solid #bfdbfe', display:'flex', alignItems:'center', justifyContent:'center'}}>
                  <svg style={{width:'22px', height:'22px', color:'#2563eb'}} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="11" r="2"/><path d="M5.5 17c.6-1.8 1.7-2.6 3-2.6s2.4.8 3 2.6M14 9.5h5M14 12.5h5M14 15.5h3"/></svg>
                </div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'26px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.06em', lineHeight:1, color:'#0f172a'}}>
                  What to <span style={{color:'#2563eb'}}>Bring</span>
                </div>
              </div>
              <div className="ballot-checklist">
                <div style={{background:'#f8fafc', border:'1px solid #e2e8f0', borderRadius:'10px', padding:'12px 16px'}}>
                  <div style={{fontSize:'11px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.06em', color:'#0f172a', marginBottom:'7px'}}>Any ONE of these photo IDs:</div>
                  {['Texas driver license', 'Texas personal ID card', 'Texas handgun license (LTC)', 'Texas Election ID certificate', 'U.S. passport (book or card)', 'U.S. military ID with photo', 'U.S. citizenship certificate with photo'].map((id, i) => (
                    <div key={i} style={{display:'flex', alignItems:'center', gap:'8px', padding:'2.5px 0'}}>
                      <span style={{flexShrink:0, width:'13px', height:'13px', border:'1.5px solid #94a3b8', borderRadius:'3px'}} />
                      <span style={{fontSize:'11.5px', color:'#334155', lineHeight:1.25}}>{id}</span>
                    </div>
                  ))}
                  <div style={{fontSize:'10px', color:'#64748b', marginTop:'7px', lineHeight:1.35, fontStyle:'italic'}}>Expired up to 4 years is still OK. Age 70+? Any expiration works.</div>
                </div>
                <div style={{background:'#fffbeb', border:'1px solid #fde68a', borderRadius:'10px', padding:'12px 16px'}}>
                  <div style={{fontSize:'11px', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.06em', color:'#0f172a', marginBottom:'7px'}}>Good to know:</div>
                  {[
                    'Bring this printed ballot — it\'s legal to use it in the booth',
                    'Any line at closing time? Stay in it — you can still vote',
                    'No photo ID? Ask for a "Reasonable Impediment Declaration"',
                    'Phones must stay in your pocket inside the polling place',
                  ].map((tip, i) => (
                    <div key={i} style={{display:'flex', alignItems:'flex-start', gap:'8px', padding:'3px 0'}}>
                      <span style={{flexShrink:0, color:'#d97706', fontWeight:900, fontSize:'12px', lineHeight:'1.2'}}>★</span>
                      <span style={{fontSize:'11.5px', color:'#334155', lineHeight:1.3}}>{tip}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>


            {/* Email-my-ballot reminder card — screen only */}
            <div className="no-print mt-8 mb-6 rounded-2xl overflow-hidden relative"
                 style={{background:'linear-gradient(135deg,#1e1b4b 0%,#0f172a 70%)', border:'1.5px solid rgba(251,191,36,0.5)', boxShadow:'0 12px 32px rgba(0,0,0,0.35)'}}>
              <div className="flex items-center gap-4 p-5">
                <img src="/icons/illustrations/Email%20Me%202.png" alt="Email my ballot"
                  className="shrink-0 w-[116px] h-[116px] sm:w-[134px] sm:h-[134px] object-contain"
                  onError={e => { e.currentTarget.style.display='none'; }} />
                <div className="flex-1 min-w-0">
                  <p className="text-[10px] font-black uppercase tracking-[0.2em] mb-1" style={{color:'#f59e0b'}}>Don't lose this!</p>
                  <p className="text-white font-black uppercase leading-tight text-[19px] sm:text-[22px]" style={{fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:'0.03em'}}>
                    We'll email your ballot back to you
                  </p>
                  <p className="text-slate-300 text-xs sm:text-sm leading-snug mt-1">Get it as a reminder <strong className="text-white">one week before early voting starts</strong> — right when you need it.</p>
                </div>
              </div>
              <div className="px-5 pb-5">
                <button onClick={() => setShowEmailTBA(true)}
                  className="w-full flex items-center justify-center gap-2 px-6 py-3.5 rounded-full font-black text-xs uppercase whitespace-nowrap transition-all hover:brightness-110 active:scale-95"
                  style={{letterSpacing:'0.1em', color:'#0f172a', background:'linear-gradient(135deg,#fbbf24,#d97706)', boxShadow:'0 6px 18px rgba(217,119,6,0.45)'}}>
                  <svg className="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.4}>
                    <rect x="3" y="5" width="18" height="14" rx="2"/>
                    <path d="M3 7l9 6 9-6"/>
                  </svg>
                  Email My Ballot →
                </button>
              </div>
            </div>

            {/* Print footer — fixed to bottom of every printed page */}
            <div className="ballot-print-footer" style={{display:'none'}}>
              {counties[county].name} · VoteYourViews.org · A State Over Party Initiative · voteyourviews.org
            </div>
          </main>
          </div>

          {/* Email-my-ballot TBA modal */}
          {showEmailTBA && (
            <div className="no-print fixed inset-0 z-50 flex items-center justify-center px-4" style={{background:'rgba(0,0,0,0.8)'}} onClick={() => setShowEmailTBA(false)}>
              <div className="w-full max-w-sm rounded-2xl p-6 text-center" onClick={e => e.stopPropagation()}
                   style={{background:'linear-gradient(160deg,#1e1b4b,#0f172a)', border:'1.5px solid rgba(251,191,36,0.5)', boxShadow:'0 24px 60px rgba(0,0,0,0.6)'}}>
                <img src="/icons/illustrations/Email%20Me%202.png" alt="" className="mx-auto w-24 h-24 object-contain mb-3" onError={e => { e.currentTarget.style.display='none'; }} />
                <p className="text-[10px] font-black uppercase tracking-[0.2em] mb-1.5" style={{color:'#f59e0b'}}>Coming soon</p>
                <p className="text-white font-black uppercase leading-tight text-[20px] mb-2" style={{fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:'0.03em'}}>Ballot email reminders</p>
                <p className="text-slate-300 text-sm leading-relaxed mb-5">We're building this now! Soon you'll be able to get your ballot emailed to you one week before early voting starts. For now, save the PDF or print your ballot above.</p>
                <button onClick={() => setShowEmailTBA(false)}
                  className="w-full py-3 rounded-full font-black text-xs uppercase tracking-widest transition-all hover:brightness-110 active:scale-[0.98]"
                  style={{letterSpacing:'0.14em', color:'#0f172a', background:'linear-gradient(135deg,#fbbf24,#d97706)'}}>
                  Got it
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // LOADING / ERROR SCREENS
    // ─────────────────────────────────────────────
    function LoadingScreen() {
      return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 fade-in">
          <div className="w-8 h-8 border-2 border-slate-300 border-t-slate-800 rounded-full animate-spin mb-4" />
          <div className="text-sm font-semibold text-slate-600">Loading candidate data…</div>
          <div className="text-xs text-slate-400 mt-1">Fetching from Google Sheets</div>
        </div>
      );
    }

    function ErrorScreen({ message, onRetry }) {
      return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 px-6 fade-in">
          <div className="max-w-md text-center">
            <div className="text-3xl mb-4">⚠️</div>
            <h2 className="text-lg font-bold text-slate-900 mb-2">Couldn't load candidate data</h2>
            <p className="text-sm text-slate-500 mb-2">{message}</p>
            <p className="text-xs text-slate-400 mb-6">
              Make sure your Google Sheets are published to the web (File → Share → Publish to web) and that the Sheet IDs are set correctly in the SHEETS config in the code.
            </p>
            <button
              onClick={onRetry}
              className="px-6 py-3 bg-slate-900 text-white font-bold rounded-xl text-sm hover:bg-slate-700 transition-colors"
            >
              Try Again
            </button>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // CANDIDATE EDIT PAGE — /<slug>/edit submission form
    // Candidate edits their OWN words + hooks + photo; the researched record + the
    // Agree/Disagree lean stay ours (record is read-only, flag-for-correction only).
    // Backend (Netlify Function → pending tab + magic-link auth) comes later; Save
    // assembles the submission payload so the flow is verifiable now.
    // ─────────────────────────────────────────────
    const HOOK1_MAX = 140, HOOK2_MAX = 320, OWNWORDS_MAX = 400;
    function CandidateEditPage({ candidate, race, issues, onBack }) {
      const _ISSUE_KEYS = ['reproductiveRights','immigration','gunPolicy','education','healthcare','climate','electionIntegrity','socialSecurity','affordability'];
      const editIssues = (issues || []).filter(i => _ISSUE_KEYS.includes(i.id));
      // Read the researched stance as Agree / Disagree / No opinion (handles both full-word data and legacy A/C/D).
      const stanceFromPos = (raw, issueId) => {
        if (raw === 'Agree' || raw === 'Disagree') return raw;
        if (raw === 'Unknown' || raw == null || raw === 'D') return 'No opinion';
        const voice = ISSUE_VOICE[issueId];
        if (raw === 'A') return voice === 'RIGHT' ? 'Disagree' : 'Agree';
        if (raw === 'C') return voice === 'RIGHT' ? 'Agree' : 'Disagree';
        return 'No opinion';
      };
      const [hook1, setHook1] = useState(candidate.hook || '');
      const [hook2, setHook2] = useState(candidate.summary || '');
      const [website, setWebsite] = useState(candidate.website || '');
      const [editWebsite, setEditWebsite] = useState(false);
      const [stances, setStances] = useState(() => Object.fromEntries(editIssues.map(i => [i.id, stanceFromPos(candidate.positions?.[i.id], i.id)])));
      const [ownWords, setOwnWords] = useState(() => Object.fromEntries(editIssues.map(i => [i.id, ''])));
      const [flagOpen, setFlagOpen] = useState({});
      const [flags, setFlags] = useState({});
      const [photoPreview, setPhotoPreview] = useState(candidate.photo || null);
      const [photoName, setPhotoName] = useState('');
      const [consent, setConsent] = useState(false);
      const [submitted, setSubmitted] = useState(null);

      const counterStyle = (len, max) => len >= max ? 'text-rose-600' : len >= max * 0.85 ? 'text-amber-600' : 'text-slate-400';
      const STANCE_OPTS = ['Agree', 'Disagree', 'No opinion'];

      function onPhoto(e) {
        const f = e.target.files && e.target.files[0];
        if (!f) return;
        setPhotoName(f.name);
        const reader = new FileReader();
        reader.onload = ev => setPhotoPreview(ev.target.result);
        reader.readAsDataURL(f);
      }

      function submit() {
        // Assemble the pending-submission payload. (Backend wiring is the next phase.)
        const payload = {
          candidate: candidate.name,
          office: race?.office || null,
          party: candidate.party,
          submittedAt: new Date().toISOString(),
          website,
          hook1, hook2,
          photoChanged: !!photoName,
          photoFileName: photoName || null,
          positions: stances,            // candidate's self-reported Agree/Disagree/No opinion
          ownWords,                      // their first-person paragraph per issue
          corrections: Object.fromEntries(Object.entries(flags).filter(([,v]) => v && v.trim())),
          consent,
        };
        console.log('[VYV candidate submission]', payload);
        setSubmitted(payload);
        window.scrollTo(0, 0);
      }

      const partyLabel = candidate.party === 'D' ? 'Democrat' : candidate.party === 'R' ? 'Republican' : 'Candidate';
      const partyBar = candidate.party === 'D' ? '#2563eb' : candidate.party === 'R' ? '#dc2626' : '#475569';
      const profileUrl = (window.location.pathname.replace(/\/edit\/?$/i, '') || '/');

      if (submitted) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center px-6 py-16 text-center fade-in">
            <div className="w-16 h-16 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600 text-3xl mb-5">✓</div>
            <h1 className="text-2xl font-black text-slate-900 mb-2">Thanks, {candidate.name.split(' ')[0]} — submitted for review.</h1>
            <p className="text-slate-600 max-w-md mb-6">Nothing goes live until the VoteYourViews team reviews it. We'll verify your identity and check the details, then your updates appear on your public profile.</p>
            <button onClick={onBack} className="px-6 py-3 rounded-xl bg-slate-900 text-white font-bold hover:bg-slate-800">← Back to profile</button>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50">
          {/* Identity header */}
          <div className="text-white px-5 py-6 lg:px-10" style={{ background: 'linear-gradient(160deg,#0f172a 0%,#020617 100%)', borderBottom: `4px solid ${partyBar}` }}>
            <div className="max-w-3xl mx-auto">
              <div className="flex items-center justify-between gap-3 mb-4">
                <button onClick={onBack} className="text-sm text-slate-300 hover:text-white">← Back to profile</button>
                <a href={profileUrl} target="_blank" rel="noopener" className="text-sm font-bold text-sky-300 hover:text-sky-200">See your live profile ↗</a>
              </div>
              <p className="text-[11px] font-black uppercase tracking-widest text-slate-400 mb-3">Candidate Profile Editor</p>
              <div className="flex items-center gap-4">
                {photoPreview
                  ? <img src={photoPreview} alt="" className="w-16 h-16 rounded-full object-cover border-2 border-white/30" style={{ objectPosition: 'center top' }} />
                  : <div className="w-16 h-16 rounded-full bg-white/10 flex items-center justify-center text-2xl">👤</div>}
                <div>
                  <h1 className="text-2xl font-black leading-tight">{candidate.name}</h1>
                  <p className="text-slate-300 text-sm font-bold uppercase tracking-wide">{partyLabel}{race?.office ? ` · ${race.office}` : ''}</p>
                </div>
              </div>
            </div>
          </div>

          <div className="max-w-3xl mx-auto px-5 py-8 lg:px-10 space-y-8">

            {/* Photo + website — show what we have, keep or replace */}
            <section className="bg-white rounded-2xl border border-slate-200 p-5 lg:p-6 space-y-6">
              {/* Photo */}
              <div>
                <h2 className="text-lg font-black text-slate-900 mb-3">Your photo</h2>
                <div className="flex items-center gap-4">
                  {photoPreview
                    ? <img src={photoPreview} alt="" className="w-20 h-20 rounded-full object-cover border border-slate-200" style={{ objectPosition: 'center top' }} />
                    : <div className="w-20 h-20 rounded-full bg-slate-100 flex items-center justify-center text-3xl">👤</div>}
                  <div className="min-w-0">
                    <p className="text-sm text-slate-500 mb-2">{photoName ? 'New photo selected — submit to use it.' : photoPreview ? "Here's the photo we have. Keep it, or replace it." : 'No photo yet — add one.'}</p>
                    <div className="flex items-center gap-3 flex-wrap">
                      <label className="cursor-pointer px-3.5 py-2 rounded-lg bg-slate-900 text-white text-sm font-bold hover:bg-slate-800">
                        {photoPreview ? 'Replace photo' : 'Upload photo'}
                        <input type="file" accept="image/*" onChange={onPhoto} className="hidden" />
                      </label>
                      {photoName && <button onClick={() => { setPhotoName(''); setPhotoPreview(candidate.photo || null); }} className="text-sm font-bold text-slate-500 hover:text-slate-700">Undo</button>}
                    </div>
                  </div>
                </div>
              </div>
              {/* Website */}
              <div className="border-t border-slate-100 pt-5">
                <h2 className="text-lg font-black text-slate-900 mb-3">Campaign website</h2>
                {!editWebsite ? (
                  <div className="flex items-center gap-4">
                    <div className="min-w-0 flex-1">
                      <p className="text-sm text-slate-700 break-all">{website || <span className="text-slate-400 italic">None on file</span>}</p>
                      <p className="text-xs text-slate-400 mt-1">{website ? "Here's the link we have. Keep it, or replace it." : 'Add your campaign website.'}</p>
                    </div>
                    <button onClick={() => setEditWebsite(true)} className="shrink-0 text-sm font-bold text-sky-600 hover:text-sky-700">{website ? 'Replace' : 'Add'}</button>
                  </div>
                ) : (
                  <div className="flex items-center gap-2">
                    <input type="url" value={website} onChange={e => setWebsite(e.target.value)} placeholder="https://…" className="flex-1 px-3 py-2.5 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
                    <button onClick={() => setEditWebsite(false)} className="shrink-0 text-sm font-bold text-slate-500 hover:text-slate-700">Done</button>
                  </div>
                )}
              </div>
            </section>

            {/* Hooks */}
            <section className="bg-white rounded-2xl border border-slate-200 p-5 lg:p-6">
              <h2 className="text-lg font-black text-slate-900 mb-1">Your headline &amp; bio</h2>
              <p className="text-sm text-slate-500 mb-4">How you introduce yourself. These replace our draft once approved.</p>

              {/* Live preview — shows the candidate exactly where Hook 1 and Hook 2 appear on their profile */}
              <div className="rounded-xl p-4 mb-5" style={{ background: 'linear-gradient(165deg,#2a52c9 0%,#16317c 100%)' }}>
                <div className="text-[11px] uppercase tracking-widest text-white/55 font-black mb-3">Live preview — your profile card</div>
                <div className="flex items-start gap-2.5">
                  <span className="shrink-0 mt-0.5 text-[9px] font-black bg-amber-400 text-amber-950 px-1.5 py-0.5 rounded">HOOK 1</span>
                  <p className="font-black leading-tight text-[15px] text-white">{hook1 || <span className="text-white/40 italic">Your one-line headline…</span>}</p>
                </div>
                <div className="flex items-start gap-2.5 mt-2.5">
                  <span className="shrink-0 mt-0.5 text-[9px] font-black bg-sky-300 text-sky-950 px-1.5 py-0.5 rounded">HOOK 2</span>
                  <p className="leading-snug text-[13px] text-white/80">{hook2 || <span className="text-white/40 italic">Your short bio…</span>}</p>
                </div>
              </div>

              <label className="block text-sm font-bold text-slate-700 mb-1">Hook 1 — one-line headline</label>
              <textarea value={hook1} maxLength={HOOK1_MAX} onChange={e => setHook1(e.target.value)} rows={2}
                className="w-full px-3 py-2.5 rounded-lg border border-slate-300 text-sm leading-snug focus:outline-none focus:ring-2 focus:ring-slate-400 resize-none" />
              <div className={`text-right text-xs font-bold mt-1 ${counterStyle(hook1.length, HOOK1_MAX)}`}>{hook1.length} / {HOOK1_MAX}</div>

              <label className="block text-sm font-bold text-slate-700 mb-1 mt-4">Hook 2 — short bio</label>
              <textarea value={hook2} maxLength={HOOK2_MAX} onChange={e => setHook2(e.target.value)} rows={4}
                className="w-full px-3 py-2.5 rounded-lg border border-slate-300 text-sm leading-snug focus:outline-none focus:ring-2 focus:ring-slate-400 resize-none" />
              <div className={`text-right text-xs font-bold mt-1 ${counterStyle(hook2.length, HOOK2_MAX)}`}>{hook2.length} / {HOOK2_MAX}</div>
            </section>

            {/* Issues */}
            <section>
              <h2 className="text-lg font-black text-slate-900 mb-1">Where you stand</h2>
              <p className="text-sm text-slate-500 mb-4">Confirm your stance, then say it in your own words. The left column is our independent research — read-only. If it's wrong, flag it and we'll review.</p>
              <div className="space-y-4">
                {editIssues.map(issue => {
                  const record = candidate.evidence?.[issue.id] || '';
                  const ow = ownWords[issue.id] || '';
                  return (
                    <div key={issue.id} className="bg-white rounded-2xl border border-slate-200 overflow-hidden">
                      <div className="px-5 py-3 bg-slate-900 text-white flex items-center justify-between gap-2">
                        <span className="font-black uppercase tracking-wide text-sm">{issue.topic}</span>
                      </div>
                      <div className="p-5">
                        {/* Stance selector (the quiz lean) */}
                        <div className="flex flex-wrap gap-2 mb-4">
                          {STANCE_OPTS.map(opt => {
                            const on = stances[issue.id] === opt;
                            const onCls = opt === 'Agree' ? 'bg-emerald-600 text-white border-emerald-600' : opt === 'Disagree' ? 'bg-rose-600 text-white border-rose-600' : 'bg-slate-600 text-white border-slate-600';
                            return (
                              <button key={opt} onClick={() => setStances(s => ({ ...s, [issue.id]: opt }))}
                                className={`px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-wide border transition ${on ? onCls : 'bg-white text-slate-500 border-slate-300 hover:border-slate-400'}`}>
                                {opt}
                              </button>
                            );
                          })}
                        </div>
                        {/* Two columns */}
                        <div className="grid md:grid-cols-2 gap-4">
                          {/* From the record — locked */}
                          <div className="rounded-xl bg-slate-50 border border-slate-200 p-4">
                            <div className="flex items-center gap-1.5 text-[11px] font-black uppercase tracking-wide text-slate-500 mb-2">🔒 From the record <span className="font-normal normal-case text-slate-400">· read-only</span></div>
                            <p className="text-sm text-slate-700 leading-snug">{record || <span className="italic text-slate-400">No research on file yet.</span>}</p>
                            {flagOpen[issue.id] ? (
                              <div className="mt-3">
                                <textarea value={flags[issue.id] || ''} onChange={e => setFlags(f => ({ ...f, [issue.id]: e.target.value }))} rows={2} placeholder="What's inaccurate? We'll review."
                                  className="w-full px-2.5 py-2 rounded-lg border border-amber-300 bg-amber-50 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300 resize-none" />
                              </div>
                            ) : (
                              <button onClick={() => setFlagOpen(o => ({ ...o, [issue.id]: true }))} className="mt-2 text-[11px] font-bold text-amber-700 hover:text-amber-800">⚐ Flag this as inaccurate →</button>
                            )}
                          </div>
                          {/* In your own words — editable */}
                          <div className="rounded-xl bg-white border border-slate-300 p-4">
                            <div className="text-[11px] font-black uppercase tracking-wide text-slate-700 mb-2">In your own words</div>
                            <textarea value={ow} maxLength={OWNWORDS_MAX} onChange={e => setOwnWords(o => ({ ...o, [issue.id]: e.target.value }))} rows={5} placeholder="In your own words…"
                              className="w-full px-2.5 py-2 rounded-lg border border-slate-300 text-sm leading-snug focus:outline-none focus:ring-2 focus:ring-slate-400 resize-none" />
                            <div className={`text-right text-xs font-bold mt-1 ${counterStyle(ow.length, OWNWORDS_MAX)}`}>{ow.length} / {OWNWORDS_MAX}</div>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </section>

            {/* Consent + submit */}
            <section className="bg-white rounded-2xl border border-slate-200 p-5 lg:p-6">
              <label className="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" checked={consent} onChange={e => setConsent(e.target.checked)} className="mt-1 w-4 h-4" />
                <span className="text-sm text-slate-700 leading-snug">I confirm I am this candidate or authorized by their campaign, and I grant VoteYourViews permission to publish the photo and text I've submitted.</span>
              </label>
              <button onClick={submit} disabled={!consent}
                className={`mt-5 w-full py-3.5 rounded-xl font-black text-white transition ${consent ? 'bg-slate-900 hover:bg-slate-800' : 'bg-slate-300 cursor-not-allowed'}`}>
                Submit for review
              </button>
              <p className="text-xs text-slate-400 text-center mt-3">Nothing publishes automatically. Every submission is reviewed first.</p>
            </section>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // APP — main state machine
    // ─────────────────────────────────────────────
    function App() {
      const _params = new URLSearchParams(window.location.search);
      // Clean per-candidate URL slug (voteyourviews.org/JamesTalarico), or null for the app's own pages.
      // Parse the path: a bare slug opens the candidate's profile; a trailing /edit opens the editable submission page for that candidate.
      const _rawPath = decodeURIComponent((window.location.pathname || '').replace(/^\/+|\/+$/g, ''));
      const editMode = /\/edit$/i.test(_rawPath);
      const urlSlug = (() => {
        const p = _rawPath.replace(/\/edit$/i, '');
        return ['', 'index.html', 'statements', 'ballot'].includes(p.toLowerCase()) ? null : p;
      })();
      const [screen, setScreen] = useState(_params.get('testBallot') === '1' ? 'loading' : SHEETS.master ? 'loading' : 'landing');
      // Browser back/forward support: mirror screen changes into history so the
      // browser Back button navigates the app instead of reloading the page.
      useEffect(() => {
        window.history.replaceState({ vyvScreen: screen }, '');
        const onPop = (e) => { const s = e.state && e.state.vyvScreen; if (s) setScreen(s); };
        window.addEventListener('popstate', onPop);
        return () => window.removeEventListener('popstate', onPop);
      }, []);
      useEffect(() => {
        if (screen === 'loading') return;
        if (window.history.state && window.history.state.vyvScreen === screen) return; // popstate restore — don't re-push
        window.history.pushState({ vyvScreen: screen }, '');
      }, [screen]);
      // ?persist=1 in URL uses localStorage (for testing); otherwise sessionStorage (clears on new visit)
      const store = new URLSearchParams(window.location.search).get('persist') === '1' ? localStorage : sessionStorage;
      const [county, setCounty] = useState(() => store.getItem('vyv_county') || 'hays');
      const [answers, setAnswers] = useState(() => {
        try {
          const a = JSON.parse(store.getItem('vyv_answers') || '{}');
          const stmts = JSON.parse(store.getItem('vyv_stmts') || '{}');
          // If all answers are V2 ('S') but no stmts data, clear stale session so quiz reruns fresh
          const allS = Object.keys(a).length > 0 && Object.values(a).every(v => v === 'S' || v === 'D');
          if (allS && Object.keys(stmts).length === 0) {
            store.removeItem('vyv_answers'); store.removeItem('vyv_ranks'); store.removeItem('vyv_stmts');
            return {};
          }
          // Backfill: if stmts has reactions for an issue but answers entry is missing, restore it
          Object.keys(stmts).forEach(id => {
            if (!a[id] && stmts[id] && stmts[id].reactions && Object.keys(stmts[id].reactions).length > 0) {
              a[id] = 'S';
            }
          });
          return a;
        } catch(e) { return {}; }
      });
      const [ranks, setRanks] = useState(() => { try { return JSON.parse(store.getItem('vyv_ranks') || '{}'); } catch(e) { return {}; } });
      const [checkedStatements, setCheckedStatements] = useState(() => { try { return JSON.parse(store.getItem('vyv_stmts') || '{}'); } catch(e) { return {}; } });
      const [selected, setSelected] = useState({});
      const [issues, setIssues] = useState(ISSUES);
      const [counties, setCounties] = useState(COUNTIES);
      const [loadError, setLoadError] = useState(null);
      const [dataSource, setDataSource] = useState(SHEETS.master ? 'loading' : 'demo');
      const [userDistricts, setUserDistricts] = useState(() => {
        if (new URLSearchParams(window.location.search).get('testDistricts') === '1')
          return { congressionalDistrict:'21', stateSenate:'25', stateHouse:'73', commissionerPrecinct:'4', jpPrecinct:'4' };
        try { return JSON.parse(store.getItem('vyv_districts') || 'null'); } catch(e) { return null; }
      });
      // Persist county + looked-up districts so a returning voter isn't re-asked for their address
      React.useEffect(() => { try { store.setItem('vyv_county', county); } catch(e) {} }, [county]);
      React.useEffect(() => { try { userDistricts ? store.setItem('vyv_districts', JSON.stringify(userDistricts)) : store.removeItem('vyv_districts'); } catch(e) {} }, [userDistricts]);
      const [pendingScreen, setPendingScreen] = useState('quiz');

      // Persist answers + ranks + checkedStatements
      React.useEffect(() => { try { store.setItem('vyv_answers', JSON.stringify(answers)); } catch(e) {} }, [answers]);
      React.useEffect(() => { try { store.setItem('vyv_ranks', JSON.stringify(ranks)); } catch(e) {} }, [ranks]);
      React.useEffect(() => { try { store.setItem('vyv_stmts', JSON.stringify(checkedStatements)); } catch(e) {} }, [checkedStatements]);

      // Auto-select best-matched candidate per race whenever answers/ranks/statements change
      React.useEffect(() => {
        if (Object.keys(answers).length === 0) return;
        const allRaces = Object.values(counties).flatMap(c => Object.values(c.races || {}).flat());
        const autoSelected = {};
        allRaces.forEach(race => {
          const [c1, c2] = (race.candidates || []).filter(Boolean);
          if (!c1) return;
          const s1 = calcMatch(c1, answers, checkedStatements, ranks);
          const s2 = c2 ? calcMatch(c2, answers, checkedStatements, ranks) : null;
          if (s1 !== null) {
            autoSelected[race.office] = (s2 !== null && s2 > s1) ? c2.name : c1.name;
          }
        });
        setSelected(prev => ({ ...autoSelected, ...prev }));
      }, [answers, ranks, checkedStatements, counties]);
      const [startIssueId, setStartIssueId] = useState(null);
      // Landing "picker mode": after a quiz submit, show the bare icon grid so the
      // user picks the next issue visually instead of being marched issue-to-issue.
      const [landingPicker, setLandingPicker] = useState(false);
      const [quizReturnScreen, setQuizReturnScreen] = useState(null); // single-issue "rate this" → return here after one answer
      const [quizEntryIssueId, setQuizEntryIssueId] = useState(null);  // the issue the quiz was ENTERED on → BACK past it returns to origin, not the positional-previous issue
      const [reopenProfile, setReopenProfile] = useState(null); // candidate profile to reopen when returning from "rate this"
      const [focusIssueId, setFocusIssueId] = useState(null); // when returning from a single-issue "Do you match?" quiz, the issue card to auto-open + scroll to (the payoff)
      const [editTarget, setEditTarget] = useState(null); // {candidate, race} when on the /<slug>/edit candidate submission page
      const rateIssueReturn = (id, ret, profile) => { setQuizReturnScreen(ret); setReopenProfile(profile || null); setStartIssueId(id || null); setQuizEntryIssueId(id || null); setScreen('quiz'); };
      const [returnToRace, setReturnToRace] = useState(null);   // { office } → go back to RaceDetail after quiz
      const [initialRace, setInitialRace] = useState(null);     // passed to Browse to auto-open a race
      const [browseReturn, setBrowseReturn] = useState('landing'); // screen to return to from Compare/Browse
      const [resultsReturn, setResultsReturn] = useState('landing'); // screen to return to from Pre-Ballot (results)
      const [ballotReturn, setBallotReturn] = useState('landing'); // screen to return to from the printable Ballot's Back
      const [addrModal, setAddrModal] = useState(null); // destination screen after address modal: 'browse' | 'results' | null

      async function loadFromSheets() {
        setScreen('loading');
        setLoadError(null);
        try {
          const [issueRows, stmtRows] = await Promise.all([
            fetchSheet(SHEETS.master, 'issues'),
            fetchSheet(SHEETS.master, 'Statements').catch(() => []),
          ]);
          if (stmtRows.length > 0) {
            const built = {};
            stmtRows.forEach(r => {
              const issue = (r.issue || '').trim();
              const text = (r.text || '').trim();
              if (issue && text) {
                if (!built[issue]) built[issue] = [];
                built[issue].push(text);
              }
            });
            if (Object.keys(built).length > 0) ISSUE_STATEMENTS = built;
          }
          const rawIssues = buildIssues(issueRows);
          const builtIssues = [...GRID_ORDER.map(id => rawIssues.find(i => i.id === id)).filter(Boolean), ...rawIssues.filter(i => !GRID_ORDER.includes(i.id))];
          // load the self-hosted photo manifest (which candidates have local PNGs) before building
          try {
            const mres = await fetch('/images/candidates/manifest.json', { cache: 'no-store' });
            if (mres.ok) PHOTO_MANIFEST = new Set(await mres.json());
          } catch (_) {}

          const builtCounties = {};
          for (const [key, meta] of Object.entries(COUNTY_META)) {
            builtCounties[key] = { ...meta, available: false, statewide: [], local: [] };
            const countySheet = SHEETS.counties[key];
            if (countySheet) {
              try {
                const countyRows = await fetchSheet(countySheet.sheetId, countySheet.tab);
                const countyRaces = buildRaces(countyRows, key);
                Object.assign(builtCounties[key], buildCountyRaces([], countyRaces));
                builtCounties[key].available = countyRaces.length > 0;
              } catch (_) {}
            }
          }

          setIssues(builtIssues);
          setCounties(builtCounties);
          setDataSource('sheets');
          // If arriving via a candidate URL, stay on loading and let the slug effect route to the profile (avoids a landing flash / double-render).
          setScreen(new URLSearchParams(window.location.search).get('testBallot') === '1' ? 'ballot' : (urlSlug ? 'loading' : 'landing'));
        } catch (err) {
          setLoadError(err.message);
          setDataSource('error');
          setScreen('error');
        }
      }

      useEffect(() => {
        if (SHEETS.master) loadFromSheets();
      }, []);

      // Clean per-candidate URL (voteyourviews.org/JamesTalarico): once data is loaded, open that candidate's profile.
      const [slugHandled, setSlugHandled] = useState(false);
      useEffect(() => {
        if (slugHandled) return;
        if (dataSource !== 'sheets') return;   // wait for final data
        setSlugHandled(true);
        if (!urlSlug) return;
        const match = findCandidateBySlug(counties, urlSlug);
        if (match) {
          setCounty(match.countyKey);
          if (editMode) {
            setEditTarget({ candidate: match.candidate, race: match.race });
            setScreen('edit');
          } else {
            setReopenProfile({ candidate: match.candidate, race: match.race });
            setBrowseReturn('landing');
            setScreen('browse');
          }
        } else {
          setScreen('landing');   // unknown slug — fall back to home so we don't hang on loading
        }
      }, [counties, dataSource]);

      function goToAddress(destination) {
        setPendingScreen(destination);
        setScreen('address');
      }

      if (screen === 'loading') return <LoadingScreen />;
      if (screen === 'error')   return <ErrorScreen message={loadError} onRetry={loadFromSheets} />;

      if (screen === 'landing') {
        return (
          <>
          <Landing
            county={county}
            setCounty={setCounty}
            counties={counties}
            dataSource={dataSource}
            issues={issues}
            answers={answers}
            checkedStatements={checkedStatements}
            picker={landingPicker}
            onQuiz={(id) => { const startId = id || (issues[0] && issues[0].id); setStartIssueId(startId); setQuizEntryIssueId(startId); setPendingScreen('landing'); setScreen('quiz'); }}
            onSummary={() => { setResultsReturn('landing'); userDistricts ? setScreen('results') : setAddrModal('results'); }}
            onStartOver={() => { setAnswers({}); setRanks({}); setCheckedStatements({}); setSelected({}); setStartIssueId(null); setLandingPicker(false); store.removeItem('vyv_answers'); store.removeItem('vyv_ranks'); store.removeItem('vyv_stmts'); }}
            onBrowse={() => { setBrowseReturn('landing'); userDistricts ? setScreen('browse') : setAddrModal('browse'); }}
          />
          {addrModal && (
            <AddressModal
              county={county}
              accentColor="#3b82f6"
              accentColorDark="#1d4ed8"
              onCountyDetected={setCounty}
              onClose={() => setAddrModal(null)}
              onContinue={(districts) => { const dest = addrModal; setUserDistricts(districts); setAddrModal(null); setScreen(dest); }}
              onShowAll={() => { const dest = addrModal; setAddrModal(null); setScreen(dest); }}
            />
          )}
          </>
        );
      }

      if (screen === 'address') {
        return (
          <AddressScreen
            county={county}
            onCountyDetected={setCounty}
            onContinue={districts => {
              setUserDistricts(districts);
              if (pendingScreen === 'quiz') { setAnswers({}); setRanks({}); setSelected({}); }
              setScreen(pendingScreen);
            }}
            onSkip={() => {
              setUserDistricts(null);
              if (pendingScreen === 'quiz') { setAnswers({}); setRanks({}); setSelected({}); }
              setScreen(pendingScreen);
            }}
            onBack={() => setScreen(pendingScreen === 'results' ? 'summary' : 'landing')}
          />
        );
      }

      if (screen === 'quiz') {
        const issue = issues.find(i => i.id === startIssueId) || issues[0];
        return (
          <>
          <Quiz
            key={startIssueId}
            issue={issue}
            initialAnswer={answers[issue?.id] || null}
            initialRank={ranks[issue?.id] || (answers[issue?.id] === 'S' ? 5 : null)}
            initialReactions={(checkedStatements[issue?.id] || {}).reactions || null}
            onSave={(answer, rank, stmtData) => {
              if (answer !== null) {
                setAnswers(prev => { const n = { ...prev, [issue.id]: answer }; try { store.setItem('vyv_answers', JSON.stringify(n)); } catch(e) {} return n; });
                setRanks(prev => { const n = { ...prev, [issue.id]: rank }; try { store.setItem('vyv_ranks', JSON.stringify(n)); } catch(e) {} return n; });
                if (stmtData) setCheckedStatements(prev => { const n = { ...prev, [issue.id]: stmtData }; try { store.setItem('vyv_stmts', JSON.stringify(n)); } catch(e) {} return n; });
              }
              if (quizReturnScreen) {
                const ret = quizReturnScreen;
                setQuizReturnScreen(null);
                setStartIssueId(null);
                if (reopenProfile) setFocusIssueId(issue.id); // reopened profile should land on this issue, expanded, showing the match verdict
                setScreen(ret);
              } else if (returnToRace) {
                setInitialRace(returnToRace);
                setReturnToRace(null);
                setStartIssueId(null);
                setScreen('browse');
              } else {
                // Return to the landing grid in picker mode so the user chooses
                // the next issue visually instead of being auto-advanced.
                setStartIssueId(null);
                setLandingPicker(true);
                setScreen('landing');
              }
            }}
            onBack={() => {
              if (quizReturnScreen) { const ret = quizReturnScreen; setQuizReturnScreen(null); setQuizEntryIssueId(null); setStartIssueId(null); setScreen(ret); return; }
              const currentIdx = issues.findIndex(i => i.id === issue.id);
              // Stop at the issue we entered on — BACK past it returns to where we came from,
              // not the positional-previous issue (which the user never visited).
              const atEntry = issue.id === quizEntryIssueId || currentIdx <= 0;
              const prevIssue = atEntry ? null : issues[currentIdx - 1];
              if (prevIssue) {
                setStartIssueId(prevIssue.id);
              } else {
                setStartIssueId(null);
                setQuizEntryIssueId(null);
                if (returnToRace) { setInitialRace(returnToRace); setReturnToRace(null); setScreen('browse'); }
                else if (pendingScreen === 'summary') setScreen('summary');
                else setScreen('landing');
              }
            }}
            onSavePartial={(answer, rnk, stmtData) => {
              setAnswers(prev => {
                const next = { ...prev, [issue.id]: answer };
                try { store.setItem('vyv_answers', JSON.stringify(next)); } catch(e) {}
                return next;
              });
              if (rnk) setRanks(prev => {
                const next = { ...prev, [issue.id]: rnk };
                try { store.setItem('vyv_ranks', JSON.stringify(next)); } catch(e) {}
                return next;
              });
              if (stmtData) setCheckedStatements(prev => {
                const next = { ...prev, [issue.id]: stmtData };
                try { store.setItem('vyv_stmts', JSON.stringify(next)); } catch(e) {}
                return next;
              });
            }}
            onHome={() => { setStartIssueId(null); setLandingPicker(false); setScreen('landing'); }}
            onStartOver={() => { setAnswers({}); setRanks({}); setSelected({}); setStartIssueId(null); setLandingPicker(false); setScreen('landing'); store.removeItem('vyv_answers'); store.removeItem('vyv_ranks'); }}
            answers={answers}
            onSummary={() => { setStartIssueId(null); setResultsReturn('landing'); userDistricts ? setScreen('results') : setAddrModal('results'); }}
          />
          {addrModal && (
            <AddressModal
              county={county}
              accentColor="#3b82f6"
              accentColorDark="#1d4ed8"
              onCountyDetected={setCounty}
              onClose={() => setAddrModal(null)}
              onContinue={(districts) => { const dest = addrModal; setUserDistricts(districts); setAddrModal(null); setScreen(dest); }}
              onShowAll={() => { const dest = addrModal; setAddrModal(null); setScreen(dest); }}
            />
          )}
          </>
        );
      }

      if (screen === 'summary') {
        return (
          <Summary
            issues={issues}
            answers={answers}
            ranks={ranks}
            county={county}
            onMatchAll={() => { setBrowseReturn('summary'); setScreen('browse'); }}
            onCompareMine={(districts) => { setUserDistricts(districts); setBrowseReturn('summary'); setScreen('browse'); }}
            onBallot={(districts) => { if (districts) setUserDistricts(districts); setBallotReturn('summary'); setScreen('ballot'); }}
            onMatchMine={(districts) => { setUserDistricts(districts); setResultsReturn('summary'); setScreen('results'); }}
            onViewConstellation={() => setScreen('constellation')}
            onAnswerMore={(id) => { setStartIssueId(id); setPendingScreen('summary'); setScreen('quiz'); }}
            onHome={() => { setStartIssueId(null); setLandingPicker(false); setScreen('landing'); }}
            onStartOver={() => { setAnswers({}); setRanks({}); setSelected({}); setStartIssueId(null); setLandingPicker(false); setScreen('landing'); store.removeItem('vyv_answers'); store.removeItem('vyv_ranks'); }}
          />
        );
      }

      if (screen === 'constellation') {
        return (
          <ConstellationScreen
            issues={issues}
            answers={answers}
            ranks={ranks}
            onContinue={() => goToAddress('results')}
            onRetake={() => { setAnswers({}); setRanks({}); setSelected({}); setStartIssueId(null); setScreen('landing'); store.removeItem('vyv_answers'); store.removeItem('vyv_ranks'); }}
          />
        );
      }

      if (screen === 'results') {
        return (
          <Results
            county={county}
            counties={counties}
            setCounty={setCounty}
            issues={issues}
            answers={answers}
            ranks={ranks}
            checkedStatements={checkedStatements}
            selected={selected}
            setSelected={setSelected}
            userDistricts={userDistricts}
            setUserDistricts={setUserDistricts}
            onBallot={() => { setBallotReturn('results'); setScreen('ballot'); }}
            onBack={() => setScreen(resultsReturn)}
            onBrowse={() => { setBrowseReturn('results'); setScreen('browse'); }}
            onCompare={(race) => { setBrowseReturn('results'); setInitialRace(race.office); setScreen('browse'); }}
            onAddress={() => setScreen('address')}
            onQuiz={(id, race) => { setStartIssueId(id || null); setQuizEntryIssueId(id || null); if (race) setReturnToRace({ office: race.office }); setScreen('quiz'); }}
            onRateIssue={(id, profile) => rateIssueReturn(id, 'results', profile)}
            initialProfile={reopenProfile}
            clearInitialProfile={() => setReopenProfile(null)}
            focusIssueId={focusIssueId}
            clearFocusIssue={() => setFocusIssueId(null)}
          />
        );
      }

      if (screen === 'edit' && editTarget) {
        return (
          <CandidateEditPage
            candidate={editTarget.candidate}
            race={editTarget.race}
            issues={issues}
            onBack={() => {
              try { window.history.pushState({}, '', '/' + urlSlug); } catch(e) {}
              setReopenProfile({ candidate: editTarget.candidate, race: editTarget.race });
              setBrowseReturn('landing');
              setScreen('browse');
            }}
          />
        );
      }

      if (screen === 'browse') {
        return (
          <Browse
            county={county}
            counties={counties}
            setCounty={setCounty}
            issues={issues}
            answers={answers}
            ranks={ranks}
            checkedStatements={checkedStatements}
            selected={selected}
            setSelected={setSelected}
            userDistricts={userDistricts}
            setUserDistricts={setUserDistricts}
            onBallot={() => { setBallotReturn('browse'); setScreen('ballot'); }}
            onHome={() => setScreen('landing')}
            onBack={() => setScreen(browseReturn)}
            backLabel={browseReturn === 'landing' ? '← Home' : '← Back'}
            onQuiz={(id, race) => {
              setStartIssueId(id || null);
              setQuizEntryIssueId(id || null);
              if (race) setReturnToRace({ office: race.office });
              setScreen('quiz');
            }}
            onRateIssue={(id, profile) => rateIssueReturn(id, 'browse', profile)}
            initialRace={initialRace}
            clearInitialRace={() => setInitialRace(null)}
            initialProfile={reopenProfile}
            clearInitialProfile={() => setReopenProfile(null)}
            focusIssueId={focusIssueId}
            clearFocusIssue={() => setFocusIssueId(null)}
          />
        );
      }

      if (screen === 'ballot') {
        return (
          <Ballot
            county={county}
            counties={counties}
            selected={selected}
            answers={answers}
            ranks={ranks}
            checkedStatements={checkedStatements}
            issues={issues}
            userDistricts={userDistricts}
            onBack={() => setScreen(ballotReturn)}
            onHome={() => setScreen('landing')}
            onEdit={() => setScreen(Object.keys(answers).length > 0 ? 'results' : 'browse')}
          />
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
