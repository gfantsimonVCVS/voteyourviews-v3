                    <div className="w-2 h-2 rounded-full" style={{ backgroundColor: c }} />
                    <span className="text-slate-400 text-[10px]">{label}</span>
                  </div>
                )
              ))}
            </div>

            {/* Lean summary */}
            <div className="text-center pb-5 px-6">
              <p className="text-[10px] text-slate-400 uppercase tracking-widest">Overall Lean</p>
              <p className="font-black text-sm mt-0.5" style={{ color: leanColor }}>{leanLabel}</p>
              <p className="text-[10px] text-slate-500 mt-3">Find your constellation · VoteYourViews.org</p>
            </div>
          </div>

          {/* CTAs */}
          <button
            onClick={onContinue}
            className="mt-7 w-full max-w-sm py-4 bg-white text-slate-900 font-black rounded-xl hover:bg-slate-100 transition-colors text-base tracking-tight"
          >
            Match My Candidates →
          </button>

          <button
            onClick={() => alert('Sharing coming soon! Your constellation card will be shareable as an image and link.')}
            className="mt-3 w-full max-w-sm py-3.5 border border-slate-600 text-slate-300 font-semibold rounded-xl hover:border-slate-400 hover:text-white transition-colors text-sm flex items-center justify-center gap-2"
          >
            <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
            Share My Constellation
          </button>

          <button
            onClick={onRetake}
            className="mt-3 text-slate-600 text-sm hover:text-slate-400 transition-colors"
          >
            ← Retake the Quiz
          </button>
        </div>
      );
    }

    // ─── HEADER: shared category tabs + county switcher ───
    // Monochrome glyphs (recolor with tab state) — distinct + visible at small size.
    const CATEGORY_ICON = {
      federal: (cls) => (
        <svg className={cls} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
          <path d="M12 3a3.5 3.5 0 013.5 3.5h-7A3.5 3.5 0 0112 3z"/>
          <path d="M6 10.5h12l-2.5-4h-7l-2.5 4z"/>
          <path d="M7 10.5v8m3.5-8v8m3.5-8v8m3-8v8"/>
          <path d="M4.5 21h15"/>
        </svg>
      ),
      state: (cls) => ( // Lone Star
        <svg className={cls} viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <path d="M12 2l2.7 6.1 6.6.6-5 4.4 1.5 6.5L12 16.7 6.2 20.1l1.5-6.5-5-4.4 6.6-.6L12 2z"/>
        </svg>
      ),
      county: (cls) => ( // civic building
        <svg className={cls} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
          <path d="M4 21V8l8-4 8 4v13"/>
          <path d="M3.5 21h17"/>
          <path d="M9.5 21v-4.5h5V21"/>
          <path d="M8 10.5h.01M16 10.5h.01M8 13.5h.01M16 13.5h.01"/>
        </svg>
      ),
      judicial: (cls) => ( // scales of justice
        <svg className={cls} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
          <path d="M12 4v16"/><path d="M7.5 20h9"/><path d="M5 7.5h14"/>
          <path d="M5 7.5l-2.3 4.8a2.7 2.7 0 005.6 0L6 7.5"/>
          <path d="M19 7.5l-2.3 4.8a2.7 2.7 0 005.6 0L20 7.5"/>
          <circle cx="12" cy="5" r="1.4" fill="currentColor" stroke="none"/>
        </svg>
      ),
    };

    // Segmented control — contained group, filled active segment, high-contrast tappable inactives.
    function CategoryTabs({ tabs, activeTab, setActiveTab, size = 'desktop' }) {
      const isMobile = size === 'mobile';
      return (
        <div className={`${isMobile ? 'flex w-full' : 'inline-flex'} gap-1 p-1 rounded-xl`}
          style={{ background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.10)' }}>
          {tabs.map(tab => {
            const isActive = tab.key === activeTab;
            return (
              <button key={tab.key} onClick={() => setActiveTab(tab.key)}
                className={`flex items-center justify-center rounded-lg font-black uppercase transition-all duration-150 min-w-0 ${isMobile ? 'flex-1 gap-1 py-2 px-0.5 text-[10px] tracking-tight' : 'gap-1.5 px-5 py-2 text-sm tracking-widest'}`}
                style={isActive
                  ? { background: '#fff', color: '#0f172a', boxShadow: '0 2px 10px rgba(0,0,0,0.30)' }
                  : { background: 'transparent', color: '#cbd5e1' }}>
                {!isMobile && CATEGORY_ICON[tab.key] && CATEGORY_ICON[tab.key]('w-4 h-4 shrink-0')}
                <span className="truncate">{tab.label}</span>
                {tab.count > 0 && <span className="shrink-0" style={{ color: isActive ? '#059669' : '#34d399', fontSize: isMobile ? '9px' : undefined }}>·{tab.count}</span>}
              </button>
            );
          })}
        </div>
      );
    }

    // County switcher — replaces the static "{County} Beta V2" label. Switching clears
    // any address-narrowed districts (they belong to the prior county) and shows the new
    // county's full slate — also lets "Keep Exploring" users flip counties freely.
    // The prominent "{County} Candidates" banner IS the county switcher (replaces the old corner pulldown).
    // Works in both explore mode and address ("Showing your candidates") mode. Dropdown drops below the banner.
    function CountyBanner({ county, counties, setCounty, userDistricts, setUserDistricts, onMyCandidates, compact = false }) {
      const [open, setOpen] = useState(false);
      const ref = useRef(null);
      useEffect(() => {
        if (!open) return;
        const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', h);
        return () => document.removeEventListener('mousedown', h);
      }, [open]);

      const entries = Object.keys(counties).map(key => {
        const c = counties[key] || {};
        const hasRaces = ['federal', 'state', 'county', 'judicial'].some(s => (c[s] || []).length > 0);
        return { key, name: c.name || key, hasRaces };
      }).sort((a, b) => (b.hasRaces - a.hasRaces) || a.name.localeCompare(b.name));

      function pick(key) {
        if (key !== county) { setCounty(key); if (setUserDistricts) setUserDistricts(null); }
        setOpen(false);
      }

      const name = (counties[county] && counties[county].name) || 'County';
      const chevron = <svg className={`w-4 h-4 shrink-0 transition-transform duration-200 ${open ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" strokeWidth={2.6} viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/></svg>;

      if (compact) {
        // Quiet one-line context chip: "📍 Hays County · Change" — same dropdown below
        return (
          <div ref={ref} className="relative inline-block">
            <button onClick={() => setOpen(o => !o)} title={userDistricts ? 'Showing your ballot — tap to change' : 'Tap to change county'}
              className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-bold transition-all hover:bg-white/10 whitespace-nowrap"
              style={{color:'#94a3b8', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.12)'}}>
              <svg className="w-3.5 h-3.5 shrink-0" style={{color: userDistricts ? '#4ade80' : '#60a5fa'}} fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/></svg>
              <span className="text-white">{name}</span>
              {chevron}
            </button>
            {open && (
              <div className="absolute left-0 mt-2 z-50 w-64 rounded-xl overflow-hidden"
                style={{ background: '#0f172a', border: '1px solid rgba(255,255,255,0.14)', boxShadow: '0 12px 30px rgba(0,0,0,0.5)' }}>
                {onMyCandidates && (
                  <button onClick={() => { onMyCandidates(); setOpen(false); }}
                    className="w-full flex items-center gap-3 px-4 py-3 text-left transition-all hover:brightness-110"
                    style={{ color: '#fff', background: 'linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%)', borderBottom: '1px solid rgba(255,255,255,0.12)' }}>
                    <div className="min-w-0 flex-1">
                      <div className="text-sm font-black leading-tight">Enter your address</div>
                      <div className="text-[11px] font-medium leading-tight mt-0.5" style={{ color: 'rgba(255,255,255,0.8)' }}>See only the candidates you can vote for</div>
                    </div>
                  </button>
                )}
                {userDistricts && (
                  <button onClick={() => { setUserDistricts(null); setOpen(false); }}
                    className="w-full px-4 py-2.5 text-left text-xs font-black uppercase tracking-widest transition-colors hover:bg-white/5"
                    style={{ color: '#f87171' }}>
                    ✕ Clear my address filter
                  </button>
                )}
                <div className="px-4 pt-3 pb-1 text-[9px] font-bold uppercase tracking-wider" style={{ color: '#64748b' }}>Or browse a county</div>
                {entries.map(e => e.hasRaces ? (
                  <button key={e.key} onClick={() => pick(e.key)}
                    className="w-full flex items-center justify-between gap-3 px-4 py-2.5 text-xs font-black uppercase tracking-widest transition-colors text-left hover:bg-white/5"
                    style={{ color: e.key === county ? '#fff' : '#cbd5e1' }}>
                    <span>{e.name}</span>
                    {e.key === county && <svg className="w-4 h-4 shrink-0" style={{ color: '#4ade80' }} fill="none" stroke="currentColor" strokeWidth={3} viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>}
                  </button>
                ) : (
                  <div key={e.key} className="flex items-center justify-between gap-3 px-4 py-2.5 text-xs font-black uppercase tracking-widest"
                    style={{ color: '#475569' }}>
                    <span>{e.name}</span>
                    <span className="text-[9px] font-bold tracking-wider" style={{ color: '#64748b' }}>Soon</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      return (
        <div ref={ref} className="relative flex-1">
          {userDistricts ? (
            <div onClick={() => setOpen(o => !o)}
              className="h-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all duration-200 cursor-pointer hover:-translate-y-0.5"
              style={{background:'linear-gradient(135deg, rgba(22,163,74,0.30), rgba(20,83,45,0.18))', backdropFilter:'blur(12px)', WebkitBackdropFilter:'blur(12px)', border:'1px solid rgba(134,239,172,0.35)', boxShadow:'0 8px 22px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.18)', color:'#fff'}}>
              <svg className="w-5 h-5 shrink-0" style={{color:'#4ade80'}} fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/></svg>
              <div className="min-w-0">
                <div className="text-[10px] font-bold uppercase tracking-widest" style={{color:'rgba(255,255,255,0.7)'}}>Showing your candidates</div>
                <div className="text-sm font-black uppercase tracking-wide truncate">{name}</div>
              </div>
              {chevron}
              <button onClick={(e) => { e.stopPropagation(); setUserDistricts(null); }} className="ml-auto text-[10px] font-black uppercase tracking-wider px-2.5 py-1 rounded-full shrink-0" style={{background:'rgba(255,255,255,0.18)', color:'#fff'}}>✕ Clear</button>
            </div>
          ) : (
            <button onClick={() => setOpen(o => !o)}
              className="w-full h-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all duration-200 hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.99] text-left"
              style={{background:'linear-gradient(135deg, rgba(37,99,235,0.22), rgba(30,58,138,0.12))', backdropFilter:'blur(12px)', WebkitBackdropFilter:'blur(12px)', border:'1px solid rgba(147,197,253,0.28)', boxShadow:'0 8px 22px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.18)', color:'#fff'}}>
              <svg className="w-5 h-5 shrink-0" style={{color:'#60a5fa'}} fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/></svg>
              <div className="text-sm font-black uppercase tracking-wide truncate">{name} Candidates</div>
              <span className="ml-auto">{chevron}</span>
            </button>
          )}
          {open && (
            <div className="absolute left-0 mt-2 z-50 w-full min-w-[240px] rounded-xl overflow-hidden"
              style={{ background: '#0f172a', border: '1px solid rgba(255,255,255,0.14)', boxShadow: '0 12px 30px rgba(0,0,0,0.5)' }}>
              {onMyCandidates && (
                <button onClick={() => { onMyCandidates(); setOpen(false); }}
                  className="w-full flex items-center gap-3 px-4 py-3.5 text-left transition-all hover:brightness-110"
                  style={{ color: '#fff', background: 'linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%)', borderBottom: '1px solid rgba(255,255,255,0.12)' }}>
                  <svg className="w-5 h-5 shrink-0" style={{ color: '#fff' }} fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/></svg>
                  <div className="min-w-0 flex-1">
                    <div className="text-sm font-black leading-tight">Enter your address</div>
                    <div className="text-[11px] font-medium leading-tight mt-0.5" style={{ color: 'rgba(255,255,255,0.8)' }}>See only the candidates you can vote for</div>
                  </div>
                  <svg className="w-4 h-4 shrink-0" style={{ color: 'rgba(255,255,255,0.9)' }} fill="none" stroke="currentColor" strokeWidth={2.5} viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7"/></svg>
                </button>
              )}
              <div className="px-4 pt-3 pb-1 text-[9px] font-bold uppercase tracking-wider" style={{ color: '#64748b' }}>Or browse a county</div>
              {entries.map(e => e.hasRaces ? (
                <button key={e.key} onClick={() => pick(e.key)}
                  className="w-full flex items-center justify-between gap-3 px-4 py-2.5 text-xs font-black uppercase tracking-widest transition-colors text-left hover:bg-white/5"
                  style={{ color: e.key === county ? '#fff' : '#cbd5e1' }}>
                  <span>{e.name}</span>
                  {e.key === county && <svg className="w-4 h-4 shrink-0" style={{ color: '#4ade80' }} fill="none" stroke="currentColor" strokeWidth={3} viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>}
                </button>
              ) : (
                <div key={e.key} className="flex items-center justify-between gap-3 px-4 py-2.5 text-xs font-black uppercase tracking-widest"
                  style={{ color: '#475569' }}>
                  <span>{e.name}</span>
                  <span className="text-[9px] font-bold tracking-wider" style={{ color: '#64748b' }}>Soon</span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // Small "Beta V2" pill — moved out of the county label so the corner is a clean switcher.
    function BetaChip() {
      return (
        <span className="text-[9px] font-black uppercase tracking-wider px-1.5 py-0.5 rounded shrink-0"
          style={{ background: 'rgba(217,119,6,0.16)', color: '#f59e0b', border: '1px solid rgba(217,119,6,0.35)' }}>
          Beta V2
        </span>
      );
    }

    // ─── RESULTS ───
    const RACE_SECTIONS = [
      { key: 'federal',  label: 'Federal Races' },
      { key: 'state',    label: 'Statewide Races' },
      { key: 'county',   label: 'County Races' },
      { key: 'judicial', label: 'Judicial Races' },
    ];

    function filterRacesByDistrict(races, userDistricts) {
      if (!userDistricts) return races;
      return races.filter(race => {
        if (!race.districtType) return true;
        const num = String(race.districtNumber);
        if (race.districtType === 'congressional') return !userDistricts.congressionalDistrict || userDistricts.congressionalDistrict === num;
        if (race.districtType === 'stateSenate') return !userDistricts.stateSenate || userDistricts.stateSenate === num;
        if (race.districtType === 'stateHouse') return !userDistricts.stateHouse || userDistricts.stateHouse === num;
        if (race.districtType === 'jpPrecinct') return !userDistricts.jpPrecinct || userDistricts.jpPrecinct === num;
        if (race.districtType === 'commissioner') return !userDistricts.commissionerPrecinct || userDistricts.commissionerPrecinct === num;
        if (race.districtType === 'constable') return !userDistricts.jpPrecinct || userDistricts.jpPrecinct === num; // Travis: constable precincts share JP boundaries
        return true;
      });
    }



    function Results({ county, counties, setCounty, issues, answers, ranks, checkedStatements, selected, setSelected, userDistricts, setUserDistricts, onBallot, onBack, onBrowse, onCompare, onAddress, onQuiz, onRateIssue, initialProfile, clearInitialProfile, focusIssueId, clearFocusIssue }) {
      const countyData = counties[county];
      const [profileData, setProfileData] = React.useState(null); // { candidate, race }
      // Reopen the candidate profile after returning from a single-issue "rate this" quiz.
      React.useEffect(() => {
        if (initialProfile) { setProfileData(initialProfile); clearInitialProfile?.(); }
      }, [initialProfile]);
      const [compareRace, setCompareRace] = React.useState(null); // race object for RaceDetail overlay
      const [showFilterModal, setShowFilterModal] = React.useState(false);
      const [activeTab, setActiveTab] = React.useState('federal');
      const [showAddr, setShowAddr] = React.useState(false);

      const answeredCount = Object.keys(answers).filter(id => answers[id] !== 'D').length;

      // Color the Save/Print CTA by the voter's own overall lean (same scheme as the
      // constellation + landing checkmarks): blue = progressive, red = conservative,
      // purple = mixed. Neutral slate when nothing is answered — never assume a side.
      const leanCounts = { A: 0, B: 0, C: 0 };
      issues.forEach(i => { const p = deriveVoterPos(i.id, answers, checkedStatements); if (leanCounts[p] !== undefined) leanCounts[p]++; });
      const ctaColors = leanCounts.A === 0 && leanCounts.B === 0 && leanCounts.C === 0
        ? { grad: 'linear-gradient(90deg,#334155,#475569)', border: '#94a3b8', glow: 'rgba(100,116,139,0.45)' }
        : leanCounts.A > leanCounts.C
          ? { grad: 'linear-gradient(90deg,#1d4ed8,#2563eb)', border: '#60a5fa', glow: 'rgba(37,99,235,0.45)' }
          : leanCounts.C > leanCounts.A
            ? { grad: 'linear-gradient(90deg,#b91c1c,#dc2626)', border: '#f87171', glow: 'rgba(220,38,38,0.45)' }
            : { grad: 'linear-gradient(90deg,#7e22ce,#9333ea)', border: '#c084fc', glow: 'rgba(147,51,234,0.45)' };

      const TABS = [
        { key: 'federal',  label: 'Federal' },
        { key: 'state',    label: 'State' },
        { key: 'county',   label: 'County' },
        { key: 'judicial', label: 'Judicial' },
      ].map(t => ({ ...t, count: filterRacesByDistrict(countyData[t.key] || [], userDistricts).length }));

      return (
        <React.Fragment>
        <div className="min-h-screen flex flex-col" style={{background:'linear-gradient(160deg,#1e1b4b 0%,#0f172a 60%,#0c1a2e 100%)'}}>

          {/* Header — matches Compare Page */}
          <header className="sticky top-0 z-50" style={{background:'#0f172a', borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
            {/* Mobile */}
            <div className="lg:hidden px-4 py-3">
              <div className="flex items-center justify-between gap-2">
                <button onClick={onBack} className="text-sm font-medium flex items-center gap-1 shrink-0" style={{color:'#94a3b8'}}>← Back</button>
                <CountyBanner compact county={county} counties={counties} setCounty={setCounty} userDistricts={userDistricts} setUserDistricts={setUserDistricts} onMyCandidates={() => setShowAddr(true)} />
                <BetaChip />
              </div>
              <div className="mt-3">
                <CategoryTabs tabs={TABS} activeTab={activeTab} setActiveTab={setActiveTab} size="mobile" />
              </div>
            </div>
            {/* Desktop */}
            <div className="hidden lg:flex items-center h-16 px-8 relative">
              <div className="absolute left-8 flex items-center gap-2.5">
                <button onClick={onBack} className="text-sm font-semibold flex items-center gap-1.5 transition-colors" style={{color:'#94a3b8'}}>← Back</button>
                <BetaChip />
              </div>
              <div className="mx-auto">
                <CategoryTabs tabs={TABS} activeTab={activeTab} setActiveTab={setActiveTab} size="desktop" />
              </div>
              <div className="absolute right-8">
                <CountyBanner compact county={county} counties={counties} setCounty={setCounty} userDistricts={userDistricts} setUserDistricts={setUserDistricts} onMyCandidates={() => setShowAddr(true)} />
              </div>
            </div>
          </header>
          {showAddr && (
            <AddressModal county={county} accentColor="#3b82f6" accentColorDark="#1d4ed8"
              onCountyDetected={setCounty}
              onClose={() => setShowAddr(false)}
              onContinue={(districts) => { setUserDistricts(districts); setShowAddr(false); }}
              onShowAll={() => setShowAddr(false)} />
          )}


          {showFilterModal && (
            <AddressModal
              county={county || 'hays'}
              accentColor="#2563eb"
              onClose={() => setShowFilterModal(false)}
              onContinue={(districts) => { if (setUserDistricts) setUserDistricts(districts); setShowFilterModal(false); }}
              onShowAll={() => { if (setUserDistricts) setUserDistricts(null); setShowFilterModal(false); }}
            />
          )}

          {/* Section header — solid banner naming the active section */}
          <div style={{background:'rgba(255,255,255,0.06)', borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
            <div className="max-w-5xl mx-auto w-full px-4 py-2.5 flex items-center gap-2">
              <p className="text-white font-black uppercase tracking-wide text-[17px] leading-none" style={{fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:'0.06em'}}>
                Your {TABS.find(t => t.key === activeTab)?.label} Candidates
              </p>
              <span className="text-[11px] font-bold" style={{color:'#34d399'}}>
                {TABS.find(t => t.key === activeTab)?.count || 0} races
              </span>
            </div>
          </div>

          <div className="flex-1 max-w-5xl mx-auto w-full px-4 py-4">

            {(() => {
              const sectionRaces = filterRacesByDistrict(countyData[activeTab] || [], userDistricts);
              return sectionRaces.map(race => {
                const onOpen = race => {
                    const cands = race.candidates.filter(Boolean);
                    const scores = cands.map(c => ({ c, s: calcMatch(c, answers, checkedStatements, ranks) }));
                    const best = scores.reduce((a, b) => (b.s !== null && (a.s === null || b.s > a.s)) ? b : a, scores[0]);
                    const match = best ? best.s : null;
                    const cand = best ? best.c : null;
                    if (!cand) return null;
                    const isOverridden = selected[race.office] && selected[race.office] !== cand.name;
                    const displayCand = isOverridden ? cands.find(c => c.name === selected[race.office]) : cand;
                    const displayScore = displayCand ? calcMatch(displayCand, answers, checkedStatements, ranks) : match;
                    const partyColor = displayCand?.party === 'R' ? '#ef4444' : displayCand?.party === 'D' ? '#3b82f6' : '#a855f7';
                    const ISSUE_KEYS = ['reproductiveRights','immigration','gunPolicy','education','healthcare','climate','electionIntegrity','socialSecurity','affordability'];
                    const isJudicialRace = race.category === 'judicial' || (displayCand && !ISSUE_KEYS.some(k => displayCand.positions?.[k] && displayCand.positions[k] !== 'D'));

                    const isOnBallot = selected[race.office] === displayCand?.name || (!selected[race.office] && !isOverridden && !!cand);
                    const scoreColor = displayScore >= 70 ? '#22c55e' : displayScore >= 40 ? '#f59e0b' : '#ef4444';

                    return (
                      <div key={race.office} className="rounded-2xl overflow-hidden" style={{background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.1)'}}>

                        {/* ── MOBILE layout (phones only, <768px) ── */}
                        <div className="md:hidden p-3 flex items-center gap-3">
                          {/* Photo (circle) + match badge */}
                          <div className="relative shrink-0" style={{paddingBottom:'4px'}}>
                            <div className="relative w-[72px] h-[72px] rounded-full overflow-hidden" style={{border:`2.5px solid ${partyColor}`, background: partyColor + '33'}}>
                              {displayCand?.photo &&
                                <img src={displayCand.photo} alt={displayCand.name} className="absolute inset-0 w-full h-full object-cover" style={{objectPosition:'center 5%', zIndex:1}} onError={e => { e.target.style.display='none'; const s=e.target.nextElementSibling; if(s) s.style.display='flex'; }} />
                              }
                              <div className="absolute inset-0 flex items-center justify-center" style={{background:'#e2e8f0', display: displayCand?.photo ? 'none' : 'flex'}}>
                                <img src="/icons/candidate-undefined.png" alt="No photo" className="w-full h-full object-contain object-bottom" style={{opacity:0.5}} />
                              </div>
                            </div>
                            {!isJudicialRace && displayScore !== null && (
                              <div className="absolute left-1/2 -translate-x-1/2 px-2 py-0.5 rounded-full text-[11px] font-black whitespace-nowrap"
                                style={{bottom:'-2px', background:'#0f172a', border:`2px solid ${scoreColor}`, color: scoreColor, zIndex:2}}>
                                {displayScore}%
                              </div>
                            )}
                          </div>
                          {/* Office + name + party */}
                          <button onClick={() => setProfileData({ candidate: displayCand, race, isBest: !isOverridden })}
                            className="flex-1 min-w-0 text-left transition-all active:scale-[0.99]">
                            <p className="text-[10px] font-black uppercase tracking-widest mb-1 leading-tight" style={{color:'rgba(255,255,255,0.4)'}}>
                              {formatOfficeLines(race.office).map((line, i) => <span key={i} className="block">{line}</span>)}
                            </p>
                            <p className="text-white font-black text-lg leading-tight mb-1.5">{displayCand?.name}</p>
                            <span className="inline-block text-[10px] font-black uppercase tracking-wide px-2.5 py-0.5 rounded-full"
                              style={{background: partyColor + '28', color: partyColor, border: `1px solid ${partyColor}55`}}>
                              {displayCand?.party === 'D' ? 'Democrat' : displayCand?.party === 'R' ? 'Republican' : 'Independent'}
                            </span>
                          </button>
                          {/* Get the Facts — compact, to the right */}
                          <button onClick={() => setProfileData({ candidate: displayCand, race, isBest: !isOverridden })}
                            className="shrink-0 flex flex-col items-center justify-center gap-1 px-2 py-3 rounded-xl transition-all active:scale-[0.96]"
                            style={{width:'76px', background:'rgba(217,119,6,0.16)', color:'#f59e0b', border:'1px solid rgba(217,119,6,0.5)'}}>
                            <svg viewBox="0 0 24 24" fill="currentColor" style={{width:'18px',height:'18px'}}><path d="M12 12a4 4 0 100-8 4 4 0 000 8zm0 2c-4.4 0-8 2.7-8 6v1h16v-1c0-3.3-3.6-6-8-6z"/></svg>
                            <span className="text-[9px] font-black uppercase leading-tight text-center" style={{letterSpacing:'0.06em'}}>About<br/>{displayCand?.name?.split(' ')[0]}</span>
                          </button>
                        </div>

                        {/* ── DESKTOP/TABLET layout: 3 columns, col 3 double-wide (≥768px) ── */}
                        <div className="hidden md:grid" style={{gridTemplateColumns:'1fr 1.6fr 2fr', minHeight:'160px'}}>

                          {/* Col 1: Race name + selected indicator */}
                          <div className="flex flex-col items-center justify-center gap-2 px-6 py-6 border-r border-white/10 text-center">
                            {isOnBallot && <span style={{color:'#22c55e', fontSize:'16px'}}>✓</span>}
                            <p className="font-black uppercase leading-tight" style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'22px', letterSpacing:'0.04em', color:'#fff'}}>
                              {formatOfficeLines(race.office).map((line, i) => <span key={i} className="block">{line}</span>)}
                            </p>
                          </div>

                          {/* Col 2: Race description + matched candidate name */}
                          <div className="flex flex-col justify-center px-6 py-6 border-r border-white/10">
                            {race.description && <p className="text-[13px] leading-relaxed mb-3" style={{color:'rgba(255,255,255,0.7)'}}>{race.description}</p>}
                            {displayCand && (
                              <p className="text-[12px] font-black uppercase tracking-widest" style={{color:'#22c55e'}}>✓ {displayCand.name}</p>
                            )}
                          </div>

                          {/* Col 3 (double-wide): Photo + name + match + hook + actions */}
                          <div className="flex items-center gap-6 px-8 py-6" style={{background:'rgba(255,255,255,0.03)'}}>
                            {/* Photo + match % */}
                            <button onClick={() => setProfileData({ candidate: displayCand, race, isBest: !isOverridden })}
                              className="flex flex-col items-center gap-2 shrink-0 hover:opacity-80 transition-all">
                              <div className="relative">
                                <div className="w-24 h-24 rounded-full overflow-hidden flex" style={{border:`3px solid ${partyColor}`, background: partyColor + '33'}}>
                                  {displayCand?.photo &&
                                    <img src={displayCand.photo} alt={displayCand.name} className="w-full h-full object-cover" style={{objectPosition:'center 5%'}} onError={e => { e.target.style.display='none'; const s=e.target.nextElementSibling; if(s) s.style.display='flex'; }} />
                                  }
                                  <div className="w-full h-full items-center justify-center" style={{background:'#e2e8f0', display: displayCand?.photo ? 'none' : 'flex'}}>
                                    <img src="/icons/candidate-undefined.png" alt="No photo" className="w-full h-full object-contain object-bottom" style={{opacity:0.5}} />
                                  </div>
                                </div>
                                {!isJudicialRace && displayScore !== null && (
                                  <div className="absolute -bottom-2 left-1/2 -translate-x-1/2 px-2 py-0.5 rounded-full text-[11px] font-black whitespace-nowrap" style={{background:'#0f172a', border:`2px solid ${scoreColor}`, color: scoreColor}}>
                                    {displayScore}%
                                  </div>
                                )}
                              </div>
                              <span className="mt-2 text-[10px] font-black uppercase tracking-wide px-2 py-0.5 rounded-full"
                                style={{background: partyColor + '28', color: partyColor, border:`1px solid ${partyColor}55`}}>
                                {displayCand?.party === 'D' ? 'Democrat' : displayCand?.party === 'R' ? 'Republican' : 'Independent'}
                              </span>
                            </button>

                            {/* Hook + actions */}
                            <div className="flex flex-col gap-3 flex-1">
                              <p className="text-[13px] font-black uppercase tracking-widest" style={{color:'rgba(255,255,255,0.75)'}}>{displayCand?.name}</p>
                              {displayCand?.hook && (
                                <p className="font-black leading-snug" style={{fontFamily:"'Barlow Condensed',sans-serif", fontSize:'15px', color:'rgba(255,255,255,0.9)', letterSpacing:'0.02em'}}>
                                  {displayCand.hook}
                                </p>
                              )}
                              <div className="flex gap-2 flex-wrap mt-1">
                                <button onClick={() => setProfileData({ candidate: displayCand, race, isBest: !isOverridden })}
                                  className="inline-flex items-center gap-1 text-[10px] font-black uppercase tracking-wide px-2.5 py-1.5 rounded-lg whitespace-nowrap transition-all hover:brightness-125"
                                  style={{background:'rgba(217,119,6,0.2)', color:'#f59e0b', border:'1px solid rgba(217,119,6,0.5)', letterSpacing:'0.04em'}}>
                                  <svg viewBox="0 0 24 24" fill="currentColor" style={{width:'13px',height:'13px'}}><path d="M12 12a4 4 0 100-8 4 4 0 000 8zm0 2c-4.4 0-8 2.7-8 6v1h16v-1c0-3.3-3.6-6-8-6z"/></svg>
                                  About {displayCand?.name?.split(' ')[0]}
                                </button>
                                <button onClick={() => {
                                    const office = race.office;
                                    const name = displayCand?.name;
                                    setSelected(prev => prev[office] === name ? Object.fromEntries(Object.entries(prev).filter(([k]) => k !== office)) : {...prev, [office]: name});
                                  }}
                                  className="text-[10px] font-black uppercase tracking-wide px-2.5 py-1.5 rounded-lg whitespace-nowrap transition-all hover:brightness-125"
                                  style={{...(isOnBallot
                                    ? {background:'rgba(34,197,94,0.2)', color:'#22c55e', border:'1px solid rgba(34,197,94,0.5)'}
                                    : {background:'rgba(255,255,255,0.08)', color:'rgba(255,255,255,0.5)', border:'1px solid rgba(255,255,255,0.2)'}), letterSpacing:'0.04em'}}>
                                  {isOnBallot ? '✓ On Ballot' : '+ Add to Ballot'}
                                </button>
                              </div>
                            </div>
                          </div>

                        </div>
                      </div>
                    );
                  };
                return onOpen(race);
              });
            })()}


          </div>

          {/* Spacer so the last race card can scroll clear of the fixed bar */}
          <div style={{height:'84px'}} />
          {/* Fixed finish line — always on screen; the whole page funnels here */}
          <div className="fixed bottom-0 left-0 right-0 z-40 px-4 pt-3 pb-4" style={{background:'linear-gradient(to top, #0c1a2e 65%, rgba(12,26,46,0))'}}>
            <button onClick={onBallot}
              className="w-full max-w-5xl mx-auto flex items-center justify-center gap-2 py-3.5 rounded-full font-black text-sm uppercase tracking-widest text-white transition-all hover:brightness-110 active:scale-[0.99]"
              style={{background: ctaColors.grad, border: `1px solid ${ctaColors.border}`, letterSpacing:'0.12em', boxShadow: `0 8px 24px ${ctaColors.glow}`}}>
              <svg className="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.2}><path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
              Build My Ballot →
            </button>
          </div>
        </div>

        {/* Race compare overlay */}
        {compareRace && (
          <div className="fixed inset-0 z-50 overflow-y-auto bg-white">
            <RaceDetail
              race={compareRace}
              issues={issues}
              answers={answers}
              ranks={ranks}
              checkedStatements={checkedStatements}
              selected={selected}
              onSelect={(office, name) => setSelected(prev => name ? {...prev, [office]: name} : Object.fromEntries(Object.entries(prev).filter(([k]) => k !== office)))}
              onBack={() => setCompareRace(null)}
              onNextRace={null}
              onPrevRace={null}
              onQuiz={null}
              onHome={() => setCompareRace(null)}
              inline={false}
            />
          </div>
        )}

        {/* Candidate profile modal */}
        {profileData && (
          <CandidateProfile
            candidate={profileData.candidate}
            opponent={profileData.race.candidates.find(c => c && c.name !== profileData.candidate.name) || null}
            issues={issues}
            answers={answers}
            checkedStatements={checkedStatements}
            ranks={ranks}
            raceName={profileData.race.office}
            raceCategory={profileData.race.category}

                // Active tab's heading + body
                let aHead = '', aBody = '', aItalic = false;

                const isFactsTab = tab === 'facts';

                        {!isJudicialCandidate && (() => {
                          const userSkipped = answers?.[issue.id] === 'D'; // chose No Opinion on every statement = skipped the whole issue
                          const chipBase = "text-[9px] lg:text-[11px] font-black uppercase tracking-wide px-2.5 py-1 rounded-full whitespace-nowrap border leading-none text-center min-w-[5.5rem] lg:min-w-[7rem]";
                          let label, cls, pulse = '', tappable = !!onRateIssue;
                          if (isMatch) { label = '✓ Match'; cls = 'text-emerald-50 bg-emerald-500/35 border-emerald-400/70'; }

    // ── Race detail comparison table ────────────────────────────────────────
    function RaceDetail({ race, issues, answers, ranks, checkedStatements: _checkedStmts={}, selected, onSelect, onBack, onNextRace, onPrevRace, onQuiz, onHome, inline=false }) {
      const checkedStatements = _checkedStmts;
      const candidates = race.candidates.filter(Boolean).slice(0, 2);
      const hasAnswers = answers && Object.keys(answers).length > 0;
      const currentSelected = selected[race.office];
      const [profileCandidate, setProfileCandidate] = useState(null);
      const [sourceModal, setSourceModal] = useState(null); // { candidate, issue }
      const [panelOpen, setPanelOpen] = useState(false);
      const [isDesktop, setIsDesktop] = useState(window.innerWidth >= 1024);
      useEffect(() => {
        const onResize = () => setIsDesktop(window.innerWidth >= 1024);
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);
      const drag = useRef({active:false, startX:0, startY:0, baseOffset:0, w:165, isHoriz:null});

      // Scroll to top whenever the race changes
      useEffect(() => { window.scrollTo(0, 0); }, [race.office]);

      function getSlides() { return document.querySelectorAll('[data-slide]'); }

      // 3-panel strip: [ME | CandA | CandB]
      // All 3 columns = exactly 1/3 of screen width on any device
      // panelOpen=false: shows ME+CandA | panelOpen=true: shows CandA+CandB

      function getPanelW() { return window.innerWidth / 3; }

      function swipeStart(clientX, clientY) {
        const w = getPanelW();
        drag.current = { active:true, startX:clientX, startY:clientY, baseOffset: panelOpen ? -w : 0, w, isHoriz:null };
        getSlides().forEach(el => el.style.transition = 'none');
      }

      function swipeMove(clientX, clientY) {
        if (!drag.current.active) return;
        const dx = clientX - drag.current.startX;
        const dy = clientY - drag.current.startY;
        if (drag.current.isHoriz === null) {
          if (Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
          drag.current.isHoriz = Math.abs(dx) > Math.abs(dy);
        }
        if (!drag.current.isHoriz) return;
        const offset = Math.max(-drag.current.w, Math.min(0, drag.current.baseOffset + dx));
        getSlides().forEach(el => el.style.transform = `translateX(${offset}px)`);
      }

      function swipeEnd(clientX) {
        if (!drag.current.active || !drag.current.isHoriz) { drag.current.active = false; return; }
        drag.current.active = false;
        const dx = clientX - drag.current.startX;
        getSlides().forEach(el => el.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)');
        let newOpen = panelOpen;
        if (!panelOpen && dx < -40) newOpen = true;   // swipe left → show both candidates
        else if (panelOpen && dx > 40) newOpen = false; // swipe right → back to ME
        if (newOpen !== panelOpen) {
          setPanelOpen(newOpen);
        } else {
          // Snap back using current panel width
          const snapOffset = panelOpen ? -getPanelW() : 0;
          getSlides().forEach(el => el.style.transform = `translateX(${snapOffset}px)`);
        }
      }

      const touchHandlers = {
        onTouchStart: e => swipeStart(e.touches[0].clientX, e.touches[0].clientY),
        onTouchMove:  e => { if (drag.current.isHoriz) e.preventDefault(); swipeMove(e.touches[0].clientX, e.touches[0].clientY); },
        onTouchEnd:   e => swipeEnd(e.changedTouches[0].clientX),
        onMouseDown:  e => {
          e.preventDefault(); // prevent text selection during drag
          swipeStart(e.clientX, e.clientY);
          document.body.style.cursor = 'grabbing';
          const moveH = ev => swipeMove(ev.clientX, ev.clientY);
          const upH   = ev => {
            swipeEnd(ev.clientX);
            document.body.style.cursor = '';
            window.removeEventListener('mousemove', moveH);
            window.removeEventListener('mouseup', upH);
          };

          window.addEventListener('mouseup', upH);
        },
      };

                        <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />

                    <div className="w-10 h-10 rounded-full overflow-hidden border-2 flex-shrink-0 bg-slate-100"
                      style={{borderColor: candidate.party==='D'?'#3b82f6':candidate.party==='R'?'#ef4444':'#94a3b8'}}>
                      <img src={candidate.photo||'/icons/candidate-undefined.png'} alt={candidate.name}
                        className="w-full h-full object-cover object-top"

                    </div>
                    <div>
                      <p className={`text-sm font-black uppercase tracking-wide ${partyColor}`}>{candidate.name}</p>
                      <p className="text-[13px] font-black text-slate-400 uppercase tracking-widest">{issue.topic}</p>
                    </div>
                  </div>
                  {/* Position text + source */}
                  <div className="px-5 pb-5 space-y-3">
                  {(() => {

                    const posText = issue[cPos]; // full optionA/B/C text

                          className="inline-block mt-1 text-xs text-blue-600 font-bold underline">

                    <div className="bg-slate-50 rounded-xl px-4 py-3 flex items-center gap-3">
                      <svg className="w-5 h-5 text-slate-300 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
