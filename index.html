    // ─────────────────────────────────────────────
    // APP — main state machine
    // ─────────────────────────────────────────────
    function App() {
      const _params = new URLSearchParams(window.location.search);
      // Clean per-candidate URL slug (voteyourviews.org/JamesTalarico), or null for the app's own pages.
      // Parse the path: a bare slug opens the candidate's profile; a trailing /edit opens the editable submission page for that candidate.
      const _rawPath = decodeURIComponent((window.location.pathname || '').replace(/^\/+|\/+$/g, ''));
      const editMode = /\/edit$/i.test(_rawPath);
      const urlSlug = (() => {
        const p = _rawPath.replace(/\/edit$/i, '');
        return ['', 'index.html', 'statements', 'ballot'].includes(p.toLowerCase()) ? null : p;
      })();
      const [screen, setScreen] = useState(_params.get('testBallot') === '1' ? 'loading' : SHEETS.master ? 'loading' : 'landing');
      // Browser back/forward support: mirror screen changes into history so the
      // browser Back button navigates the app instead of reloading the page.
      useEffect(() => {
        window.history.replaceState({ vyvScreen: screen }, '');
        const onPop = (e) => { const s = e.state && e.state.vyvScreen; if (s) setScreen(s); };
        window.addEventListener('popstate', onPop);
        return () => window.removeEventListener('popstate', onPop);
      }, []);
      useEffect(() => {
        if (screen === 'loading') return;
        if (window.history.state && window.history.state.vyvScreen === screen) return; // popstate restore — don't re-push
        window.history.pushState({ vyvScreen: screen }, '');
      }, [screen]);
      // Analytics: each screen is a step in the user journey (landing → quiz → results → ballot…)
      useEffect(() => { if (screen !== 'loading') vyvTrack('screen_change', { screen }); }, [screen]);
      // Analytics: fires once when the voter has answered all 9 issues
      const _quizDone = useRef(false);
      useEffect(() => {
        const n = Object.keys(answers).filter(k => answers[k] && answers[k] !== 'D').length;
        if (n >= 9 && !_quizDone.current) { _quizDone.current = true; vyvTrack('quiz_complete', { answered: n }); }
      }, [answers]);
      // ?persist=1 in URL uses localStorage (for testing); otherwise sessionStorage (clears on new visit)
      const store = new URLSearchParams(window.location.search).get('persist') === '1' ? localStorage : sessionStorage;
      const [county, setCounty] = useState(() => store.getItem('vyv_county') || 'hays');
      const [answers, setAnswers] = useState(() => {
        try {
          const a = JSON.parse(store.getItem('vyv_answers') || '{}');
          const stmts = JSON.parse(store.getItem('vyv_stmts') || '{}');
          // If all answers are V2 ('S') but no stmts data, clear stale session so quiz reruns fresh
          const allS = Object.keys(a).length > 0 && Object.values(a).every(v => v === 'S' || v === 'D');
          if (allS && Object.keys(stmts).length === 0) {
            store.removeItem('vyv_answers'); store.removeItem('vyv_ranks'); store.removeItem('vyv_stmts');
            return {};
          }
          // Backfill: if stmts has reactions for an issue but answers entry is missing, restore it
          Object.keys(stmts).forEach(id => {
            if (!a[id] && stmts[id] && stmts[id].reactions && Object.keys(stmts[id].reactions).length > 0) {
              a[id] = 'S';
            }
          });
          return a;
        } catch(e) { return {}; }
      });
      const [ranks, setRanks] = useState(() => { try { return JSON.parse(store.getItem('vyv_ranks') || '{}'); } catch(e) { return {}; } });
      const [checkedStatements, setCheckedStatements] = useState(() => { try { return JSON.parse(store.getItem('vyv_stmts') || '{}'); } catch(e) { return {}; } });
      const [selected, _setSelected] = useState({});
      // Ballot picks are toggled from six call sites — diffing prev→next here catches
      // every add/remove for analytics without touching any of them.
      const setSelected = React.useCallback((updater) => {
        _setSelected(prev => {
          const next = typeof updater === 'function' ? updater(prev) : updater;
          try {
            Object.keys(next).forEach(o => { if (next[o] !== prev[o]) vyvTrack('add_to_ballot', { candidate: next[o], office: o }); });
            Object.keys(prev).forEach(o => { if (!(o in next)) vyvTrack('remove_from_ballot', { candidate: prev[o], office: o }); });
          } catch (_) {}
          return next;
        });
      }, []);
      const [issues, setIssues] = useState(ISSUES);
      const [counties, setCounties] = useState(() => normalizeFallbackCounties(COUNTIES));
      const [loadError, setLoadError] = useState(null);
      const [dataSource, setDataSource] = useState(SHEETS.master ? 'loading' : 'demo');
      const [userDistricts, setUserDistricts] = useState(() => {
        if (new URLSearchParams(window.location.search).get('testDistricts') === '1')
          return { congressionalDistrict:'21', stateSenate:'25', stateHouse:'73', commissionerPrecinct:'4', jpPrecinct:'4' };
        try { return JSON.parse(store.getItem('vyv_districts') || 'null'); } catch(e) { return null; }
      });
      // District-first race lookup: once the voter's districts are known, make sure THEIR
      // congressional / TX House / TX Senate races are in the county's race pool even when
      // the sheet's county tag misses that district (e.g. a Travis voter in CD-21).
      const countiesEffective = useMemo(() => {
        if (!userDistricts || !ALL_DISTRICT_RACES.length) return counties;
        const wanted = (r) =>
          (r.districtType === 'congressional' && userDistricts.congressionalDistrict && String(r.districtNumber) === String(userDistricts.congressionalDistrict)) ||
          (r.districtType === 'stateSenate' && userDistricts.stateSenate && String(r.districtNumber) === String(userDistricts.stateSenate)) ||
          (r.districtType === 'stateHouse' && userDistricts.stateHouse && String(r.districtNumber) === String(userDistricts.stateHouse));
        const out = {};
        Object.entries(counties).forEach(([key, data]) => {
          if (!data || !Array.isArray(data.federal)) { out[key] = data; return; }
          const have = new Set([...data.federal, ...data.state].map(r => r.office));
          const extras = ALL_DISTRICT_RACES.filter(r => wanted(r) && !have.has(r.office))
            .map(r => ({ ...r, level: raceLevel(r, false) }));
          out[key] = extras.length ? {
            ...data,
            federal: [...data.federal, ...extras.filter(r => r.level === 'federal')],
            state:   [...data.state,   ...extras.filter(r => r.level === 'state')],
          } : data;
        });
        return out;
      }, [counties, userDistricts]);
      // Persist county + looked-up districts so a returning voter isn't re-asked for their address
      React.useEffect(() => { try { store.setItem('vyv_county', county); } catch(e) {} }, [county]);
      // County detected from an address lookup. For counties we don't cover yet the modal hands
      // us 'texas' (the statewide block) plus the voter's real county name for the header pill.
      const [uncoveredNotice, setUncoveredNotice] = useState(null); // {countyName, address} — callout on ballot pages
      function handleCountyDetected(key, label, notice) {
        vyvTrack('address_lookup', { county: label || key });
        setCounty(key);
        if (key === 'texas' && label) setCounties(prev => prev.texas ? { ...prev, texas: { ...prev.texas, name: label } } : prev);
        setUncoveredNotice(key === 'texas' && notice ? { ...notice, dismissed: false } : null);
        // Keep the voter's real county name on the pill across reloads (the 'texas'
        // pseudo-county otherwise falls back to its generic label).
        try { key === 'texas' && label ? store.setItem('vyv_texas_label', label) : store.removeItem('vyv_texas_label'); } catch (e) {}
      }
      React.useEffect(() => { try { userDistricts ? store.setItem('vyv_districts', JSON.stringify(userDistricts)) : store.removeItem('vyv_districts'); } catch(e) {} }, [userDistricts]);
      const [pendingScreen, setPendingScreen] = useState('quiz');

      // Persist answers + ranks + checkedStatements
      React.useEffect(() => { try { store.setItem('vyv_answers', JSON.stringify(answers)); } catch(e) {} }, [answers]);
      React.useEffect(() => { try { store.setItem('vyv_ranks', JSON.stringify(ranks)); } catch(e) {} }, [ranks]);
      React.useEffect(() => { try { store.setItem('vyv_stmts', JSON.stringify(checkedStatements)); } catch(e) {} }, [checkedStatements]);

      // Auto-select best-matched candidate per race whenever answers/ranks/statements change.
      // autoPickRef remembers what THIS effect chose, so a re-run with fresher data (the
      // sheet load replacing the hardcoded fallback) can update its own picks — while a
      // pick the user made or changed by hand is never overwritten.
      const autoPickRef = useRef({});
      React.useEffect(() => {
        if (Object.keys(answers).length === 0) return;
        // Active county only — office names repeat across counties (e.g. "U.S. House"),
        // so scanning every county would let another county's race overwrite this one's pick.
        const allRaces = ['federal', 'state', 'county'].flatMap(k => (counties[county] || {})[k] || []);
        const autoSelected = {};
        allRaces.forEach(race => {
          // Skip TBD placeholders — never auto-add a nominee that doesn't exist yet.
          // Score EVERY real candidate (races can have 3+); highest match wins, earlier listing wins ties.
          const scored = (race.candidates || [])
            .filter(c => c && !/^TBD/i.test(c.name || ''))
            .map(c => ({ c, s: calcMatch(c, answers, checkedStatements, ranks) }))
            .filter(x => x.s !== null);
          if (scored.length) {
            autoSelected[race.office] = scored.reduce((a, b) => (b.s > a.s ? b : a)).c.name;
          }
        });
        const lastAutoPicks = autoPickRef.current; // snapshot BEFORE updating the ref — the updater below may run later
        autoPickRef.current = autoSelected;
        _setSelected(prev => {   // _setSelected: auto-picks are not user intent — keep them out of add_to_ballot analytics
          const next = { ...prev };
          Object.entries(autoSelected).forEach(([office, name]) => {
            if (prev[office] === undefined || prev[office] === lastAutoPicks[office]) next[office] = name;
          });
          return next;
        });
      }, [answers, ranks, checkedStatements, counties, county]);
      const [startIssueId, setStartIssueId] = useState(null);
      // Landing "picker mode": after a quiz submit, show the bare icon grid so the
      // user picks the next issue visually instead of being marched issue-to-issue.
      const [landingPicker, setLandingPicker] = useState(false);
      const [quizReturnScreen, setQuizReturnScreen] = useState(null); // single-issue "rate this" → return here after one answer
      const [quizEntryIssueId, setQuizEntryIssueId] = useState(null);  // the issue the quiz was ENTERED on → BACK past it returns to origin, not the positional-previous issue
      const [reopenProfile, setReopenProfile] = useState(null); // candidate profile to reopen when returning from "rate this"
      const [focusIssueId, setFocusIssueId] = useState(null); // when returning from a single-issue "Do you match?" quiz, the issue card to auto-open + scroll to (the payoff)
      const [editTarget, setEditTarget] = useState(null); // {candidate, race} when on the /<slug>/edit candidate submission page
      const rateIssueReturn = (id, ret, profile) => { setQuizReturnScreen(ret); setReopenProfile(profile || null); setStartIssueId(id || null); setQuizEntryIssueId(id || null); setScreen('quiz'); };
      const [browseReturn, setBrowseReturn] = useState('landing'); // screen to return to from Compare/Browse
      const [resultsReturn, setResultsReturn] = useState('landing'); // screen to return to from Pre-Ballot (results)
      const [ballotReturn, setBallotReturn] = useState('landing'); // screen to return to from the printable Ballot's Back
      const [addrModal, setAddrModal] = useState(null); // destination screen after address modal: 'browse' | 'results' | null

      async function loadFromSheets() {
        setScreen('loading');
        setLoadError(null);
        try {
          const [issueRows, stmtRows] = await Promise.all([
            fetchSheet(SHEETS.master, 'issues'),
            fetchSheet(SHEETS.master, 'Statements').catch(() => []),
          ]);
          if (stmtRows.length > 0) {
            const built = {};
            stmtRows.forEach(r => {
              const issue = (r.issue || '').trim();
              const text = (r.text || '').trim();
              if (issue && text) {
                if (!built[issue]) built[issue] = [];
                built[issue].push(text);
              }
            });
            if (Object.keys(built).length > 0) ISSUE_STATEMENTS = built;
          }
          const rawIssues = buildIssues(issueRows);
          const builtIssues = [...GRID_ORDER.map(id => rawIssues.find(i => i.id === id)).filter(Boolean), ...rawIssues.filter(i => !GRID_ORDER.includes(i.id))];
          // load the self-hosted photo manifest (which candidates have local PNGs) before building
          try {
            const mres = await fetch('/images/candidates/manifest.json', { cache: 'no-store' });
            if (mres.ok) PHOTO_MANIFEST = new Set(await mres.json());
          } catch (_) {}

          // Shared tabs: `Statewide` (the 18 races on every TX ballot — single master) and
          // `Districts` (district-based races, each tagged with the counties it touches).
          // Each county's ballot = Statewide + its Districts + its county-local races.
          const [statewideRows, districtRows, notUpRows] = await Promise.all([
            fetchSheet(SHEETS.master, 'Statewide'),
            fetchSheet(SHEETS.master, 'Districts').catch(() => []),
            fetchSheet(SHEETS.master, 'SenatorsNotUp').catch(() => []),
          ]);
          notUpRows.forEach(r => { const n = String(r.districtNumber || '').trim(); if (n) SENATORS_NOT_UP[n] = r; });
          const statewideRaces = buildRaces(statewideRows, 'statewide');
          const districtRaces = buildRaces(districtRows, 'statewide');
          // Full district-race set, kept for district-first lookup: a voter's own races
          // come from here by district NUMBER, so an incomplete county tag can never
          // silently drop their U.S. House / TX House / TX Senate race.
          ALL_DISTRICT_RACES = districtRaces;
          // Transition guard: county tabs still carry mirrored statewide + district rows until
          // they're retired — skip any county-tab office the shared tabs already provide.
          const sharedOffices = new Set([...statewideRaces, ...districtRaces].map(r => r.office));

          const builtCounties = {};
          for (const [key, meta] of Object.entries(COUNTY_META)) {
            builtCounties[key] = { ...meta, available: false, statewide: [], local: [] };
            const countySheet = SHEETS.counties[key];
            if (countySheet) {
              try {
                const countyRows = await fetchSheet(countySheet.sheetId, countySheet.tab);
                const localRaces = buildRaces(countyRows, key).filter(r => !sharedOffices.has(r.office));
                const countyDistricts = districtRaces.filter(r => r.counties.includes(key));
                Object.assign(builtCounties[key], buildCountyRaces([...statewideRaces, ...countyDistricts], localRaces));
                builtCounties[key].available = localRaces.length > 0;
              } catch (_) {}
            }
          }
          // "texas" pseudo-county — voters in counties we don't cover yet: all statewide races
          // plus every district race (the voter's address districts narrow them to theirs).
          const texasLabel = (() => { try { return store.getItem('vyv_texas_label'); } catch (e) { return null; } })();
          builtCounties.texas = { name: texasLabel || 'Texas', available: true, statewide: [], local: [], ...buildCountyRaces([...statewideRaces, ...districtRaces], []) };

          setIssues(builtIssues);
          setCounties(builtCounties);
          setDataSource('sheets');
          // If arriving via a candidate URL, stay on loading and let the slug effect route to the profile (avoids a landing flash / double-render).
          setScreen(new URLSearchParams(window.location.search).get('testBallot') === '1' ? 'ballot' : (urlSlug ? 'loading' : 'landing'));
        } catch (err) {
          setLoadError(err.message);
          setDataSource('error');
          setScreen('error');
        }
      }

      useEffect(() => {
        if (SHEETS.master) loadFromSheets();
      }, []);

      // Clean per-candidate URL (voteyourviews.org/JamesTalarico): once data is loaded, open that candidate's profile.
      const [slugHandled, setSlugHandled] = useState(false);
      useEffect(() => {
        if (slugHandled) return;
        if (dataSource !== 'sheets') return;   // wait for final data
        setSlugHandled(true);
        if (!urlSlug) return;
        const match = findCandidateBySlug(counties, urlSlug);
        if (match) {
          setCounty(match.countyKey);
          if (editMode) {
            setEditTarget({ candidate: match.candidate, race: match.race });
            setScreen('edit');
          } else {
            setReopenProfile({ candidate: match.candidate, race: match.race });
            setBrowseReturn('landing');
            setScreen('browse');
          }
        } else {
          setScreen('landing');   // unknown slug — fall back to home so we don't hang on loading
        }
      }, [counties, dataSource]);

      function goToAddress(destination) {
        setPendingScreen(destination);
        setScreen('address');
      }

      if (screen === 'loading') return <LoadingScreen />;
      if (screen === 'error')   return <ErrorScreen message={loadError} onRetry={loadFromSheets} />;

      if (screen === 'landing') {
        return (
          <>
          <Landing
            county={county}
            setCounty={setCounty}
            counties={counties}
            dataSource={dataSource}
            issues={issues}
            answers={answers}
            checkedStatements={checkedStatements}
            picker={landingPicker}
            onLogo={() => { setLandingPicker(false); window.scrollTo(0, 0); }}
            onQuiz={(id) => { const startId = id || (issues[0] && issues[0].id); setStartIssueId(startId); setQuizEntryIssueId(startId); setPendingScreen('landing'); setScreen('quiz'); }}
            onSummary={() => { setResultsReturn('landing'); userDistricts ? setScreen('results') : setAddrModal('results'); }}
            onStartOver={() => { setAnswers({}); setRanks({}); setCheckedStatements({}); setSelected({}); setStartIssueId(null); setLandingPicker(false); store.removeItem('vyv_answers'); store.removeItem('vyv_ranks'); store.removeItem('vyv_stmts'); }}
            onBrowse={() => { setBrowseReturn('landing'); userDistricts ? setScreen('browse') : setAddrModal('browse'); }}
          />
          {addrModal && (
            <AddressModal
              county={county}
              accentColor="#3b82f6"
              accentColorDark="#1d4ed8"
              onCountyDetected={handleCountyDetected}
              onClose={() => setAddrModal(null)}
              onContinue={(districts) => { const dest = addrModal; setUserDistricts(districts); setAddrModal(null); setScreen(dest); }}
              onShowAll={() => { const dest = addrModal; setAddrModal(null); setScreen(dest); }}
            />
          )}
          </>
        );
      }

      if (screen === 'address') {
        return (
          <AddressScreen
            county={county}
            onCountyDetected={handleCountyDetected}
            onContinue={districts => {
              setUserDistricts(districts);
              if (pendingScreen === 'quiz') { setAnswers({}); setRanks({}); setSelected({}); }
              setScreen(pendingScreen);
            }}
            onSkip={() => {
              setUserDistricts(null);
              if (pendingScreen === 'quiz') { setAnswers({}); setRanks({}); setSelected({}); }
              setScreen(pendingScreen);
            }}
            onBack={() => setScreen(pendingScreen === 'results' ? 'summary' : 'landing')}
          />
        );
      }

      if (screen === 'quiz') {
        const issue = issues.find(i => i.id === startIssueId) || issues[0];
        return (
          <>
          <Quiz
            key={startIssueId}
            issue={issue}
            initialAnswer={answers[issue?.id] || null}
            initialRank={ranks[issue?.id] || (answers[issue?.id] === 'S' ? 5 : null)}
            initialReactions={(checkedStatements[issue?.id] || {}).reactions || null}
            onSave={(answer, rank, stmtData) => {
              if (answer !== null) {
                vyvTrack('issue_answered', { issue: issue.id, choice: answer, rank: rank || 0 });
                setAnswers(prev => { const n = { ...prev, [issue.id]: answer }; try { store.setItem('vyv_answers', JSON.stringify(n)); } catch(e) {} return n; });
                setRanks(prev => { const n = { ...prev, [issue.id]: rank }; try { store.setItem('vyv_ranks', JSON.stringify(n)); } catch(e) {} return n; });
                if (stmtData) setCheckedStatements(prev => { const n = { ...prev, [issue.id]: stmtData }; try { store.setItem('vyv_stmts', JSON.stringify(n)); } catch(e) {} return n; });
              }
              if (quizReturnScreen) {
                const ret = quizReturnScreen;
                setQuizReturnScreen(null);
                setStartIssueId(null);
                if (reopenProfile) setFocusIssueId(issue.id); // reopened profile should land on this issue, expanded, showing the match verdict
                setScreen(ret);
              } else {
                // Return to the landing grid in picker mode so the user chooses
                // the next issue visually instead of being auto-advanced.
                setStartIssueId(null);
                setLandingPicker(true);
                setScreen('landing');
              }
            }}
            onBack={() => {
              if (quizReturnScreen) { const ret = quizReturnScreen; setQuizReturnScreen(null); setQuizEntryIssueId(null); setStartIssueId(null); setScreen(ret); return; }
              const currentIdx = issues.findIndex(i => i.id === issue.id);
              // Stop at the issue we entered on — BACK past it returns to where we came from,
              // not the positional-previous issue (which the user never visited).
              const atEntry = issue.id === quizEntryIssueId || currentIdx <= 0;
              const prevIssue = atEntry ? null : issues[currentIdx - 1];
              if (prevIssue) {
                setStartIssueId(prevIssue.id);
              } else {
                setStartIssueId(null);
                setQuizEntryIssueId(null);
                if (pendingScreen === 'summary') setScreen('summary');
                else setScreen('landing');
              }
            }}
            onSavePartial={(answer, rnk, stmtData) => {
              setAnswers(prev => {
                const next = { ...prev, [issue.id]: answer };
                try { store.setItem('vyv_answers', JSON.stringify(next)); } catch(e) {}
                return next;
              });
              if (rnk) setRanks(prev => {
                const next = { ...prev, [issue.id]: rnk };
                try { store.setItem('vyv_ranks', JSON.stringify(next)); } catch(e) {}
                return next;
              });
              if (stmtData) setCheckedStatements(prev => {
                const next = { ...prev, [issue.id]: stmtData };
                try { store.setItem('vyv_stmts', JSON.stringify(next)); } catch(e) {}
                return next;
              });
            }}
            onHome={() => { setStartIssueId(null); setLandingPicker(false); setScreen('landing'); }}
            onStartOver={() => { setAnswers({}); setRanks({}); setSelected({}); setStartIssueId(null); setLandingPicker(false); setScreen('landing'); store.removeItem('vyv_answers'); store.removeItem('vyv_ranks'); }}
            answers={answers}
            onSummary={() => { setStartIssueId(null); setResultsReturn('landing'); userDistricts ? setScreen('results') : setAddrModal('results'); }}
          />
          {addrModal && (
            <AddressModal
              county={county}
              accentColor="#3b82f6"
              accentColorDark="#1d4ed8"
              onCountyDetected={handleCountyDetected}
              onClose={() => setAddrModal(null)}
              onContinue={(districts) => { const dest = addrModal; setUserDistricts(districts); setAddrModal(null); setScreen(dest); }}
              onShowAll={() => { const dest = addrModal; setAddrModal(null); setScreen(dest); }}
            />
          )}
          </>
        );
      }

      if (screen === 'summary') {
        return (
          <Summary
            issues={issues}
            answers={answers}
            ranks={ranks}
            county={county}
            onMatchAll={() => { setBrowseReturn('summary'); setScreen('browse'); }}
            onCompareMine={(districts) => { setUserDistricts(districts); setBrowseReturn('summary'); setScreen('browse'); }}
            onBallot={(districts) => { if (districts) setUserDistricts(districts); setBallotReturn('summary'); setScreen('ballot'); }}
            onMatchMine={(districts) => { setUserDistricts(districts); setResultsReturn('summary'); setScreen('results'); }}
            onViewConstellation={() => setScreen('constellation')}
            onAnswerMore={(id) => { setStartIssueId(id); setPendingScreen('summary'); setScreen('quiz'); }}
            onHome={() => { setStartIssueId(null); setLandingPicker(false); setScreen('landing'); }}
            onStartOver={() => { setAnswers({}); setRanks({}); setSelected({}); setStartIssueId(null); setLandingPicker(false); setScreen('landing'); store.removeItem('vyv_answers'); store.removeItem('vyv_ranks'); }}
          />
        );
      }

      if (screen === 'constellation') {
        return (
          <ConstellationScreen
            issues={issues}
            answers={answers}
            ranks={ranks}
            onContinue={() => goToAddress('results')}
            onRetake={() => { setAnswers({}); setRanks({}); setSelected({}); setStartIssueId(null); setScreen('landing'); store.removeItem('vyv_answers'); store.removeItem('vyv_ranks'); }}
          />
        );
      }

      if (screen === 'results') {
        return (
          <Results
            county={county}
            counties={countiesEffective}
            setCounty={setCounty}
            onCountyDetected={handleCountyDetected}
            uncoveredNotice={uncoveredNotice}
            onDismissNotice={() => setUncoveredNotice(n => n && ({ ...n, dismissed: true }))}
            onReopenNotice={() => setUncoveredNotice(n => n && ({ ...n, dismissed: false }))}
            issues={issues}
            answers={answers}
            ranks={ranks}
            checkedStatements={checkedStatements}
            selected={selected}
            setSelected={setSelected}
            userDistricts={userDistricts}
            setUserDistricts={setUserDistricts}
            onBallot={() => { setBallotReturn('results'); setScreen('ballot'); }}
            onBack={() => setScreen(resultsReturn)}
            onBrowse={() => { setBrowseReturn('results'); setScreen('browse'); }}
            onAddress={() => setScreen('address')}
            onRateIssue={(id, profile) => rateIssueReturn(id, 'results', profile)}
            initialProfile={reopenProfile}
            clearInitialProfile={() => setReopenProfile(null)}
            focusIssueId={focusIssueId}
            clearFocusIssue={() => setFocusIssueId(null)}
          />
        );
      }

      if (screen === 'edit' && editTarget) {
        return (
          <CandidateEditPage
            candidate={editTarget.candidate}
            race={editTarget.race}
            issues={issues}
            onBack={() => {
              try { window.history.pushState({}, '', '/' + urlSlug); } catch(e) {}
              setReopenProfile({ candidate: editTarget.candidate, race: editTarget.race });
              setBrowseReturn('landing');
              setScreen('browse');
            }}
          />
        );
      }

      if (screen === 'browse') {
        return (
          <Browse
            county={county}
            counties={countiesEffective}
            setCounty={setCounty}
            onCountyDetected={handleCountyDetected}
            uncoveredNotice={uncoveredNotice}
            onDismissNotice={() => setUncoveredNotice(n => n && ({ ...n, dismissed: true }))}
            onReopenNotice={() => setUncoveredNotice(n => n && ({ ...n, dismissed: false }))}
            issues={issues}
            answers={answers}
            ranks={ranks}
            checkedStatements={checkedStatements}
            selected={selected}
            setSelected={setSelected}
            userDistricts={userDistricts}
            setUserDistricts={setUserDistricts}
            onQuiz={() => { const startId = issues[0] && issues[0].id; setStartIssueId(startId); setQuizEntryIssueId(startId); setPendingScreen('browse'); setScreen('quiz'); }}
            onBallot={() => { setBallotReturn('browse'); setScreen('ballot'); }}
            onHome={() => setScreen('landing')}
            onBack={() => setScreen(browseReturn)}
            backLabel={browseReturn === 'landing' ? 'home' : '← Back'}
            onRateIssue={(id, profile) => rateIssueReturn(id, 'browse', profile)}
            initialProfile={reopenProfile}
            clearInitialProfile={() => setReopenProfile(null)}
            focusIssueId={focusIssueId}
            clearFocusIssue={() => setFocusIssueId(null)}
          />
        );
      }

      if (screen === 'ballot') {
        // The printed ballot is address-specific — without the voter's districts it
        // would list every district race in the county. No address, no ballot.
        if (!userDistricts) {
          return (
            <div className="min-h-screen" style={{background:'linear-gradient(160deg,#1e1b4b 0%,#0f172a 60%,#0c1a2e 100%)'}}>
              <AddressModal
                county={county}
                accentColor="#3b82f6"
                accentColorDark="#1d4ed8"
                onCountyDetected={handleCountyDetected}
                onClose={() => setScreen(ballotReturn)}
                onContinue={(districts) => setUserDistricts(districts)}
                onShowAll={() => setScreen(ballotReturn)}
              />
            </div>
          );
        }
        return (
          <Ballot
            county={county}
            counties={countiesEffective}
            selected={selected}
            answers={answers}
            ranks={ranks}
            checkedStatements={checkedStatements}
            issues={issues}
            userDistricts={userDistricts}
            onBack={() => setScreen(ballotReturn)}
            onHome={() => setScreen('landing')}
            onEdit={() => setScreen(Object.keys(answers).length > 0 ? 'results' : 'browse')}
          />
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
