  <style>
    body { font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; max-width: 100vw; }
    html { overflow-x: hidden; }
    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .cand-summary { font-size: 16px; }
    @media (min-width: 1024px) { .cand-summary { font-size: 17px; } }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .slide-in { animation: slideIn 0.35s cubic-bezier(0.22,1,0.36,1); }
    @keyframes slideIn { from { opacity: 0; transform: translateY(18px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .chip-nudge { animation: chipNudge 2.4s ease-in-out infinite; }
    @keyframes chipNudge { 0%,100% { box-shadow: 0 0 0 0 rgba(252,211,77,0.0); } 50% { box-shadow: 0 0 0 3px rgba(252,211,77,0.22); } }
    .focus-pulse { animation: focusPulse 2.2s ease-out; }
    @keyframes focusPulse {
      0%   { box-shadow: 0 0 0 0 rgba(252,211,77,0.0), 0 2px 10px rgba(0,0,0,0.4); }
      15%  { box-shadow: 0 0 0 4px rgba(252,211,77,0.85), 0 6px 22px rgba(0,0,0,0.5); }
      60%  { box-shadow: 0 0 0 3px rgba(252,211,77,0.45), 0 4px 16px rgba(0,0,0,0.45); }
      100% { box-shadow: 0 0 0 0 rgba(252,211,77,0.0), 0 2px 10px rgba(0,0,0,0.4); }
    }
    .issue-enter { animation: issueEnter 0.45s cubic-bezier(0.22,1,0.36,1); }
    @keyframes issueEnter { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
    /* Lightbulb "turns on" when the Facts tab opens: yellow bulb fades in + glows */
    .bulb-on { animation: bulbLight 1.4s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes bulbLight {
      0%   { opacity: 0; filter: drop-shadow(0 0 0 rgba(250,204,21,0)); transform: scale(0.9); }
      28%  { opacity: 0; transform: scale(0.9); }                 /* stay dark a beat */
      34%  { opacity: 1; }                                        /* flick on */
      42%  { opacity: 0.25; }                                     /* flicker */
      50%  { opacity: 1; transform: scale(1.08); filter: drop-shadow(0 0 22px rgba(250,204,21,0.95)); }
      58%  { opacity: 0.55; }                                     /* second flicker */
      68%  { opacity: 1; }                                        /* settle on */
      100% { opacity: 1; filter: drop-shadow(0 0 18px rgba(250,204,21,0.9)); transform: scale(1); }
    }
    /* Issue symbol glows in the active candidate's party color when you switch views */
    .symbol-glow { animation: symbolGlow 0.85s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes symbolGlow {
      0%   { filter: drop-shadow(0 0 0 transparent); transform: scale(0.92); }
      55%  { transform: scale(1.05); }
      100% { filter: drop-shadow(0 0 13px var(--glow)); transform: scale(1); }
    }
    .patriot-pulse {
      animation: patriotPulse 2.8s ease-in-out infinite;
      border: 3px solid #3b82f6;
    }
    @keyframes patriotPulse {
      0%   { background: #dc2626; border-color: #3b82f6; box-shadow: 0 0 14px rgba(220,38,38,0.5); }
      50%  { background: #2563eb; border-color: #dc2626; box-shadow: 0 0 14px rgba(37,99,235,0.5); }
      100% { background: #dc2626; border-color: #3b82f6; box-shadow: 0 0 14px rgba(220,38,38,0.5); }
    }
    input[type="range"].importance-slider {
      touch-action: none;               /* let horizontal drag work on mobile instead of being treated as a scroll */
      -webkit-tap-highlight-color: transparent;
    }
    input[type="range"].importance-slider::-webkit-slider-runnable-track {
      background: transparent;
      height: 8px;
      border-radius: 9999px;
    }
    input[type="range"].importance-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--slider-color, #fff);
      margin-top: -7px;
      box-shadow: var(--slider-glow, 0 0 8px var(--slider-color, #fff)), 0 2px 6px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: box-shadow 0.15s ease;
    }
    input[type="range"].importance-slider::-moz-range-track {
      background: transparent;
      height: 8px;
      border-radius: 9999px;
    }
    input[type="range"].importance-slider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--slider-color, #fff);
      border: none;
      box-shadow: var(--slider-glow, 0 0 8px var(--slider-color, #fff)), 0 2px 6px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: box-shadow 0.15s ease;
    }
    @page { margin: 0.4in 0.4in 0.4in 0.4in; }

    /* Ballot picks — dense text columns (no photos), prints tight on white */
    .ballot-picks { column-count: 2; column-gap: 28px; }
    .ballot-pick-row { break-inside: avoid; -webkit-column-break-inside: avoid; page-break-inside: avoid; }
    /* Printable letter page — the desktop sheet the PDF is modeled on (WYSIWYG) */
    /* container-type: the ballot's responsive rules key off the SHEET's width (not the
       viewport) so the live page and the html2canvas PDF clone lay out identically —
       otherwise link positions and page breaks measured live don't match the capture. */
    .ballot-page { width: 816px; max-width: 100%; margin: 24px auto 40px; background: #fff; padding: 52px 60px 38px; box-shadow: 0 6px 28px rgba(0,0,0,0.12); container-type: inline-size; }
    .ballot-banner { width: 100%; max-width: 460px; height: auto; display: block; margin: 0 auto; }
    .ballot-date-tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .ballot-checklist { display: grid; grid-template-columns: 1.2fr 1fr; gap: 14px; }
    @container (max-width: 640px) {
      .ballot-date-tiles { grid-template-columns: repeat(2, 1fr); }
      .ballot-checklist { grid-template-columns: 1fr; }
      .ballot-locs { grid-template-columns: 1fr !important; }
      .ballot-title { font-size: 24px !important; }
      .ballot-subtitle { font-size: 12px !important; }
      .ballot-matching { font-size: 22px !important; }
      .ballot-grid { grid-template-columns: repeat(3, 1fr) !important; }
      .ballot-picks { column-count: 1 !important; }
      .ballot-dates { grid-template-columns: 1fr !important; }
    }
    .voteorg-svg svg { height: 30px; width: auto; display: block; }
    @media (max-width: 880px) { .ballot-page { padding: 24px 18px 28px; margin: 0 auto; box-shadow: none; } }
    /* Ballot mobile responsive rules live in the @container block above (keyed to sheet width, not viewport) */

    @media print {
      /* Hide everything except the ballot */
      .no-print { display: none !important; }
      header { display: none !important; }
      nav { display: none !important; }

      /* White background, black text */
      body, html { background: white !important; color: black !important; }
      * { box-shadow: none !important; animation: none !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

      /* Ballot layout */
      .min-h-screen { min-height: unset !important; }
      main { padding: 8px !important; max-width: 100% !important; }

      /* Section headers — light color bar, not full dark */
      [class*="bg-gradient"] { background: #1e293b !important; color: white !important; padding: 6px 10px !important; }
      [class*="bg-slate-9"] { background: white !important; color: black !important; }
      [class*="bg-slate-950"] { background: white !important; }

      /* Force letter-size layout regardless of screen/device width */
      html, body { width: 7.5in !important; min-width: 7.5in !important; font-size: 12px; }
      #root { width: 7.5in !important; }
      .ballot-grid { grid-template-columns: repeat(7, 1fr) !important; gap: 4px !important; }
      .ballot-picks { column-count: 3 !important; column-gap: 18px !important; }
      .ballot-page { width: 100% !important; padding: 0 !important; margin: 0 !important; box-shadow: none !important; }
      main { max-width: 100% !important; padding: 8px 12px !important; width: 100% !important; }

      /* Candidate cards */
      .grid { gap: 0 !important; }
      .grid > * { padding: 6px 4px !important; border: 1px solid #e2e8f0 !important; }

      /* Print footer — appears on every page */
      .ballot-print-footer { display: block !important; position: fixed; bottom: 0; left: 0; right: 0; text-align: center; font-size: 9px; color: #94a3b8; padding: 6px; border-top: 1px solid #e2e8f0; background: white; }

      /* Text colors */
      [class*="text-white"] { color: #111 !important; }
      [class*="text-slate-4"], [class*="text-slate-5"] { color: #666 !important; }
      [class*="text-emerald-4"] { color: #059669 !important; }
      [class*="text-amber-4"] { color: #d97706 !important; }
      [class*="text-rose-4"] { color: #dc2626 !important; }

      /* Compact photo size for print */
      .rounded-full { width: 48px !important; height: 48px !important; }

      /* Don't break individual candidate cards */
      .rounded-xl { break-inside: avoid; page-break-inside: avoid; }

      /* No printed background fills (save ink) — keep text/borders/pin/QR colors */
      .min-h-screen { background: #fff !important; }
      .ballot-loc-box { background: #fff !important; }

      /* Page setup */
      @page { margin: 0.5in; size: letter; }
    }
  </style>
</head>

    // ─── CHALLENGE ENCODE / DECODE ───
    // Encodes answers+ranks into a ~18-char URL-safe string
    // Format: for each of 9 POSITION_KEYS in order → choice (A/B/C/D/X) + rank (1-9, '0'=10, 'X'=unanswered)
    function encodeChallenge(answers, ranks) {
      return POSITION_KEYS.map(key => {
        const choice = answers[key];
        if (!choice) return 'XX';
        const rank = ranks[key] || 5;
        return choice + (rank === 10 ? '0' : String(rank));
      }).join('');
    }

    function decodeChallenge(str) {
      if (!str || str.length !== 18) return null;
      const answers = {}, ranks = {};
      POSITION_KEYS.forEach((key, i) => {
        const choice = str[i * 2];
        const rankChar = str[i * 2 + 1];
        if (choice !== 'X') {
          answers[key] = choice;
          ranks[key] = rankChar === '0' ? 10 : parseInt(rankChar) || 5;
        }
      });
      return { answers, ranks };
    }

    function buildChallengeUrl(answers, ranks) {
      const code = encodeChallenge(answers, ranks);
      const base = window.location.origin + window.location.pathname;
      return `${base}?c=${code}`;
    }

    async function fetchSheet(sheetId, tabName) {
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Could not load "${tabName}" tab — check the sheet is published to web (File → Share → Publish to web).`);
      const text = await res.text();
      // gviz exports extra empty trailing columns; a malformed empty-quote in the header makes PapaParse
      // merge the header with the first data row (silently dropping row 1 — e.g. the first Reproductive
      // Rights statement). Strip trailing empty quoted columns per line so the header parses cleanly.
      const clean = text.replace(/\r/g, '').split('\n').map(l => l.replace(/(,"")+\s*$/, '')).join('\n');
      const { data } = Papa.parse(clean, { header: true, skipEmptyLines: true });
      return data;
    }

        }
      }
      return null;
    }

      const answered = Object.keys(answers).filter(id => answers[id] !== 'D');
      if (answered.length === 0) return null;

      let weightedScore = 0;
      let weightedTotal = 0;

      answered.forEach(id => {
        const importance = (ranks && ranks[id]) ? ranks[id] : 5;
        const stmtData = checkedStatements && checkedStatements[id];
        // Normalize new Agree/Disagree/Unknown data to a lean letter via the issue's voice,
        // so match scoring works for both old (A/B/C) and new candidates.
        const voiceForId = ISSUE_VOICE[id] || 'LEFT';
        let candPos = candidate.positions[id];
        if (candPos === 'Agree') candPos = voiceForId === 'RIGHT' ? 'C' : 'A';
        else if (candPos === 'Disagree') candPos = voiceForId === 'RIGHT' ? 'A' : 'C';
        else if (candPos === 'Unknown') candPos = null;

        // Candidate has no position on this issue — exclude it from the match entirely
        // (don't count it against them, and a candidate with no positions scores null, not 0%).
        if (candPos === null || candPos === 'D') return;

        if (stmtData && stmtData.reactions) {
          // V2: reactions-based scoring
          const reactions = stmtData.reactions;
          const total = Object.keys(reactions).length;
          if (total === 0) return;
          const agrees = Object.values(reactions).filter(r => r === 'up').length;
          const disagrees = total - agrees;
          const voice = ISSUE_VOICE[id] || 'LEFT';

          // agreeRate for the A candidate, disagreeRate for the C candidate.
          // Divide by the statements actually voted on (total) — "No Opinion" statements
          // aren't in `reactions`, so they're excluded from the match (not counted against).
          const aRate = voice === 'LEFT' ? agrees / total : disagrees / total;
          const cRate = voice === 'RIGHT' ? agrees / total : disagrees / total;
          const voterRate = candPos === 'A' ? aRate : candPos === 'C' ? cRate : 0;

          weightedScore += voterRate * importance;
        } else {
          // V1 fallback: A/B/C
          const userChoice = answers[id];
          let match = 0;
          if (userChoice === candPos) match = 1;
          weightedScore += match * importance;
        }
        weightedTotal += importance;
      });

      if (weightedTotal === 0) return null;
      return Math.round((weightedScore / weightedTotal) * 100);
    }

    function deriveVoterPos(issueId, answers, checkedStatements) {
      const ans = answers?.[issueId];
      if (!ans || ans === 'D') return ans || null;
      if (ans !== 'S') return ans; // legacy A/B/C
      const stmtData = checkedStatements?.[issueId];
      if (!stmtData?.reactions) return null;
      const reactions = stmtData.reactions;
      const total = Object.keys(reactions).length;
      if (total === 0) return null;
      const agrees = Object.values(reactions).filter(r => r === 'up').length;
      const disagrees = total - agrees;
      const voice = ISSUE_VOICE[issueId] || 'LEFT';
      const aRate = voice === 'LEFT' ? agrees / total : disagrees / total;
      const cRate = voice === 'RIGHT' ? agrees / total : disagrees / total;
      if (aRate >= 0.67) return 'A';
      if (cRate >= 0.67) return 'C';
      return 'B';
    }

    function matchedIssues(candidate, answers, checkedStatements, issues) {
      return issues.map(issue => {
        const userChoice = deriveVoterPos(issue.id, answers, checkedStatements);
        return {
          ...issue,
          answered: issue.id in answers && answers[issue.id] !== 'D',
          matched: userChoice === candidate.positions[issue.id],
          partial: userChoice === 'B',
          userChoice,
          candidateChoice: candidate.positions[issue.id]
        };
      }).filter(i => i.answered);
    }

    function formatOfficeLines(office) {
      const clean = office.replace(/ of Texas$/i, '').replace(/ of the State of Texas$/i, '');
      const lines = [];
      let rest = clean;
      // "X County" goes on its own top line
      const county = rest.match(/^(.+? County)\s+(.+)$/);
      if (county) { lines.push(county[1]); rest = county[2]; }
      // Remaining parts split on the em/en-dash separator (office on its own line, Place/Precinct/seat on the last)
      rest.split(/\s*[—–]\s*/).forEach(p => {
        const t = p.trim().replace(/\bPl\b/gi, 'Place').replace(/\bPct\b/gi, 'Precinct');
        if (!t) return;
        // Pull a trailing "No. N" / "Place N" / "Precinct N" onto its own line so e.g.
        // "Court at Law No. 1" reads as office line + number line (county already split above).
        const tail = t.match(/^(.+?)[,\s]+((?:No\.?|Place|Precinct)\s*\d+)$/i);
        if (tail && tail[1].trim()) {
          lines.push(tail[1].trim());
          lines.push(tail[2].replace(/^No\.?\s*/i, 'No. '));
        } else {
          lines.push(t);
        }
      });
      return lines;
    }

              if (place.formatted_address && inputRef.current) {
                inputRef.current.value = place.formatted_address;
              }
            });
          } catch (e) { /* autocomplete unavailable — manual entry still works */ }
        }
        if (!window.google) {
          const script = document.createElement('script');
          script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_API_KEY}&libraries=places`;
          script.async = true; script.defer = true;
          script.onload = initAutocomplete;
          script.onerror = () => {};
          document.head.appendChild(script);
        } else { initAutocomplete(); }
      }, []);

      async function handleSearch(overrideAddr) {
        // Explore mode passes the real courthouse address explicitly while the field shows a "test address" label.
        // (onClick passes a click event here, so only honor a real string.)
        const addr = (typeof overrideAddr === 'string' ? overrideAddr : (exploreAddrRef.current || inputRef.current?.value?.trim())) || '';
        if (!addr) { setError('Please enter your street address.'); return; }
        if (addr.includes('@')) { setError('That looks like an email. Please enter your street address.'); return; }
        setIsSearching(true); setError(null);

        // STEP 1 — Geocode the address (its own try/catch so failures here say so honestly)
        let result;
        try {
          const GEOCODIO_KEY = '59cc9999fb36698b393c3f1c3861cab815fb35c';
          const res = await fetch(`https://api.geocod.io/v1.9/geocode?q=${encodeURIComponent(addr)}&fields=cd120,stateleg&api_key=${GEOCODIO_KEY}`);
          if (!res.ok) {
            let detail = '';
            try { const e = await res.json(); detail = e.error || ''; } catch(_) {}
            console.error('[VYV] Geocodio HTTP', res.status, detail);
            if (res.status === 422) { setError('That address could not be found. Please include street, city, and ZIP.'); }
            else if (res.status === 403) { setError('Address lookup is temporarily over its limit. Please try again shortly.'); }
            else { setError(`Address lookup failed (error ${res.status}). Please try again.`); }
            setIsSearching(false); return;
          }
          const data = await res.json();
          result = data.results && data.results[0];
          if (!result) { setError('Address not found. Try the full address with city and state.'); setIsSearching(false); return; }
        } catch (err) {
          console.error('[VYV] Geocodio fetch threw:', err);
          setError('Could not reach the address lookup service. Check your connection and try again.');
          setIsSearching(false); return;
        }

        // STEP 2 — County match + district extraction (cannot fail the lookup; defaults are safe)
        const components = result.address_components || {};
        // Geocodio fuzzy-matches garbage (e.g. an email) to a random place with no street number — don't claim "not available in <county>" for that.
        if (!components.number) {
          setError("That doesn't look like a complete street address. Please include your street number, city, and ZIP.");
          setIsSearching(false); return;
        }
        const detectedCounty2 = (components.county || '').toLowerCase().replace(' county', '').trim();
        const matchedCounty2 = ['hays', 'travis'].find(k => detectedCounty2.includes(k));
        if (!matchedCounty2) {
          setOutOfArea(components.county || 'your area');
          setIsSearching(false); return;
        }
        const fields = result.fields || {};
        const loc = result.location || {};
        const cd = fields.congressional_districts && fields.congressional_districts[0];
        const stateLeg = fields.state_legislative_districts || {};
        const senate = stateLeg.senate && stateLeg.senate[0];
        const house = stateLeg.house && stateLeg.house[0];

        // STEP 3 — Optional precinct lookup (Hays only). Never blocks the result.
        let commPrecinct = null, jpPrecinct = null;
        try {
          if (matchedCounty2 === 'hays' && loc.lng != null && loc.lat != null) {
            const [commData, jpData] = await withTimeout(Promise.all([
              fetch(`https://services5.arcgis.com/bVphnK8rPe5MHUSr/arcgis/rest/services/HaysCountyCommissionerPrecincts/FeatureServer/0/query?geometry=${loc.lng},${loc.lat}&geometryType=esriGeometryPoint&inSR=4326&spatialRel=esriSpatialRelIntersects&outFields=CommPrcnt&f=json`).then(r=>r.json()).catch(()=>null),
              fetch(`https://services5.arcgis.com/bVphnK8rPe5MHUSr/arcgis/rest/services/HaysCoJusticeOfPeace/FeatureServer/0/query?geometry=${loc.lng},${loc.lat}&geometryType=esriGeometryPoint&inSR=4326&spatialRel=esriSpatialRelIntersects&outFields=PRECINCT&f=json`).then(r=>r.json()).catch(()=>null)
            ]), 6000, [null, null]);
            if (commData?.features?.[0]?.attributes?.CommPrcnt != null) commPrecinct = String(commData.features[0].attributes.CommPrcnt);
            if (jpData?.features?.[0]?.attributes?.PRECINCT != null) jpPrecinct = String(jpData.features[0].attributes.PRECINCT);
          } else if (matchedCounty2 === 'travis' && loc.lng != null && loc.lat != null) {
            const [commData, jpData] = await withTimeout(Promise.all([
              fetch(`https://gis.traviscountytx.gov/server1/rest/services/Boundaries_and_Jurisdictions/Travis_County_Commissioner_Precincts/FeatureServer/0/query?geometry=${loc.lng},${loc.lat}&geometryType=esriGeometryPoint&inSR=4326&spatialRel=esriSpatialRelIntersects&outFields=PRECINCT&returnGeometry=false&f=json`).then(r=>r.json()).catch(()=>null),
              fetch(`https://gis.traviscountytx.gov/server1/rest/services/Boundaries_and_Jurisdictions/Travis_County_Judge_and_Constable_Precincts/MapServer/0/query?geometry=${loc.lng},${loc.lat}&geometryType=esriGeometryPoint&inSR=4326&spatialRel=esriSpatialRelIntersects&outFields=PRECINCT&returnGeometry=false&f=json`).then(r=>r.json()).catch(()=>null)
            ]), 6000, [null, null]);
            if (commData?.features?.[0]?.attributes?.PRECINCT != null) commPrecinct = String(commData.features[0].attributes.PRECINCT);
            if (jpData?.features?.[0]?.attributes?.PRECINCT != null) jpPrecinct = String(jpData.features[0].attributes.PRECINCT);
          }
        } catch(e) { console.warn('[VYV] precinct lookup skipped:', e); }

        // STEP 4 — Hand off to results. Done.
        if (onCountyDetected) onCountyDetected(matchedCounty2);
        onContinue({
          congressionalDistrict: cd ? String(cd.district_number) : null,
          stateSenate: senate ? String(senate.district_number) : null,
          stateHouse: house ? String(house.district_number) : null,
          commissionerPrecinct: commPrecinct,
          jpPrecinct: jpPrecinct
        });
        setIsSearching(false);
      }

      const DistrictRow = ({ label, value }) => value ? (
        <div className="flex justify-between items-center py-2 border-b border-slate-700 last:border-0">

        </div>
      ) : null;

      return (

            <div className="relative px-6 pt-5 pb-2">
              <button onClick={outOfArea ? resetToMain : onClose}

                style={{background:'rgba(255,255,255,0.15)', border:'1px solid rgba(255,255,255,0.3)'}}>✕</button>
              {outOfArea ? (
                <div className="flex flex-col items-center text-center pt-1">

                  <h2 className="text-white font-black text-2xl sm:text-3xl leading-tight">
                    Not available in<br/>

                  </h2>
                </div>
              ) : (
                <div className="flex flex-col items-center text-center pt-1">
                  <img src="icons/VoteYourViews_Logo_White.png" alt="VoteYourViews.org" className="mb-4" style={{height:'70px', width:'auto'}} />
                  <h2 className="text-white font-black text-3xl leading-tight">
                    See who's on<br/><span style={{color: '#fcd34d'}}>YOUR</span> ballot.
                  </h2>
                  <p className="text-slate-200 text-base mt-2 leading-snug">Enter your address — we'll show you<br/>only the candidates you can vote for.</p>
                </div>
              )}
            </div>

            <div className="px-6 py-4">
              {outOfArea ? (
                  /* Wrong County Modal — address resolved to a county we don't cover yet */
                  <>
                    <p className="text-slate-200 text-base leading-relaxed text-center mb-4">
                      If you want to know when <strong className="text-white">{outOfArea}</strong> is available… 👇
                    </p>
                    <input
                      key="signup-email"
                      type="email"
                      value={signupEmail}
                      onChange={e => { setSignupEmail(e.target.value); if (signupStatus === 'invalid') setSignupStatus(null); }}
                      placeholder="Enter your email address"
                      className="w-full px-4 py-3.5 rounded-xl text-base focus:outline-none border-2 mb-4 transition-colors"
                      style={{background:'#f8fafc', color:'#0f172a', borderColor: signupStatus === 'invalid' ? '#f87171' : 'transparent', boxShadow:'inset 0 1px 3px rgba(0,0,0,0.15)'}}
                      onFocus={e => { if (signupStatus !== 'invalid') e.currentTarget.style.borderColor = btnColor; }}
                      onBlur={e => { if (signupStatus !== 'invalid') e.currentTarget.style.borderColor = 'transparent'; }}
                      onKeyDown={e => e.key === 'Enter' && handleNotify()}
                    />
                    {signupStatus === 'invalid' && <p className="text-sm text-red-400 mb-2">Please enter a valid email address.</p>}
                    <button onClick={handleNotify} disabled={signupStatus === 'sending' || signupStatus === 'sent'}
                      className="w-full py-3.5 font-black rounded-full text-base mb-2 transition-all uppercase tracking-widest hover:brightness-110 active:scale-[0.98]"
                      style={signupStatus === 'sent'
                        ? {background:'linear-gradient(90deg,#059669,#10b981)', color:'#fff', letterSpacing:'0.12em'}

                      {signupStatus === 'sent' ? "✓ You're on the list!" : signupStatus === 'sending' ? 'Adding you…' : 'Keep Me Posted →'}
                    </button>
                    <p className="text-xs text-slate-500 text-center mb-1">We'll only email you about this guide. No spam, ever.</p>
                    <button onClick={resetToMain}
                      className="w-full py-2 text-slate-400 hover:text-white text-sm font-medium transition-colors">
                      ← Try a different address
                    </button>
                  </>
              ) : !districts ? (
                <>
                  <input

                    style={{background:'#f8fafc', color:'#0f172a', borderColor:'transparent', boxShadow:'inset 0 1px 3px rgba(0,0,0,0.15)'}}
                    onFocus={e => e.currentTarget.style.borderColor = btnColor}

                    onKeyDown={e => e.key === 'Enter' && handleSearch()}
                  />
                  {error && <p className="text-sm text-red-400 mb-2">{error}</p>}
                  <button onClick={handleSearch} disabled={isSearching}
                    className="w-full py-3.5 text-white font-black rounded-full text-base mb-2 transition-all disabled:opacity-50 uppercase tracking-widest hover:brightness-110 active:scale-[0.98]"

                    {isSearching ? 'Looking up your address…' : 'Find My Candidates →'}
                  </button>
                  <p className="text-xs text-slate-500 text-center mt-3 mb-3">Your address is only used to look up your districts. We don't store it.</p>
                  {exploreChoices}
                </>
              ) : (
                <>
                  <div className="rounded-xl border border-slate-700 px-4 py-1 mb-4" style={{background:'rgba(255,255,255,0.04)'}}>
                    <DistrictRow label="U.S. House" value={districts.congressionalDistrict} />

                    <DistrictRow label="TX State House" value={districts.stateHouse} />

                    {districts.jpPrecinct && <DistrictRow label="Justice of Peace" value={districts.jpPrecinct} />}
                  </div>
                  <button onClick={() => onContinue(districts)}

                    className="w-full py-2 text-slate-500 hover:text-slate-300 text-sm font-medium transition-colors">
                    Search a different address
                  </button>
                </>
              )}
            </div>

            {/* Beta disclaimer — footer */}
            <div className="flex items-center justify-center gap-2.5 px-5 py-3 mt-2" style={{background:'rgba(255,255,255,0.03)', borderTop:'1px solid rgba(255,255,255,0.08)'}}>
              <span className="text-sm leading-none" role="img" aria-label="yield">⚠️</span>
              <p className="text-slate-400 text-xs leading-snug"><span className="text-amber-300/90 font-black uppercase tracking-[0.14em]">Beta</span> · Hays &amp; Travis Counties now · more coming soon</p>
            </div>
          </div>
        </div>
      );
    }

                      {answers[issue.id] && answers[issue.id] !== 'D' && (() => {

                    style={{letterSpacing:'0.12em', background:'#b91c1c', border:'1px solid #ef4444'}}>
                    Compare Candidates
                  </button>
                  <div className="shrink-0 w-11 h-11" />

              )}

          </main>

          {/* Footer */}

            {/* DataSourceBadge hidden — clutters UI */}
            {false && <div><DataSourceBadge dataSource={dataSource} counties={counties} /></div>}

          {showBrowseModal && (
            <AddressModal
              county={county || 'hays'}
              accentColor="#3b82f6"
              onClose={() => setShowBrowseModal(false)}
              onContinue={(districts) => { setShowBrowseModal(false); onBrowse(districts); }}
              onShowAll={() => { setShowBrowseModal(false); onBrowse(); }}
            />
          )}
        </div>
      );
    }

    // ─── ISSUE STATEMENTS (hardcoded, wired to sheet later) ───
    let ISSUE_STATEMENTS = {
      'Reproductive Rights': [

      'Election Integrity': [

      ],
      'Social Security & Medicare': [

        "No senior in Texas should have to choose between buying groceries and buying their medication.",
      ],
      'Housing & Affordability': [
        "When a teacher, a nurse, or a firefighter can't afford to live in the community they serve, something is broken.",
        "Texas home prices rose over 50% in three years — and wages didn't. That's not a market working, that's a crisis.",
        "Corporate landlords buying up Texas homes and turning them into rentals is making it impossible for working families to ever own a home.",
        "A family that has lived in their Texas community for generations should not be priced out of it by out-of-state investors.",
      ],
    };

    // ─── QUIZ ───
    function Quiz({ onSave, onBack, onStartOver, onHome, onSavePartial, issue, initialAnswer = null, initialRank = null, initialReactions = null, answers = {}, onSummary }) {
      // reactions[i] = 'up' | 'down' | undefined
      const [reactions, setReactions] = useState(() => initialReactions || {});
      const [rank, setRank] = useState(initialRank ?? 5);
      const [showContext, setShowContext] = useState(false);
      const statements0 = (ISSUE_STATEMENTS[(issue || {}).topic] || []).slice(0, 3);
      const [cardIndex, setCardIndex] = useState(() => (initialReactions && Object.keys(initialReactions).length > 0) ? statements0.length : 0);
      const [flash, setFlash] = useState(null); // 'up' | 'down' | null
      const [skippedSet, setSkippedSet] = useState({});

      useEffect(() => { window.scrollTo(0, 0); }, []);

      if (!issue) return null;

      const statements = (ISSUE_STATEMENTS[issue.topic] || []).slice(0, 3);
      const ACCENT = '#f59e0b';
      const anyReacted = Object.keys(reactions).length > 0;

      const allDone = cardIndex >= statements.length;

      function react(dir) {
        const i = cardIndex;
        setFlash(dir);
        setTimeout(() => {
          setFlash(null);
          setReactions(prev => ({ ...prev, [i]: dir }));
          setSkippedSet(prev => { const n = {...prev}; delete n[i]; return n; });
          setCardIndex(i + 1);
        }, 320);
      }

      function skipCard() {
        // Clear any prior Agree/Disagree so changing an answer to "No Opinion" actually sticks
        setReactions(prev => { const n = {...prev}; delete n[cardIndex]; return n; });
        setSkippedSet(prev => ({ ...prev, [cardIndex]: true }));
        if (cardIndex + 1 >= statements.length && !anyReacted) {
          handleSkip();
        } else {
          setCardIndex(cardIndex + 1);
        }
      }

      function handleSkip() {
        onSave('D', 3);
      }

      function handleSave() {
        if (!anyReacted) { onSave(null, null, null); return; }
        const ups = Object.values(reactions).filter(r => r === 'up').length;
        const score = ups / statements.length;
        onSave('S', rank || 5, { reactions, score });
      }

      return (
        <div className="min-h-screen flex flex-col" style={{background:'linear-gradient(160deg,#1e1b4b 0%,#0f172a 60%,#0c1a2e 100%)'}}>
          {/* Top nav */}
          <div className="border-b border-white/10 px-4 py-3 lg:py-4">
            <div className="max-w-3xl mx-auto px-4 lg:px-8 flex items-center justify-between">
              <button onClick={() => {
                if (onSavePartial && anyReacted) {
                  const ups = Object.values(reactions).filter(r => r === 'up').length;
                  const score = ups / statements.length;
                  onSavePartial('S', rank || (allDone ? 5 : null), { reactions, score });
                }
                onBack();
              }} className="text-sm text-white font-black hover:opacity-80 uppercase tracking-widest shrink-0" style={{letterSpacing:'0.08em'}}>
                ← Back
              </button>
              <button onClick={() => {
                if (onSavePartial && anyReacted) {
                  const ups = Object.values(reactions).filter(r => r === 'up').length;
                  const score = ups / statements.length;
                  onSavePartial(allDone ? 'S' : 'S', rank || (allDone ? 5 : null), { reactions, score });
                }
                (onHome || onStartOver)();
              }} className="w-8 h-8 flex items-center justify-center rounded-full hover:opacity-80 transition-all" style={{background:'rgba(255,255,255,0.1)'}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
                  <path d="M9 21V12h6v9"/>
                </svg>
              </button>
              <button onClick={handleSave}
                className="text-sm font-black uppercase tracking-widest shrink-0 transition-all"
                style={{letterSpacing:'0.08em', color: '#fff'}}>
                Next →
              </button>
            </div>
          </div>

          {/* Context modal */}
          {showContext && (
            <div className="fixed inset-0 z-50 flex items-center justify-center px-4" style={{background:'rgba(0,0,0,0.75)'}}>
              <div className="w-full max-w-lg rounded-2xl p-6" style={{background:'linear-gradient(160deg,#1e1b4b,#0f172a)', border:'1px solid rgba(255,255,255,0.2)'}}>
                <div className="flex items-center gap-3 mb-4">
                  <div className="w-10 h-10 rounded-xl flex items-center justify-center overflow-hidden shrink-0" style={{background:'rgba(255,255,255,0.1)'}}>
                    <img src={`/icons/Symbols/${issue.symbol}.png`} alt={issue.topic} style={{width:'80%',height:'80%',objectFit:'contain'}} onError={e=>{e.target.style.display='none'}}/>
                  </div>
                  <p className="text-white font-black text-base uppercase tracking-wide">{issue.topic}</p>
                </div>
                <p className="text-slate-200 text-[15px] leading-relaxed mb-6">{issue.issueFact}</p>
                <button onClick={() => setShowContext(false)}
                  className="block w-fit mx-auto px-10 py-2.5 rounded-lg font-black text-sm uppercase tracking-wide text-white transition-all hover:opacity-80"
                  style={{background:'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.2)', letterSpacing:'0.05em'}}>
                  Got it
                </button>
              </div>
            </div>
          )}

          {/* Flash overlay */}
          {flash && (
            <div className="fixed inset-0 z-40 pointer-events-none transition-opacity"
              style={{background: flash === 'up' ? 'rgba(34,197,94,0.18)' : 'rgba(239,68,68,0.18)'}} />
          )}

          {/* Card area */}
          <div key={issue.id} className="flex-1 flex flex-col items-center justify-start max-w-lg lg:max-w-3xl mx-auto w-full px-4 py-4 issue-enter">

            {!allDone ? (
              <>
                {/* Issue header — icon + title */}
                <div className="w-full flex items-center gap-4 px-1 py-3">
                  <img src={`/icons/Symbols/${issue.symbol}.png`} alt={issue.topic}
                    style={{width:'70px', height:'70px', objectFit:'contain', flexShrink:0}}
                    onError={e => { e.target.style.display='none'; }} />
                  <div className="flex-1">
                    <p className="text-[10px] font-black uppercase tracking-[0.2em] mb-0.5" style={{color:'rgba(255,255,255,0.4)'}}>Views on</p>
                    <div className="flex items-center gap-3 flex-wrap">
                      <p className="text-white font-black uppercase leading-tight text-[20px] lg:text-[26px]" style={{fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:'0.04em'}}>{issue.topic}</p>
                      {issue.issueFact && (
                        <button onClick={() => setShowContext(true)}
                          className="text-[10px] font-black uppercase tracking-wide transition-all hover:brightness-125 active:scale-95 px-2.5 py-1 rounded-lg shrink-0"
                          style={{background:'rgba(217,119,6,0.2)', color:'#f59e0b', border:'1px solid rgba(217,119,6,0.5)', letterSpacing:'0.04em'}}>
                          ★ Get the Facts
                        </button>
                      )}
                    </div>
                  </div>
                </div>

                {/* Accordion statements */}
                <div className="w-full flex flex-col gap-2 py-2">
                  {statements.map((stmt, i) => {
                    const r = reactions[i];
                    const isOpen = i === cardIndex;
                    const isDone = r !== undefined;
                    const wasSkipped = !isDone && skippedSet[i];
                    const isAnswered = !isOpen && (isDone || wasSkipped);
                    return (
                      <div key={i} onClick={() => !isOpen && setCardIndex(i)}
                        className="w-full rounded-2xl overflow-hidden transition-all duration-300"
                        style={{
                          border: isOpen ? '1.5px solid rgba(255,255,255,0.25)' : wasSkipped ? '1.5px solid rgba(255,255,255,0.15)' : '1.5px solid rgba(255,255,255,0.08)',
                          background: isOpen ? 'linear-gradient(160deg,rgba(99,102,241,0.2),rgba(255,255,255,0.06))' : wasSkipped ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.03)',
                          cursor: isOpen ? 'default' : 'pointer',
                        }}>
                        {/* Row header — always visible */}
                        <div className={`flex items-center gap-3 px-4 py-2.5 ${isOpen ? 'lg:px-12 lg:pt-4 lg:pb-0' : 'lg:px-12'} ${!isOpen ? 'justify-center' : ''}`}>
                          <div className="w-6 h-6 lg:w-8 lg:h-8 rounded-full flex items-center justify-center shrink-0 text-xs lg:text-sm font-black"
                            style={{
                              background: r === 'up' ? '#22c55e' : r === 'down' ? '#ef4444' : wasSkipped ? 'rgba(255,255,255,0.12)' : isOpen ? 'rgba(245,158,11,0.3)' : 'rgba(255,255,255,0.1)',
                              color: isDone ? '#fff' : wasSkipped ? 'rgba(255,255,255,0.5)' : isOpen ? '#f59e0b' : 'rgba(255,255,255,0.4)',
                              border: isOpen && !isDone ? '1.5px solid #f59e0b' : 'none',
                            }}>
                            {r === 'up' ? '✓' : r === 'down' ? '✕' : wasSkipped ? '–' : i + 1}
                          </div>
                          <p className="text-xs lg:text-sm font-bold uppercase tracking-widest"
                            style={{color: isOpen ? 'rgba(255,255,255,0.5)' : isDone ? 'rgba(255,255,255,0.35)' : wasSkipped ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.25)'}}>
                            {isOpen ? `Statement ${i + 1}` : isDone ? (r === 'up' ? 'Agreed' : 'Disagreed') : wasSkipped ? 'No Opinion' : `Statement ${i + 1}`}
                          </p>
                          {/* Mobile: per-statement No Opinion — top-right of the open card */}
                          {isOpen && (
                            <button onClick={(e) => { e.stopPropagation(); skipCard(); }}
                              className="ml-auto lg:hidden flex items-center gap-1 text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full transition-all active:scale-95"
                              style={{color: skippedSet[cardIndex] ? '#fff' : 'rgba(255,255,255,0.55)', border: skippedSet[cardIndex] ? '1px solid rgba(255,255,255,0.9)' : '1px solid rgba(255,255,255,0.2)', letterSpacing:'0.06em'}}>
                              No Opinion
                            </button>
                          )}
                        </div>

                        {/* Expanded content */}
                        {isOpen && (
                          <div key={cardIndex} className="px-4 pb-4 slide-in lg:flex lg:items-start lg:gap-10 lg:px-12 lg:pt-2 lg:pb-6 lg:pr-12">
                            <div className="lg:flex-1">
                              <p className="text-white font-medium leading-snug text-[16px] lg:text-[20px] mb-4 lg:mb-0">
                                "{stmt.split(/\b([A-Z]{2,})\b/).map((part, pi) =>
                                  /^[A-Z]{2,}$/.test(part) ? <strong key={pi}>{part}</strong> : part
                                )}"
                              </p>
                              {cardIndex > 0 && (
                                <button onClick={() => setCardIndex(cardIndex - 1)}
                                  className="mt-2 text-xs font-black uppercase tracking-widest hover:opacity-80 transition-all hidden lg:block"
                                  style={{color:'rgba(255,255,255,0.4)'}}>
                                  ← Change previous answer
                                </button>
                              )}
                            </div>
                            {/* Mobile: change previous answer above buttons */}
                            {cardIndex > 0 && (
                              <button onClick={() => setCardIndex(cardIndex - 1)}
                                className="mb-3 text-xs font-black uppercase tracking-widest hover:opacity-80 transition-all lg:hidden"
                                style={{color:'rgba(255,255,255,0.4)'}}>
                                ← Change previous answer
                              </button>
                            )}
                            {/* Mobile buttons */}
                            <div className="flex gap-2 justify-center lg:hidden">
                              <button onClick={() => react('up')} className="flex items-center justify-center gap-1.5 rounded-xl font-black text-xs uppercase tracking-widest text-white transition-all hover:brightness-125 active:scale-95" style={{width:'42.5%', height:'38px', background:'#16a34a', border:'1px solid #4ade80', opacity: 1, boxShadow: r === 'up' ? '0 0 0 3px rgba(255,255,255,0.95)' : 'none', letterSpacing:'0.1em'}}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)"><path d="M2 20h2c.55 0 1-.45 1-1v-9c0-.55-.45-1-1-1H2v11zm19.83-7.12c.11-.25.17-.52.17-.88v-2c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L13.17 2 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-1.91l-.01-.01.84.61z"/></svg>
                                Agree
                              </button>
                              <button onClick={() => react('down')} className="flex items-center justify-center gap-1.5 rounded-xl font-black text-xs uppercase tracking-widest text-white transition-all hover:brightness-125 active:scale-95" style={{width:'42.5%', height:'38px', background:'#b91c1c', border:'1px solid #ef4444', opacity: 1, boxShadow: r === 'down' ? '0 0 0 3px rgba(255,255,255,0.95)' : 'none', letterSpacing:'0.1em'}}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)"><path d="M22 4h-2c-.55 0-1 .45-1 1v9c0 .55.45 1 1 1h2V4zM2.17 11.12c-.11.25-.17.52-.17.88v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L10.83 22l5.59-5.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2H6c-.83 0-1.54.5-1.84 1.22L1.14 13.27c-.09.23-.14.47-.14.73v1.91l.01.01-.84-.6z"/></svg>
                                Disagree
                              </button>
                            </div>
                            {/* Desktop buttons */}
                            <div className="hidden lg:flex flex-col gap-2 shrink-0 items-center">
                              <button onClick={() => react('up')} className="flex items-center justify-center gap-1.5 rounded-xl font-black text-xs uppercase tracking-widest text-white transition-all hover:brightness-125 active:scale-95" style={{width:'148px', height:'38px', background:'#16a34a', border:'1px solid #4ade80', opacity: 1, boxShadow: r === 'up' ? '0 0 0 3px rgba(255,255,255,0.95)' : 'none', letterSpacing:'0.1em'}}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)"><path d="M2 20h2c.55 0 1-.45 1-1v-9c0-.55-.45-1-1-1H2v11zm19.83-7.12c.11-.25.17-.52.17-.88v-2c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L13.17 2 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-1.91l-.01-.01.84.61z"/></svg>
                                Agree
                              </button>
                              <button onClick={() => react('down')} className="flex items-center justify-center gap-1.5 rounded-xl font-black text-xs uppercase tracking-widest text-white transition-all hover:brightness-125 active:scale-95" style={{width:'148px', height:'38px', background:'#b91c1c', border:'1px solid #ef4444', opacity: 1, boxShadow: r === 'down' ? '0 0 0 3px rgba(255,255,255,0.95)' : 'none', letterSpacing:'0.1em'}}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)"><path d="M22 4h-2c-.55 0-1 .45-1 1v9c0 .55.45 1 1 1h2V4zM2.17 11.12c-.11.25-.17.52-.17.88v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L10.83 22l5.59-5.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2H6c-.83 0-1.54.5-1.84 1.22L1.14 13.27c-.09.23-.14.47-.14.73v1.91l.01.01-.84-.6z"/></svg>
                                Disagree
                              </button>
                              <button onClick={skipCard}
                                className="mt-1 text-[11px] font-black uppercase tracking-widest transition-all active:scale-95 px-4 py-1.5 rounded-xl hover:border-white hover:text-white"
                                style={{color: skippedSet[cardIndex] ? '#fff' : 'rgba(255,255,255,0.5)', border: skippedSet[cardIndex] ? '1px solid rgba(255,255,255,0.9)' : '1px solid rgba(255,255,255,0.2)', boxShadow: skippedSet[cardIndex] ? '0 0 0 1px rgba(255,255,255,0.4)' : 'none', letterSpacing:'0.08em'}}>
                                No Opinion
                              </button>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* Build My Ballot shortcut */}
                {Object.keys(answers).length > 0 && onSummary && (
                  <button onClick={onSummary} className={`mt-2 ${BTN.std}`} style={BTN_STYLE.blue}>
                    Build My Ballot ({Object.keys(answers).length}/9) →
                  </button>
                )}

                {/* Skip entire issue */}
                <button onClick={handleSkip} className={`mt-2 mb-4 ${BTN.std}`} style={BTN_STYLE.slate}>
                  Skip This Issue
                </button>
              </>
            ) : (
              /* All done — show slider + next */
              <div className="w-full max-w-xl mx-auto flex flex-col gap-3 py-2 fade-in">
                {/* Issue header */}
                <div className="w-full flex items-center gap-4 px-1 pb-1">
                  <img src={`/icons/Symbols/${issue.symbol}.png`} alt={issue.topic}
                    style={{width:'56px', height:'56px', objectFit:'contain', flexShrink:0}}
                    onError={e => { e.target.style.display='none'; }} />
                  <div className="flex-1">
                    <p className="text-[10px] font-black uppercase tracking-[0.2em] mb-0.5" style={{color:'rgba(255,255,255,0.4)'}}>Views on</p>
                    <p className="text-white font-black uppercase leading-tight text-[20px]" style={{fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:'0.04em'}}>{issue.topic}</p>
                  </div>
                </div>
                {/* Compact clickable statement rows */}
                <div className="flex flex-col gap-1 mb-1">
                  {statements.map((stmt, i) => {
                    const r = reactions[i];
                    const skipped = !r;
                    return (
                      <button key={i} onClick={() => setCardIndex(i)}
                        className="flex items-center gap-3 px-3 py-2.5 rounded-xl text-left transition-all hover:brightness-110 active:scale-[0.99]"
                        style={{background: skipped ? 'rgba(255,255,255,0.04)' : r === 'up' ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)'}}>
                        {skipped
                          ? <span style={{width:'20px', height:'20px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'14px', flexShrink:0}}>⏭</span>
                          : <img src={r === 'up' ? '/icons/thumbs_up.png' : '/icons/thumbs_down.png'} alt={r === 'up' ? 'Agree' : 'Disagree'} style={{width:'20px', height:'20px', objectFit:'contain', flexShrink:0}} />
                        }
                        <span className="text-[13px] font-semibold" style={{color:'rgba(255,255,255,0.5)'}}>Statement {i+1}</span>
                        <span className="text-[11px] font-black uppercase tracking-widest ml-auto">
                          {skipped
                            ? <><span style={{color:'rgba(255,255,255,0.25)'}}>Skipped</span><span style={{color:'rgba(255,255,255,0.55)'}}> · answer</span></>

                            : <><span style={{color: r === 'up' ? '#22c55e' : '#ef4444'}}>{r === 'up' ? 'Agreed' : 'Disagreed'}</span><span style={{color:'#d97706'}}> · change</span></>
                          }
                        </span>
                      </button>
                    );
                  })}
                </div>

                {/* Slider */}
                <div className="p-4 rounded-2xl" style={{border:`2px solid ${ACCENT}`, background:`linear-gradient(160deg,${ACCENT}0e,${ACCENT}04)`}}>
                  <div className="flex items-center justify-between mb-3">
                    <p className="text-[14px] font-black text-slate-300 uppercase tracking-wider leading-tight">How important is this issue<br/>to your vote?</p>
                    <span className="text-sm font-black shrink-0 ml-2" style={{color: rank ? ACCENT : 'rgba(255,255,255,0.2)', minWidth:'36px', textAlign:'right'}}>{rank ? `${rank}/10` : '–'}</span>
                  </div>
                  <div className="relative py-2">
                    <div className="absolute inset-y-0 flex items-center w-full pointer-events-none">
                      <div className="w-full rounded-full" style={{height:'8px', background: rank ? `linear-gradient(to right,${ACCENT}22 0%,${ACCENT} ${(rank-1)/9*100}%,rgba(255,255,255,0.12) ${(rank-1)/9*100}%,rgba(255,255,255,0.12) 100%)` : 'rgba(255,255,255,0.12)'}}/>
                    </div>
                    <input type="range" min="1" max="10" step="1"
                      value={rank || 5}
                      onChange={e => setRank(Number(e.target.value))}
                      className="relative w-full appearance-none cursor-pointer importance-slider"
                      style={{'--slider-color':ACCENT,'--slider-glow':rank?`0 0 ${4+(rank-1)*3}px ${2+(rank-1)*2}px ${ACCENT}`:'none',outline:'none',border:'none',background:'transparent',zIndex:1}}
                    />
                  </div>
                  <div className="flex justify-between mt-2">
                    <span className="text-[10px] font-bold text-slate-300">Less important</span>
                    <span className="text-[10px] font-bold text-slate-300">Most important</span>
                  </div>
                </div>

                {rank && (
                  <button onClick={handleSave} className={BTN.std} style={BTN_STYLE.amber}>
                    Submit
                  </button>
                )}

                {Object.keys(answers).length > 0 && onSummary && (
                  <button onClick={onSummary} className={BTN.std} style={BTN_STYLE.blue}>
                    Build My Ballot ({Object.keys(answers).length}/9) →
                  </button>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── SUMMARY ───
    function Summary({ issues, answers, ranks, onMatchAll, onMatchMine, onCompareMine, onViewConstellation, onAnswerMore, onHome, onStartOver, onBallot, county }) {
      const [showChallenge, setShowChallenge] = React.useState(false);
      const [showAddressModal, setShowAddressModal] = React.useState(false);
      const [ballotMode, setBallotMode] = React.useState(false);
      const [compareMode, setCompareMode] = React.useState(false);
      const [copied, setCopied] = React.useState(false);
      const [showDrop, setShowDrop] = React.useState(false);

      function handleCopy() {
        const url = buildChallengeUrl(answers, ranks);
        navigator.clipboard.writeText(url).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      }

      function handleEmail() {
        const url = buildChallengeUrl(answers, ranks);
        const subject = encodeURIComponent("I challenged you on VoteYourViews.org");
        const body = encodeURIComponent(`I just ranked my beliefs on VoteYourViews.org — a nonpartisan Texas voter guide.\n\nTake the quiz and see how your views compare to mine:\n${url}\n\nIt only takes a few minutes!`);
        window.open(`mailto:?subject=${subject}&body=${body}`);
      }

      function handleText() {
        const url = buildChallengeUrl(answers, ranks);
        const msg = encodeURIComponent(`I challenged you on VoteYourViews.org — take the quiz and see how your views compare to mine: ${url}`);
        window.open(`sms:?&body=${msg}`);
      }
      const VIEW_LABEL  = { A: 'Liberal', B: 'Moderate', C: 'Conservative', D: 'No Opinion' };
      const VIEW_COLOR  = { A: '#3b82f6', B: '#a855f7', C: '#ef4444', D: '#64748b' };
      const VIEW_BG     = { A: 'rgba(59,130,246,0.22)', B: 'rgba(168,85,247,0.22)', C: 'rgba(239,68,68,0.22)', D: 'rgba(100,116,139,0.15)' };
      const VIEW_BG_TOP = { A: 'rgba(59,130,246,0.38)', B: 'rgba(168,85,247,0.38)', C: 'rgba(239,68,68,0.38)', D: 'rgba(100,116,139,0.22)' };

      const answeredIssues   = issues.filter(i => answers[i.id]);
      const unansweredIssues = issues.filter(i => !answers[i.id]);
      const answeredCount    = answeredIssues.length;
      const canConstellation = answeredCount >= 3;

      // Sort answered by rank descending (most important first), then unanswered at end
      const sortedAnswered = [...answeredIssues].sort((a,b) => (ranks[b.id]||5) - (ranks[a.id]||5));
      const allIssuesOrdered = [...sortedAnswered, ...unansweredIssues];
      // Only show #1 badge if the top issue has a strictly higher rank than the second
      const topRank = sortedAnswered[0] ? (ranks[sortedAnswered[0].id]||5) : 0;
      const secondRank = sortedAnswered[1] ? (ranks[sortedAnswered[1].id]||5) : 0;
      const hasUniqueTop = sortedAnswered.length > 0;
      const topRankValue = sortedAnswered[0] ? (ranks[sortedAnswered[0].id]||5) : 0;
      // Dominant color — most common view among answered issues
      const viewCounts = { A:0, B:0, C:0 };
      answeredIssues.forEach(i => { if(answers[i.id] && answers[i.id] !== 'D') viewCounts[answers[i.id]]++; });
      const dominantChoice = Object.entries(viewCounts).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'A';
      const dominantColor = VIEW_COLOR[dominantChoice] || '#3b82f6';
      const dominantColorDark = dominantChoice === 'C' ? '#991b1b' : dominantChoice === 'B' ? '#7e22ce' : '#1d4ed8';
      const dominantColorMid = dominantChoice === 'C' ? '#dc2626' : dominantChoice === 'B' ? '#9333ea' : '#2563eb';

      return (
        <div className="min-h-screen flex flex-col" style={{background:'linear-gradient(160deg,#0f172a 0%,#020617 100%)'}}>

          {/* Header */}
          <div className="border-b border-slate-800 px-4 py-3">
            <div className="max-w-5xl mx-auto flex items-center justify-between">
              <button onClick={onHome} className="text-sm text-slate-400 hover:text-white font-medium transition-colors">← Home</button>
              <div className="text-sm font-bold text-white tracking-wide uppercase" style={{fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'0.1em'}}>Your Views</div>
              <button onClick={onStartOver} className="text-xs text-slate-500 hover:text-red-400 font-medium transition-colors">Start Over</button>
            </div>
          </div>

          <div className="flex-1 max-w-5xl mx-auto w-full px-4 lg:px-24 py-4">

            {/* Headline */}
            <div className="mb-3 text-center">
              <h1 className="font-black text-2xl lg:text-4xl leading-tight mb-1">
                <span className="text-slate-400 font-light text-lg lg:text-2xl lowercase mr-1">your</span>
                <span className="text-white uppercase">View of Views</span>
              </h1>
            </div>

            {/* ── Answered issues ── */}
            {sortedAnswered.length > 0 && (
              <>
                <div className="flex flex-col gap-1.5 mb-2 mt-10">
                  <div className="flex items-center gap-2">
                    <div className="flex gap-1">
                      {Array.from({length:9},(_,i) => {
                        const dotIssue = sortedAnswered[i];
                        const dotColor = dotIssue ? VIEW_COLOR[answers[dotIssue.id]] : null;
                        return <div key={i} className="w-5 h-2 rounded-full transition-all" style={{background: dotColor || 'rgba(255,255,255,0.12)'}} />;
                      })}
                    </div>
                    <span className="text-slate-400 text-[10px] font-bold">{answeredCount}/9</span>
                  </div>
                  <span className="text-slate-500 text-[10px] uppercase tracking-widest font-semibold">Your Custom Ranking</span>
                </div>
                <div className="grid grid-cols-3 lg:grid-cols-5 gap-3 lg:gap-4 mb-3">
                  {sortedAnswered.map((issue, idx) => {
                    const choice = answers[issue.id];
                    const rank = ranks[issue.id] || 0;
                    const color = VIEW_COLOR[choice];
                    const isTopIssue = (ranks[issue.id]||5) === topRankValue && hasUniqueTop;
                    return (
                      <button
                        key={issue.id}
                        onClick={() => onAnswerMore(issue.id)}
                        className="group relative flex flex-col items-center rounded-2xl overflow-hidden transition-all hover:scale-105"
                        style={{
                          background: isTopIssue
                            ? `linear-gradient(160deg, ${VIEW_BG_TOP[choice]}, rgba(255,255,255,0.12))`
                            : `linear-gradient(160deg, ${VIEW_BG[choice]}, rgba(255,255,255,0.09))`,
                          border: isTopIssue ? `2px solid ${color}` : `1px solid ${color}aa`,
                          boxShadow: isTopIssue ? `0 0 28px ${color}66, 0 0 10px ${color}44` : `0 0 14px ${color}38`
                        }}
                      >
                        {/* Fixed-size image area */}
                        <div className="w-full px-3 pt-3 flex-shrink-0">
                          <div className="w-full" style={{height:'85px', display:'flex', alignItems:'center', justifyContent:'center'}}>
                            <img
                              src={`/icons/Symbols/${issue.symbol}.png`}
                              alt={issue.topic}
                              style={{maxWidth:'90%', maxHeight:'85px', objectFit:'contain'}}
                              onError={e => { e.target.style.display='none'; }}
                            />
                          </div>
                        </div>
                        {/* Fixed rank bar area */}
                        <div className="w-full px-2 pt-2" style={{height:'36px'}}>
                          {rank > 0 && (
                            <>
                              <div className="flex gap-0.5">
                                {Array.from({length:10},(_,i)=>i+1).map(n => (
                                  <div key={n} className="flex-1 h-2 rounded" style={{background: n <= rank ? color : 'rgba(255,255,255,0.12)'}} />
                                ))}
                              </div>
                              <p className="text-[10px] text-right mt-0.5 font-black" style={{color: 'rgba(255,255,255,0.75)'}}>{rank}/10</p>
                            </>
                          )}
                        </div>
                        {/* Fixed text area — always 2-line topic height */}
                        <div className="w-full px-2 pb-3 text-center">
                          <p className="text-white text-sm font-bold leading-tight mb-0" style={{fontFamily:"'Barlow Condensed',sans-serif", minHeight:'2.5em', display:'flex', alignItems:'center', justifyContent:'center'}}>{issue.topic.replace(' & Border','').replace('Reproductive','Reprod.')}</p>
                          <p className="text-xs font-bold mt-0" style={{color, marginTop:'-2px'}}>{VIEW_LABEL[choice]}</p>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </>
            )}

            {/* ── 3 CTAs ── */}
            <div className={`max-w-xl mx-auto mb-3 px-2 ${answeredCount === 0 ? 'opacity-30 pointer-events-none' : ''}`} style={{marginTop:'70px'}}>
              <div className="flex flex-col gap-2">
                  <div className={`relative ${BTN.wrap}`}>
                    <div className="flex rounded-full overflow-hidden"
                      style={{background:`linear-gradient(90deg,${dominantColorDark},${dominantColorMid})`}}>
                      <button onClick={() => setShowDrop(d => !d)}
                        className={`flex-1 ${BTN.primary}`}
                        style={{letterSpacing:'0.12em'}}>
                        Candidates
                      </button>
                      <button onClick={() => setShowDrop(d => !d)}
                        className="px-4 border-l border-white/20 text-white hover:bg-white/10 transition-colors flex items-center">
                        <svg className={`w-3.5 h-3.5 transition-transform ${showDrop ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}>
                          <path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/>
                        </svg>
                      </button>
                    </div>
                    {showDrop && (
                      <div className="absolute top-full mt-1 left-0 right-0 rounded-2xl overflow-hidden shadow-xl z-20 border border-white/10"
                        style={{background:'#1e293b'}}>
                        <button onClick={() => { setShowDrop(false); setBallotMode(true); setShowAddressModal(true); }}
                          className="w-full px-5 py-3 text-left text-xs font-black uppercase tracking-widest text-white hover:bg-white/10 transition-colors border-b border-white/10"
                          style={{letterSpacing:'0.1em'}}>
                          Build My Ballot
                        </button>
                        <button onClick={() => { setShowDrop(false); setCompareMode(true); setShowAddressModal(true); }}
                          className="w-full px-5 py-3 text-left text-xs font-black uppercase tracking-widest text-white hover:bg-white/10 transition-colors border-b border-white/10"
                          style={{letterSpacing:'0.1em'}}>
                          Compare Candidates
                        </button>
                        <button onClick={() => { setShowDrop(false); setShowAddressModal(true); }}
                          className="w-full px-5 py-3 text-left text-xs font-black uppercase tracking-widest text-white hover:bg-white/10 transition-colors"
                          style={{letterSpacing:'0.1em'}}>
                          My Candidates
                        </button>
                      </div>
                    )}
                  </div>
                <div className="flex items-center justify-center gap-3 py-2">
                  {[['Save','💾'],['Send','📤'],['Share','🔗']].map(([label], i) => (
                    <React.Fragment key={label}>
                      {i > 0 && <span className="text-slate-400 text-xs">•</span>}
                      <button onClick={() => setShowChallenge(true)}
                        className="text-xs font-black uppercase tracking-widest transition-all duration-150 hover:opacity-100 opacity-90"
                        style={{color: '#ffffff', letterSpacing:'0.14em'}}>
                        {label}
                      </button>
                    </React.Fragment>
                  ))}
                </div>
              </div>
            </div>

            {/* ── Address Modal ── */}
            {showAddressModal && (
              <AddressModal
                county={county || 'hays'}
                accentColor={dominantColorMid}
                accentColorDark={dominantColorDark}
                onClose={() => { setShowAddressModal(false); setBallotMode(false); setCompareMode(false); }}
                onContinue={(districts) => { setShowAddressModal(false); const wasCompare = compareMode, wasBallot = ballotMode; setBallotMode(false); setCompareMode(false); if (wasCompare) { onCompareMine(districts); } else if (wasBallot) { onBallot(districts); } else { onMatchMine(districts); } }}
                onShowAll={ballotMode ? undefined : () => { setShowAddressModal(false); setCompareMode(false); onMatchAll(); }}
              />
            )}

            {/* ── Challenge Modal ── */}
            {showChallenge && (
              <div className="fixed inset-0 z-50 flex items-center justify-center px-4" onClick={() => setShowChallenge(false)}>
                <div className="absolute inset-0 bg-black/60" />
                <div className="relative w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl border border-slate-700"
                     style={{background:'linear-gradient(160deg,#0f172a,#020617)'}}
                     onClick={e => e.stopPropagation()}>
                  <div className="px-6 pt-6 pb-2">
                    <h2 className="text-white font-black text-xl mb-1">Challenge a Friend</h2>
                    <p className="text-slate-400 text-sm leading-relaxed">Share this link. They take the quiz — then see how your views compare.</p>
                  </div>

                  {/* URL preview */}
                  <div className="mx-6 my-4 px-3 py-2 rounded-lg bg-slate-800 border border-slate-700">
                    <p className="text-slate-400 text-xs font-mono truncate">{buildChallengeUrl(answers, ranks)}</p>
                  </div>

                  {/* Options */}
                  <div className="px-6 pb-6 flex flex-col gap-2">
                    <button onClick={handleCopy}
                      className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl text-sm transition-colors flex items-center justify-center gap-2">
                      {copied ? '✓ Copied!' : '📋 Copy Link'}
                    </button>
                    <button onClick={handleEmail}
                      className="w-full py-3 border border-slate-600 text-slate-300 hover:border-slate-400 hover:text-white font-bold rounded-xl text-sm transition-colors flex items-center justify-center gap-2">
                      ✉️ Send Email
                    </button>
                    <button onClick={handleText}
                      className="w-full py-3 border border-slate-600 text-slate-300 hover:border-slate-400 hover:text-white font-bold rounded-xl text-sm transition-colors flex items-center justify-center gap-2">
                      💬 Send Text
                    </button>
                    <button onClick={() => setShowChallenge(false)}
                      className="w-full py-2 text-slate-500 hover:text-slate-300 text-sm font-medium transition-colors mt-1">
                      ✕ Close
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* ── Unanswered issues ── */}
            {unansweredIssues.length > 0 && (
              <>
                <div className="flex items-center gap-3 mb-4">
                  <div className="flex-1 border-t border-slate-500" />
                  <p className="text-white text-sm uppercase tracking-widest font-black whitespace-nowrap">+ Add more views</p>
                  <div className="flex-1 border-t border-slate-500" />
                </div>
                <div className="flex flex-wrap gap-2 mb-10">
                  {unansweredIssues.map((issue) => (
                    <button
                      key={issue.id}
                      onClick={() => onAnswerMore(issue.id)}
                      className="group relative flex flex-col items-center gap-1 transition-opacity duration-200"
                      style={{width: '72px'}}
                    >
                      <div className="relative w-full aspect-square rounded-xl overflow-hidden ring-1 ring-white/10 group-hover:ring-white/30 group-active:scale-95 transition-all duration-150 shadow-lg">
                        <img
                          src={`/icons/${issue.icon || issue.id}.png`}
                          alt={issue.topic}
                          className="w-full h-full object-cover"
                          onError={e => { e.target.style.display='none'; e.target.parentNode.style.background='#1e293b'; }}
                        />
                      </div>
                      <span className="text-slate-300 text-[10px] font-bold text-center leading-tight group-hover:text-white transition-all duration-150 px-0.5" style={{fontFamily:"'Barlow Condensed', sans-serif"}}>
                        {issue.topic.replace('Social Security & Medicare','Social Programs').replace('Housing & Affordability','Affordability')}
                      </span>
                    </button>
                  ))}
                </div>
              </>
            )}



          </div>
        </div>
      );
    }

    // ─── CONSTELLATION ───
    const STAR_COLORS  = { A: '#3b82f6', B: '#a855f7', C: '#ef4444', D: '#64748b' };
    const STAR_BASE_RGB = { A: [59,130,246], B: [168,85,247], C: [239,68,68], D: [100,116,139] };
    const CHOICE_LABEL = { A: 'Progressive', B: 'Moderate', C: 'Conservative', D: 'Independent' };

    // Returns an rgb() color for a star — same white→vivid interpolation as the rank gauge
    function starColor(choice, rank) {
      const [r, g, b] = STAR_BASE_RGB[choice] || STAR_BASE_RGB.D;
      const intensity = 0.18 + ((rank - 1) / 9) * 0.82; // 0.18 at rank 1 → 1.0 at rank 10
      const mix = ch => Math.round(255 - intensity * (255 - ch));
      return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
    }

    // Fixed constellation positions for up to 9 stars (% of SVG 400×300 viewbox)
    const STAR_POSITIONS = [
      { x: 50,  y: 22 }, // #1 — center-top (largest/most important)
      { x: 26,  y: 40 }, // #2
      { x: 73,  y: 35 }, // #3
      { x: 42,  y: 57 }, // #4
      { x: 18,  y: 62 }, // #5
      { x: 67,  y: 60 }, // #6
      { x: 34,  y: 76 }, // #7
      { x: 60,  y: 79 }, // #8
      { x: 80,  y: 50 }, // #9
    ];

    // Which star positions to connect with lines
    const CONNECTIONS = [[0,1],[0,2],[1,3],[2,5],[3,4],[3,5],[5,7],[4,6],[6,7],[2,8],[5,8]];

    function ConstellationScreen({ issues, answers, ranks, onContinue, onRetake }) {
      // Only issues the user answered (any choice including D)
      const answered = issues.filter(i => i.id in answers);
      // Sort descending by rank — highest rank = most important = biggest star
      const sorted = [...answered].sort((a, b) => (ranks[b.id] || 5) - (ranks[a.id] || 5));
      const topIssue = sorted[0];
      const topChoice = topIssue ? answers[topIssue.id] : null;
      const topRank   = topIssue ? (ranks[topIssue.id] || 5) : 10;
      const topColor  = topChoice ? starColor(topChoice, topRank) : '#3b82f6';
      const topColorVivid = topChoice ? STAR_COLORS[topChoice] : '#3b82f6';

      // Star radius: rank 10 → 20px, rank 1 → 5px
      const starR = rank => Math.round(5 + (rank - 1) * 1.67);

      // Figure out the dominant lean
      const choiceCounts = { A: 0, B: 0, C: 0, D: 0 };
      answered.forEach(i => { choiceCounts[answers[i.id]]++; });
      const dominant = Object.entries(choiceCounts).sort((a,b) => b[1]-a[1])[0]?.[0] || 'A';
      const leanLabel = CHOICE_LABEL[dominant];
      const leanColor = STAR_COLORS[dominant];

      return (
        <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center px-4 py-10">

          {/* ── The card ── */}
          <div className="w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl border border-slate-700/60"
               style={{ background: 'linear-gradient(160deg, #0f172a 0%, #020617 100%)' }}>

            {/* Header */}
            <div className="text-center pt-7 pb-1 px-6">
              <p className="text-slate-300 text-[10px] tracking-[0.2em] uppercase font-semibold">VoteYourViews.org</p>
              <h1 className="text-white text-xl font-black mt-1 tracking-tight">My Political Constellation</h1>
              <p className="text-slate-400 text-xs mt-0.5">Hays County, Texas · 2026</p>
            </div>

            {/* #1 issue banner */}
            {topIssue && (
              <div className="mx-5 mt-4 rounded-xl px-4 py-2.5 text-center"
                   style={{ backgroundColor: topColorVivid + '18', border: `1px solid ${topColorVivid}40` }}>
                <p className="text-[10px] uppercase tracking-widest font-semibold" style={{ color: topColorVivid + 'cc' }}>My #1 Issue</p>
                <p className="text-white font-black text-lg leading-tight mt-0.5">{topIssue.topic}</p>
              </div>
            )}

            {/* SVG star field */}
            <svg viewBox="0 0 400 320" className="w-full px-2 mt-1">
              {/* Background twinkle dots */}
              {[[15,20],[85,10],[90,70],[10,80],[50,90],[30,50],[70,85],[5,45]].map(([x,y],i) => (
                <circle key={i} cx={x*4} cy={y*3} r="1" fill="#ffffff" opacity="0.2" />
              ))}
              {/* Connecting lines */}
              {CONNECTIONS.map(([i,j]) => {
                if (!sorted[i] || !sorted[j]) return null;
                const p1 = STAR_POSITIONS[i], p2 = STAR_POSITIONS[j];
                return (
                  <line key={`${i}-${j}`}
                    x1={p1.x*4} y1={p1.y*3}
                    x2={p2.x*4} y2={p2.y*3}
                    stroke="#334155" strokeWidth="1" strokeDasharray="3 3" />
                );
              })}
              {/* Stars */}
              {sorted.map((issue, idx) => {
                const pos = STAR_POSITIONS[idx];
                if (!pos) return null;
                const cx = pos.x * 4, cy = pos.y * 3;
                const rank = ranks[issue.id] || 5;
                const r = starR(rank);
                const choice = answers[issue.id] || 'D';
                const color = starColor(choice, rank);
                const shortLabel = issue.topic.replace(' & ', '/').split(' ').slice(0,3).join(' ');
                return (
                  <g key={issue.id}>
                    {/* Glow — same intensity color, faded */}
                    <circle cx={cx} cy={cy} r={r + 7} fill={color} opacity="0.15" />
                    <circle cx={cx} cy={cy} r={r + 3} fill={color} opacity="0.25" />
                    {/* Star */}
                    <circle cx={cx} cy={cy} r={r} fill={color} />
                    {/* Rank badge for #1 — use vivid color so label is readable */}
                    {idx === 0 && (
                      <text x={cx} y={cy - r - 7} textAnchor="middle" fill={STAR_COLORS[choice] || color} fontSize="9" fontWeight="700">#1</text>
                    )}
                    {/* Label */}
                    <text x={cx} y={cy + r + 13} textAnchor="middle" fill="#94a3b8" fontSize="9">{shortLabel}</text>
                  </g>
                );
              })}
            </svg>

            {/* Legend */}
            <div className="flex justify-center gap-4 px-6 pb-2">
              {[['A','#3b82f6','Progressive'],['B','#a855f7','Moderate'],['C','#ef4444','Conservative']].map(([k,c,label]) => (
                choiceCounts[k] > 0 && (
                  <div key={k} className="flex items-center gap-1.5">
