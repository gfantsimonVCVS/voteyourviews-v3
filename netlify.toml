# Edge function: per-candidate OG tags on clean candidate URLs.
# The function itself early-returns on anything that isn't a bare /<slug> path
# (see netlify/edge-functions/candidate-og.js).
[[edge_functions]]
  path = "/*"
  function = "candidate-og"

# Candidate self-submission backend (submit + magic-link verify).
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  # The Google Maps browser key is public by design (domain-restricted in Google's
  # console); tell Netlify's secrets scanner it isn't a leak so builds can publish.
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyCwBv8O4lWqSoZZxH4npofqAeU2C86ejkI"
